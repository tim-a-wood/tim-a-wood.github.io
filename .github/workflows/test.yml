name: Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ashen Hollow — JS room tests
        run: |
          cd ashen-hollow
          node tests/room-editor-export.test.js
          node tests/game-logic.test.js
          node tests/room-wizard-footprint.test.js
          node tests/room-wizard-neighbor-align.test.js
          node tests/room-wizard-terrain.test.js
          node tests/room-wizard-environment.test.js
          node tests/room-wizard-environment-copilot.test.js
          node tests/room-wizard-results-contract.test.js
          node tests/room-wizard-overlay-alignment.test.js

      - name: Ashen Hollow — room environment (Python)
        run: |
          cd ashen-hollow
          python3 tests/room_environment_system.test.py
          python3 tests/unified_shell_hole_baseline.test.py
          python3 tests/room_environment_r1_scenic_baseline.test.py

      - name: Orchestrator — workspace / split-contract tests
        run: |
          python3 -m pytest tests/

      - name: Agent OS — runtime tests (workspace checkout)
        env:
          MV_WORKSPACE_ROOT: ${{ github.workspace }}
        run: |
          cd agent-os
          python3 -m pytest tests/

      - name: Sprite Workbench — arch manifest
        run: |
          cd sprite-workbench
          python3 tests/extract_sprite_workbench_arch.test.py
          python3 scripts/verify_sprite_workbench_arch_manifest.py
