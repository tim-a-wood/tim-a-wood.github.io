name: Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: node tests/game-logic.test.js && node tests/room-editor-export.test.js && node tests/room-wizard-footprint.test.js && node tests/room-wizard-neighbor-align.test.js && node tests/room-wizard-terrain.test.js && node tests/room-wizard-environment.test.js && node tests/room-wizard-environment-copilot.test.js && node tests/room-wizard-results-contract.test.js && node tests/room-wizard-overlay-alignment.test.js

      - name: Room environment system (Python)
        run: python3 tests/room_environment_system.test.py

      - name: Email digest theme (Python)
        run: python3 tests/send_weekly_digest_email_theme_test.py

      - name: Home dashboard snapshot (Python)
        run: python3 tests/home_internal_snapshot.test.py

      - name: Sprite workbench arch manifest extractor (Python)
        run: python3 tests/extract_sprite_workbench_arch.test.py

      - name: Sprite workbench arch manifest matches extractor (Python)
        run: python3 scripts/verify_sprite_workbench_arch_manifest.py
