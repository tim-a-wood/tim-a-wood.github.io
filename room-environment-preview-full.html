<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <title>Room preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050709;
      --text: #cce8e0;
      --muted: #5d7870;
      --font-sans: "Plus Jakarta Sans", -apple-system, sans-serif;
      --font-display: "Bebas Neue", sans-serif;
      --font-mono: "DM Mono", ui-monospace, monospace;
      --font-size-xs: 11px;
      --font-size-base: 14px;
      --font-size-sm: 13px;
    }
    html, body {
      min-height: 100%;
      background: var(--bg);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 0;
    }
    img {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      image-rendering: auto;
    }
    .rw-full-preview-fallback {
      color: var(--text);
      font-family: var(--font-sans);
      font-size: var(--font-size-base);
      padding: 16px;
      max-width: 40ch;
      line-height: 1.5;
    }
    .rw-full-preview-fallback small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: var(--font-size-xs);
    }
  </style>
</head>
<body>
  <script>
    (function () {
      function showFallback(mainText, hintText) {
        while (document.body.firstChild) {
          document.body.removeChild(document.body.firstChild);
        }
        var p = document.createElement('p');
        p.className = 'rw-full-preview-fallback';
        p.textContent = mainText;
        if (hintText) {
          var sm = document.createElement('small');
          sm.textContent = hintText;
          p.appendChild(sm);
        }
        document.body.appendChild(p);
      }
      var params = new URLSearchParams(window.location.search);
      var enc = params.get('src');
      if (!enc) {
        showFallback(
          'No preview address in this link.',
          'Close this tab and open the preview again from the room editor.'
        );
        return;
      }
      var href;
      try {
        href = decodeURIComponent(enc);
      } catch (err) {
        showFallback('This preview link is invalid.');
        return;
      }
      var parsed;
      try {
        parsed = new URL(href, window.location.origin);
      } catch (err2) {
        showFallback('Could not read the preview address.');
        return;
      }
      if (parsed.origin !== window.location.origin) {
        showFallback('For safety, only previews from this workbench can be shown here.');
        return;
      }
      var img = document.createElement('img');
      img.src = parsed.href;
      img.alt = 'Full-size room environment preview';
      document.title = 'Room preview';
      img.onload = function () {
        var file = parsed.pathname.split('/').pop() || 'preview';
        document.title = file + ' — preview';
      };
      document.body.appendChild(img);
    })();
  </script>
</body>
</html>
