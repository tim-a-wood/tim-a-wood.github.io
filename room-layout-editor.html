<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashen Hollow Room Layout Editor</title>
  <style>
    :root {
      --bg: #0b1117;
      --panel: #111b24;
      --panel-2: #162635;
      --line: #2b445c;
      --text: #e6eef7;
      --muted: #95aabd;
      --accent: #f5c156;
      --good: #59d8a1;
      --door: #f5986e;
      --platform: #77b8ff;
      --vertex: #ff6b8a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(58, 92, 128, 0.18), transparent 25%),
        radial-gradient(circle at bottom right, rgba(176, 110, 67, 0.18), transparent 25%),
        var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 12px;
      padding: 12px;
      min-height: 100vh;
    }
    .panel {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      min-height: 0;
    }
    h1, h2, h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.02em;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .stack { display: grid; gap: 10px; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    label {
      display: grid;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input, select, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0d1821;
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
    }
    textarea {
      min-height: 280px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    button {
      cursor: pointer;
      background: #132637;
    }
    button.active {
      border-color: var(--accent);
      color: #fff4d7;
      background: #3a2b14;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button.secondary { background: #102331; }
    button.good { background: #16372b; border-color: #255c48; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .toolbar button {
      width: auto;
      min-width: 88px;
      padding: 8px 12px;
    }
    .canvas-wrap {
      display: grid;
      gap: 10px;
      min-height: 0;
    }
    .canvas-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .canvas-header-text {
      min-width: 0;
    }
    .canvas-controls {
      display: grid;
      gap: 8px;
      min-width: min(560px, 100%);
    }
    .canvas-controls .row {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .canvas-controls .row-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .canvas-controls .row-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .canvas-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #09121a;
      overflow: hidden;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      touch-action: none;
      background:
        linear-gradient(0deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02)),
        #081018;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .list {
      display: grid;
      gap: 6px;
      max-height: 200px;
      overflow: auto;
    }
    .chip {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0b1620;
      cursor: pointer;
      font-size: 12px;
    }
    .chip.active {
      border-color: var(--accent);
      background: #1c2530;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
    }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      margin-right: 6px;
    }
    .hidden { display: none; }
    .steps {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
    }
    .steps li + li {
      margin-top: 6px;
    }
    details {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #0b1620;
    }
    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }
    .inspector {
      position: absolute;
      top: 12px;
      right: 12px;
      width: min(220px, calc(100% - 24px));
      background: rgba(9, 19, 28, 0.94);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      display: grid;
      gap: 6px;
      z-index: 3;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }
    .inspector.hidden {
      display: none;
    }
    .inspector-title {
      font-size: 12px;
      color: var(--text);
    }
    .inspector .row {
      grid-template-columns: 1fr 1fr;
    }
    .inspector label {
      font-size: 10px;
    }
    .canvas-toolbar {
      position: absolute;
      top: 92px;
      left: 12px;
      width: 110px;
      display: grid;
      gap: 6px;
      z-index: 3;
    }
    .canvas-toolbar button {
      padding: 6px 8px;
      font-size: 11px;
      text-align: left;
    }
    .canvas-toolbar .toolbar-divider {
      height: 1px;
      background: rgba(127, 178, 223, 0.2);
      margin: 2px 0;
    }
    .canvas-toolbar .toolbar-note {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.3;
      padding: 2px 2px 0 2px;
    }
    .field-hidden {
      display: none;
    }
    @media (max-width: 1300px) {
      .app {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel canvas-wrap">
      <div class="canvas-header">
        <div class="canvas-header-text">
          <h1 id="canvasTitle">Room Layout Editor</h1>
          <div class="sub" id="canvasSub">Drag vertices, platforms, and doors in the active map view.</div>
        </div>
        <div class="canvas-controls">
          <div class="row">
            <label>
              Room
              <select id="roomSelect"></select>
            </label>
            <label>
              View
              <select id="viewMode">
                <option value="room">Room Editor</option>
                <option value="global">Global Map</option>
              </select>
            </label>
          </div>
          <div class="row-4">
            <label>
              Room Width
              <input id="roomWidth" type="number" step="32" min="320" />
            </label>
            <label>
              Room Height
              <input id="roomHeight" type="number" step="32" min="320" />
            </label>
            <button id="addRoom">Add Room</button>
            <button id="deleteRoom">Delete Room</button>
          </div>
          <div class="row-4">
            <label>
              Grid Snap
              <select id="snapSize">
                <option value="0">Off</option>
                <option value="8">8</option>
                <option value="16">16</option>
                <option value="32" selected>32</option>
                <option value="64">64</option>
              </select>
            </label>
            <label>
              Global Zoom
              <input id="globalZoom" type="range" min="40" max="200" step="5" value="100" />
            </label>
            <button id="savePermanent" class="good">Save Device</button>
            <button id="downloadJson" class="good">Export JSON</button>
          </div>
          <div class="row-3">
            <button id="syncCanonicalJson" class="good">Sync Canonical</button>
            <button id="openGameWithLayout">Open Game</button>
            <button id="reloadJson">Reload Disk</button>
          </div>
        </div>
      </div>
      <div class="canvas-box" id="roomCanvasBox">
        <div class="canvas-toolbar" id="canvasToolButtons">
          <button data-tool="select" class="active">Select</button>
          <button data-tool="vertex">Add Vertex</button>
          <button data-tool="platform">Add Platform</button>
          <button data-tool="door">Add Door</button>
          <button data-tool="key">Add Key</button>
          <button data-tool="mover">Add Mover</button>
          <button data-tool="start">Set Start</button>
          <button data-tool="room-move">Move Room</button>
          <div class="toolbar-divider"></div>
          <button id="deleteSelected">Delete</button>
          <button id="duplicatePlatform">Duplicate</button>
          <button id="centerRoom">Center Room</button>
          <div class="toolbar-note" id="selectionSummary">Nothing selected.</div>
        </div>
        <div class="inspector hidden" id="selectionInspector">
          <div class="inspector-title" id="inspectorTitle">Selection</div>
          <div class="row" id="globalFields">
            <label>Global X<input id="globalX" type="number" step="1" /></label>
            <label>Global Y<input id="globalY" type="number" step="1" /></label>
          </div>
          <div class="row">
            <label>X<input id="itemX" type="number" step="1" /></label>
            <label>Y<input id="itemY" type="number" step="1" /></label>
          </div>
          <div class="row" id="platformFields">
            <label>Length<input id="itemLen" type="number" step="1" min="1" /></label>
            <label>Tint<input id="itemTint" type="number" step="1" min="0" max="4" /></label>
          </div>
          <div class="row field-hidden" id="moverFields">
            <label>End X<input id="moverEndX" type="number" step="1" /></label>
            <label>End Y<input id="moverEndY" type="number" step="1" /></label>
            <label>Length<input id="moverLen" type="number" step="1" min="1" /></label>
            <label>Tint<input id="moverTint" type="number" step="1" min="0" max="4" /></label>
            <label>
              Initial State
              <select id="moverInitialState">
                <option value="unlocked">Unlocked</option>
                <option value="locked">Locked</option>
              </select>
            </label>
          </div>
          <div class="row field-hidden" id="doorFields">
            <label>Door Label<input id="doorLabel" type="text" /></label>
            <label>Target Room<input id="doorTarget" type="text" /></label>
            <label>
              This Side
              <select id="doorStateForward">
                <option value="unlocked">Unlocked</option>
                <option value="locked">Locked</option>
              </select>
            </label>
            <label>
              Other Side
              <select id="doorStateReverse">
                <option value="unlocked">Unlocked</option>
                <option value="locked">Locked</option>
              </select>
            </label>
          </div>
          <div class="row field-hidden" id="keyFields">
            <label>Key Label<input id="keyLabel" type="text" /></label>
            <label>Unlocks Target<input id="keyDoorTarget" type="text" placeholder="R5-D3 or R8-M1" /></label>
          </div>
          <button id="applyProps" class="good">Apply Properties</button>
        </div>
        <canvas id="roomCanvas" width="960" height="720"></canvas>
      </div>
      <div class="canvas-box hidden" id="globalCanvasBox">
        <canvas id="globalCanvas" width="960" height="720"></canvas>
      </div>
      <details>
        <summary>Advanced Import / Scratch / Raw JSON</summary>
        <div class="stack" style="margin-top: 10px;">
          <div class="row">
            <button id="applyJson">Import Layout</button>
            <button id="saveJsonFile" class="secondary">Save To File</button>
          </div>
          <div class="row">
            <button id="clearSavedLayout" class="secondary">Clear Scratch Save</button>
          </div>
          <textarea id="jsonText" spellcheck="false"></textarea>
        </div>
      </details>
      <div class="status" id="statusText">Loading layout data…</div>
    </section>

    <section class="panel stack">
      <div class="stack">
        <h2>Room Contents</h2>
        <div class="badge" id="vertexCount">Vertices: 0</div>
        <div class="badge" id="platformCount">Platforms: 0</div>
        <div class="badge" id="doorCount">Doors: 0</div>
        <div class="badge" id="keyCount">Keys: 0</div>
        <div class="badge" id="moverCount">Movers: 0</div>
        <div class="list" id="itemList"></div>
      </div>
    </section>

  </main>
