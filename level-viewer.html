<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level layout viewer — Ashen Hollow</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: #eee; font-family: monospace; padding: 8px; }
        h1 { font-size: 14px; margin: 0 0 8px 0; }
        #info { font-size: 11px; margin-bottom: 8px; opacity: 0.9; }
        #canvas-wrap { overflow: auto; max-height: calc(100vh - 80px); }
        canvas { display: block; }
    </style>
</head>
<body>
    <h1>Level layout viewer (draft labyrinth)</h1>
    <div id="info">World 1600×1200 · Green = start corridor · Brown = door · Purple = relic · Yellow = key · Scale to fit</div>
    <div id="canvas-wrap">
        <canvas id="c"></canvas>
    </div>
    <script>
        (function () {
            const TILE = 32;
            const W = 1600, H = 1200;
            const FLOOR_Y = H - 16;
            const PLATFORM_H = 14;

            const ledges = [
                { x: 0, y: 1100, len: 8, tint: 0 },
                { x: 288, y: 1060, len: 2, tint: 0 },
                { x: 352, y: 1020, len: 1, tint: 1 },
                { x: 304, y: 980, len: 2, tint: 2 },
                { x: 400, y: 940, len: 1, tint: 0 },
                { x: 336, y: 900, len: 2, tint: 3 },
                { x: 432, y: 860, len: 1, tint: 1 },
                { x: 368, y: 820, len: 2, tint: 2 },
                { x: 480, y: 780, len: 1, tint: 0 },
                { x: 416, y: 740, len: 2, tint: 4 },
                { x: 512, y: 700, len: 1, tint: 1 },
                { x: 448, y: 660, len: 2, tint: 2 },
                { x: 544, y: 620, len: 1, tint: 0 },
                { x: 480, y: 580, len: 2, tint: 3 },
                { x: 576, y: 540, len: 1, tint: 1 },
                { x: 512, y: 500, len: 2, tint: 4 },
                { x: 608, y: 460, len: 1, tint: 0 },
                { x: 544, y: 420, len: 2, tint: 2 },
                { x: 640, y: 380, len: 1, tint: 1 },
                { x: 576, y: 340, len: 2, tint: 3 },
                { x: 672, y: 300, len: 1, tint: 0 },
                { x: 608, y: 260, len: 2, tint: 4 },
                { x: 704, y: 220, len: 1, tint: 1 },
                { x: 1100, y: 260, len: 2, tint: 4 },
                { x: 1450, y: 120, len: 3, tint: 1 }
            ];

            const door = { x: 248, y: 1137, w: 16, h: 61 };
            const relic = { x: 384, y: 813 };
            const key = { x: 1498, y: 86 };
            const start = { x: 128, y: 1073 };

            const colors = ['#2a3a5a', '#3a2a5a', '#2a4a3a', '#4a3a2a', '#2a4050'];

            const c = document.getElementById('c');
            const ctx = c.getContext('2d');

            function draw() {
                const padding = 20;
                const scale = Math.min(
                    (window.innerWidth - padding * 2) / W,
                    (window.innerHeight - 120) / H
                );
                c.width = W * scale;
                c.height = H * scale;
                c.style.width = W * scale + 'px';
                c.style.height = H * scale + 'px';

                ctx.save();
                ctx.scale(scale, scale);

                ctx.fillStyle = '#0d0d14';
                ctx.fillRect(0, 0, W, H);

                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 1;
                for (let gx = 0; gx <= W; gx += TILE) {
                    ctx.beginPath();
                    ctx.moveTo(gx, 0);
                    ctx.lineTo(gx, H);
                    ctx.stroke();
                }
                for (let gy = 0; gy <= H; gy += TILE) {
                    ctx.beginPath();
                    ctx.moveTo(0, gy);
                    ctx.lineTo(W, gy);
                    ctx.stroke();
                }

                ctx.fillStyle = '#334466';
                ctx.fillRect(0, FLOOR_Y - 16, W, 32);

                ledges.forEach((ledge, i) => {
                    const col = colors[ledge.tint] || '#444';
                    ctx.fillStyle = i === 0 ? '#1a4a3a' : col;
                    if (i === 0) ctx.strokeStyle = '#2ee';
                    else ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = i === 0 ? 2 : 1;
                    for (let j = 0; j < ledge.len; j++) {
                        const cx = ledge.x + j * TILE + 16;
                        const cy = ledge.y;
                        const l = 16, t = PLATFORM_H / 2;
                        ctx.fillRect(cx - l, cy - t, l * 2, PLATFORM_H);
                        ctx.strokeRect(cx - l, cy - t, l * 2, PLATFORM_H);
                    }
                });

                ctx.fillStyle = '#6a4326';
                ctx.fillRect(door.x - door.w / 2, door.y - door.h / 2, door.w, door.h);
                ctx.strokeStyle = '#8b5a2b';
                ctx.strokeRect(door.x - door.w / 2, door.y - door.h / 2, door.w, door.h);

                ctx.fillStyle = 'rgba(139, 92, 246, 0.9)';
                ctx.beginPath();
                ctx.arc(relic.x, relic.y, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                ctx.fillStyle = 'rgba(255, 213, 74, 0.95)';
                ctx.beginPath();
                ctx.arc(key.x, key.y, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                ctx.fillStyle = 'rgba(0, 221, 255, 0.85)';
                ctx.beginPath();
                ctx.arc(start.x, start.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                ctx.restore();
            }

            window.addEventListener('resize', draw);
            draw();
        })();
    </script>
</body>
</html>
