            const layoutSelect = document.getElementById('layout');

                const id = layoutSelect.value;
                return LAYOUTS[id] || LAYOUTS.D;
            }

            function draw() {
                const layout = getLayout();
                const ledges = layout.ledges;
                const relic = layout.relic;
                const key = layout.key;

                const padding = 20;
                const scale = Math.min(
                    (window.innerWidth - padding * 2) / W,
                    (window.innerHeight - 140) / H
                );
                c.width = W * scale;
                c.height = H * scale;
                c.style.width = W * scale + 'px';
                c.style.height = H * scale + 'px';

                ctx.save();
                ctx.scale(scale, scale);

                ctx.fillStyle = '#0d0d14';
                ctx.fillRect(0, 0, W, H);

                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 1;
                for (let gx = 0; gx <= W; gx += TILE) {
                    ctx.beginPath();
                    ctx.moveTo(gx, 0);
                    ctx.lineTo(gx, H);
                    ctx.stroke();
                }
                for (let gy = 0; gy <= H; gy += TILE) {
                    ctx.beginPath();
                    ctx.moveTo(0, gy);
                    ctx.lineTo(W, gy);
                    ctx.stroke();
                }

                ctx.fillStyle = '#334466';
                ctx.fillRect(0, FLOOR_Y - 16, W, 32);

                ledges.forEach((ledge, i) => {
                    const col = colors[ledge.tint] || '#444';
                    ctx.fillStyle = i === 0 ? '#1a4a3a' : col;
                    if (i === 0) ctx.strokeStyle = '#2ee';
                    else ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = i === 0 ? 2 : 1;
                    for (let j = 0; j < ledge.len; j++) {
                        const cx = ledge.x + j * TILE + 16;
                        const cy = ledge.y;
                        const l = 16, t = PLATFORM_H / 2;
                        ctx.fillRect(cx - l, cy - t, l * 2, PLATFORM_H);
                        ctx.strokeRect(cx - l, cy - t, l * 2, PLATFORM_H);
                    }
                });

                ctx.fillStyle = '#6a4326';
                ctx.fillRect(door.x - door.w / 2, door.y - door.h / 2, door.w, door.h);
                ctx.strokeStyle = '#8b5a2b';
                ctx.strokeRect(door.x - door.w / 2, door.y - door.h / 2, door.w, door.h);

                ctx.fillStyle = 'rgba(139, 92, 246, 0.9)';
                ctx.beginPath();
                ctx.arc(relic.x, relic.y, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                ctx.fillStyle = 'rgba(255, 213, 74, 0.95)';
                ctx.beginPath();
                ctx.arc(key.x, key.y, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                ctx.fillStyle = 'rgba(0, 221, 255, 0.85)';
                ctx.beginPath();
                ctx.arc(start.x, start.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                ctx.restore();
            }

            layoutSelect.addEventListener('change', draw);
            window.addEventListener('resize', draw);
