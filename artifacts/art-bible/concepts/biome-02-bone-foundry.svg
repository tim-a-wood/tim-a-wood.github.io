<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="furnaceGlow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#A85B32" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#7C3D2B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#07090B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="50%" cy="70%" r="70%">
      <stop offset="0%" stop-color="#0D1115"/>
      <stop offset="100%" stop-color="#07090B"/>
    </radialGradient>
    <radialGradient id="vig2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#07090B" stop-opacity="0"/>
      <stop offset="100%" stop-color="#07090B" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="glow6"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="glow14"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <linearGradient id="smokeRise" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1A2127" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A2127" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Furnace core glow — deep behind -->
  <ellipse cx="400" cy="340" rx="160" ry="100" fill="url(#furnaceGlow)" filter="url(#glow14)"/>

  <!-- Back wall -->
  <rect x="0" y="0" width="800" height="500" fill="none"/>

  <!-- Far scaffolding cross-beams -->
  <line x1="0" y1="120" x2="800" y2="120" stroke="#1A2127" stroke-width="6" opacity="0.6"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#1A2127" stroke-width="5" opacity="0.5"/>

  <!-- Left scaffold tower -->
  <rect x="30" y="0" width="18" height="500" fill="#0D1115"/>
  <rect x="80" y="0" width="14" height="500" fill="#0D1115"/>
  <!-- Cross braces L -->
  <line x1="30" y1="80" x2="94" y2="160" stroke="#0D1115" stroke-width="4"/>
  <line x1="94" y1="80" x2="30" y2="160" stroke="#0D1115" stroke-width="4"/>
  <line x1="30" y1="200" x2="94" y2="280" stroke="#0D1115" stroke-width="4"/>
  <line x1="94" y1="200" x2="30" y2="280" stroke="#0D1115" stroke-width="4"/>
  <line x1="30" y1="320" x2="94" y2="400" stroke="#0D1115" stroke-width="4"/>
  <line x1="94" y1="320" x2="30" y2="400" stroke="#0D1115" stroke-width="4"/>

  <!-- Right scaffold tower -->
  <rect x="706" y="0" width="14" height="500" fill="#0D1115"/>
  <rect x="752" y="0" width="18" height="500" fill="#0D1115"/>
  <!-- Cross braces R -->
  <line x1="706" y1="80" x2="770" y2="160" stroke="#0D1115" stroke-width="4"/>
  <line x1="770" y1="80" x2="706" y2="160" stroke="#0D1115" stroke-width="4"/>
  <line x1="706" y1="200" x2="770" y2="280" stroke="#0D1115" stroke-width="4"/>
  <line x1="770" y1="200" x2="706" y2="280" stroke="#0D1115" stroke-width="4"/>
  <line x1="706" y1="320" x2="770" y2="400" stroke="#0D1115" stroke-width="4"/>
  <line x1="770" y1="320" x2="706" y2="400" stroke="#0D1115" stroke-width="4"/>

  <!-- Mid scaffold L -->
  <rect x="170" y="100" width="10" height="400" fill="#0D1115" opacity="0.9"/>
  <rect x="220" y="180" width="8" height="320" fill="#0D1115" opacity="0.7"/>

  <!-- Mid scaffold R -->
  <rect x="570" y="80" width="10" height="420" fill="#0D1115" opacity="0.9"/>
  <rect x="620" y="160" width="8" height="340" fill="#0D1115" opacity="0.7"/>

  <!-- Bone structural elements — skulls and ribs integrated into scaffolding -->
  <!-- Skull row on left beam -->
  <circle cx="39" cy="300" r="7" fill="#2B343B"/>
  <circle cx="39" cy="330" r="7" fill="#2B343B"/>
  <circle cx="39" cy="360" r="7" fill="#2B343B"/>
  <circle cx="39" cy="390" r="7" fill="#2B343B"/>
  <!-- Skull row on right beam -->
  <circle cx="761" cy="290" r="7" fill="#2B343B"/>
  <circle cx="761" cy="320" r="7" fill="#2B343B"/>
  <circle cx="761" cy="350" r="7" fill="#2B343B"/>
  <circle cx="761" cy="380" r="7" fill="#2B343B"/>

  <!-- Rib-arch structural elements at mid-level -->
  <path d="M 170 240 Q 285 200 400 240" fill="none" stroke="#1A2127" stroke-width="5"/>
  <path d="M 400 240 Q 515 200 630 240" fill="none" stroke="#1A2127" stroke-width="5"/>
  <!-- Hanging rib chains -->
  <line x1="240" y1="240" x2="235" y2="340" stroke="#1A2127" stroke-width="2" opacity="0.7"/>
  <line x1="310" y1="218" x2="308" y2="310" stroke="#1A2127" stroke-width="2" opacity="0.7"/>
  <line x1="490" y1="218" x2="492" y2="320" stroke="#1A2127" stroke-width="2" opacity="0.7"/>
  <line x1="560" y1="240" x2="565" y2="350" stroke="#1A2127" stroke-width="2" opacity="0.7"/>

  <!-- Central furnace/kiln structure -->
  <!-- Base cylinder -->
  <rect x="340" y="310" width="120" height="190" fill="#0D1115" rx="4"/>
  <rect x="345" y="308" width="110" height="10" fill="#1A2127" rx="2"/>
  <!-- Furnace opening — lit -->
  <rect x="365" y="370" width="70" height="50" fill="#A85B32" rx="3"/>
  <rect x="370" y="375" width="60" height="40" fill="#7C3D2B" rx="2"/>
  <!-- Furnace glow on surrounding surface -->
  <rect x="340" y="365" width="25" height="60" fill="#7C3D2B" opacity="0.4" rx="2"/>
  <rect x="435" y="365" width="25" height="60" fill="#7C3D2B" opacity="0.4" rx="2"/>
  <!-- Furnace highlight glow -->
  <ellipse cx="400" cy="395" rx="55" ry="30" fill="#A85B32" opacity="0.3" filter="url(#glow6)"/>

  <!-- Smoke plumes -->
  <ellipse cx="380" cy="290" rx="18" ry="30" fill="url(#smokeRise)" filter="url(#blur3)" opacity="0.6"/>
  <ellipse cx="415" cy="270" rx="22" ry="40" fill="url(#smokeRise)" filter="url(#blur3)" opacity="0.5"/>
  <ellipse cx="400" cy="240" rx="30" ry="50" fill="url(#smokeRise)" filter="url(#blur3)" opacity="0.3"/>

  <!-- Rust staining on floor beneath furnace -->
  <ellipse cx="400" cy="490" rx="100" ry="15" fill="#7C3D2B" opacity="0.15" filter="url(#glow6)"/>

  <!-- Ground -->
  <rect x="0" y="460" width="800" height="40" fill="#07090B"/>
  <path d="M 0 460 Q 150 452 300 462 Q 450 472 600 458 Q 720 448 800 460 L 800 500 L 0 500 Z" fill="#0D1115"/>

  <!-- Vignette -->
  <rect width="800" height="500" fill="url(#vig2)"/>
</svg>
