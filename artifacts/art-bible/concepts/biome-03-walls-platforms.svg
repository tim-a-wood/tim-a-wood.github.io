<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-label="Castle Nave wall and platform texture concept">
  <defs>
    <pattern id="cn-wall" patternUnits="userSpaceOnUse" width="24" height="48">
      <rect width="24" height="48" fill="#1A2127"/>
      <rect x="0" y="0" width="10" height="48" fill="#2B343B" opacity="0.35"/>
      <line x1="12" y1="0" x2="12" y2="48" stroke="#4B5A63" stroke-width="0.75" opacity="0.4"/>
    </pattern>
    <linearGradient id="cn-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B343B"/>
      <stop offset="40%" stop-color="#4B5A63"/>
      <stop offset="100%" stop-color="#2B343B"/>
    </linearGradient>
    <linearGradient id="cn-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A2127"/>
      <stop offset="50%" stop-color="#4B5A63"/>
      <stop offset="100%" stop-color="#1A2127"/>
    </linearGradient>
  </defs>
  <rect width="960" height="280" fill="#0D1115"/>
  <text x="16" y="28" fill="#5d7870" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em">CASTLE NAVE  WALL / PLATFORM / BORDER (CONCEPT)</text>
  <rect x="16" y="48" width="280" height="200" fill="url(#cn-wall)" stroke="#2B343B" stroke-width="2"/>
  <text x="24" y="72" fill="#5d7870" font-family="system-ui,sans-serif" font-size="10">GOTHIC ASH STONE</text>
  <text x="24" y="220" fill="#6E8F2E" font-family="system-ui,sans-serif" font-size="9" opacity="0.7">ivy · life (not decay)</text>
  <rect x="320" y="130" width="300" height="64" fill="url(#cn-floor)" stroke="#4B5A63" stroke-width="2"/>
  <rect x="320" y="130" width="300" height="12" fill="url(#cn-light)" opacity="0.85"/>
  <text x="328" y="118" fill="#5d7870" font-family="system-ui,sans-serif" font-size="10">NAVE FLOOR</text>
  <text x="328" y="208" fill="#5d7870" font-family="system-ui,sans-serif" font-size="9">sun shaft pool · warm</text>
  <rect x="660" y="48" width="280" height="200" fill="#1A2127" stroke="#4B5A63" stroke-width="2"/>
  <path d="M660 80 L940 80 M660 120 L940 120 M660 160 L940 160" stroke="#2B343B" stroke-width="1.5" opacity="0.6"/>
  <text x="668" y="28" fill="#5d7870" font-family="system-ui,sans-serif" font-size="10">MOULDING / LEAD BORDER</text>
  <text x="668" y="264" fill="#5d7870" font-family="system-ui,sans-serif" font-size="9">jewel glass only on windows  not here</text>
</svg>
