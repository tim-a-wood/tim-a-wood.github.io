<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Sky gradient — first real sky, pale gold-grey, the sun is near -->
    <linearGradient id="sky4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4B5A63"/>
      <stop offset="40%" stop-color="#2B343B"/>
      <stop offset="100%" stop-color="#1A2127"/>
    </linearGradient>
    <!-- Solar hint in sky -->
    <radialGradient id="sunHint4" cx="62%" cy="15%" r="35%">
      <stop offset="0%" stop-color="#C4962A" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#A85B32" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#07090B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig4" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A2127" stop-opacity="0"/>
      <stop offset="100%" stop-color="#07090B" stop-opacity="0.75"/>
    </radialGradient>
    <filter id="glow8s"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="glow18s"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="blur2s"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Sky — the first open air, pale and cold but ascending toward gold -->
  <rect width="800" height="500" fill="url(#sky4)"/>

  <!-- Solar hint — the sun is behind cloud/haze, its position felt not seen -->
  <rect width="800" height="500" fill="url(#sunHint4)"/>

  <!-- Distant broken tower — far background, atmospheric -->
  <rect x="480" y="40" width="55" height="380" fill="#2B343B" opacity="0.5"/>
  <!-- Broken top — jagged -->
  <polygon points="480,40 495,15 510,30 525,10 535,35 535,40" fill="#2B343B" opacity="0.5"/>
  <!-- Tower detail — slit windows -->
  <rect x="500" y="100" width="12" height="30" fill="#1A2127" opacity="0.6"/>
  <rect x="500" y="180" width="12" height="30" fill="#1A2127" opacity="0.6"/>
  <rect x="500" y="260" width="12" height="30" fill="#1A2127" opacity="0.6"/>

  <!-- Left main spire — massive, broken at top -->
  <rect x="60" y="80" width="120" height="420" fill="#1A2127"/>
  <!-- Broken top — catastrophic break, jagged shear -->
  <polygon points="60,80 80,20 105,55 120,10 145,45 160,25 175,60 180,80" fill="#1A2127"/>
  <!-- Spire surface detail -->
  <rect x="65" y="85" width="6" height="415" fill="#2B343B" opacity="0.4"/>
  <!-- Vertical buttress -->
  <rect x="58" y="200" width="15" height="300" fill="#0D1115" opacity="0.6"/>
  <rect x="165" y="180" width="15" height="320" fill="#0D1115" opacity="0.6"/>

  <!-- Sun disc carved into left spire face — ORDER OF THE SUN emblem, weathered -->
  <circle cx="120" cy="220" r="38" fill="none" stroke="#4B5A63" stroke-width="3" opacity="0.8"/>
  <circle cx="120" cy="220" r="26" fill="none" stroke="#4B5A63" stroke-width="2" opacity="0.6"/>
  <!-- Sun rays carved in stone -->
  <line x1="120" y1="178" x2="120" y2="262" stroke="#4B5A63" stroke-width="2" opacity="0.7"/>
  <line x1="78" y1="220" x2="162" y2="220" stroke="#4B5A63" stroke-width="2" opacity="0.7"/>
  <line x1="90" y1="190" x2="150" y2="250" stroke="#4B5A63" stroke-width="1.5" opacity="0.55"/>
  <line x1="150" y1="190" x2="90" y2="250" stroke="#4B5A63" stroke-width="1.5" opacity="0.55"/>
  <line x1="84" y1="208" x2="156" y2="232" stroke="#4B5A63" stroke-width="1" opacity="0.4"/>
  <line x1="84" y1="232" x2="156" y2="208" stroke="#4B5A63" stroke-width="1" opacity="0.4"/>
  <!-- Faint solar glow — the emblem catching the approaching sun -->
  <circle cx="120" cy="220" r="42" fill="#C4962A" opacity="0.05" filter="url(#glow18s)"/>

  <!-- Right main spire -->
  <rect x="620" y="110" width="120" height="390" fill="#1A2127"/>
  <!-- Broken top R -->
  <polygon points="620,110 630,40 650,70 668,30 685,65 700,45 720,80 740,110" fill="#1A2127"/>
  <!-- Spire surface detail -->
  <rect x="728" y="115" width="6" height="385" fill="#2B343B" opacity="0.4"/>
  <rect x="618" y="220" width="14" height="280" fill="#0D1115" opacity="0.6"/>
  <rect x="726" y="200" width="14" height="300" fill="#0D1115" opacity="0.6"/>

  <!-- Sun disc carved into right spire — partial, damaged by the catastrophic break -->
  <circle cx="680" cy="240" r="34" fill="none" stroke="#4B5A63" stroke-width="3" opacity="0.6"/>
  <!-- Broken — upper-right quadrant missing/shattered -->
  <path d="M 680 206 A 34 34 0 0 0 646 240" fill="none" stroke="#2B343B" stroke-width="6" opacity="0.9"/>
  <circle cx="680" cy="240" r="22" fill="none" stroke="#4B5A63" stroke-width="1.5" opacity="0.4"/>
  <line x1="680" y1="206" x2="680" y2="274" stroke="#4B5A63" stroke-width="2" opacity="0.5"/>
  <line x1="646" y1="240" x2="714" y2="240" stroke="#4B5A63" stroke-width="2" opacity="0.5"/>

  <!-- Debris between towers — rubble from the catastrophic break -->
  <!-- Fallen arch fragment -->
  <path d="M 200 340 Q 300 280 400 320 Q 500 360 580 330" fill="none" stroke="#2B343B" stroke-width="14" opacity="0.7"/>
  <path d="M 200 340 Q 300 280 400 320 Q 500 360 580 330" fill="none" stroke="#1A2127" stroke-width="8" opacity="0.6"/>

  <!-- Large fallen stone blocks -->
  <rect x="220" y="390" width="80" height="40" fill="#1A2127" transform="rotate(-8, 260, 410)"/>
  <rect x="490" y="380" width="70" height="35" fill="#1A2127" transform="rotate(6, 525, 397)"/>
  <rect x="340" y="410" width="120" height="30" fill="#2B343B" transform="rotate(-3, 400, 425)"/>

  <!-- Wind-caught dust / atmospheric particles — height and exposure -->
  <ellipse cx="350" cy="160" rx="80" ry="20" fill="#4B5A63" opacity="0.06" filter="url(#glow8s)"/>
  <ellipse cx="550" cy="120" rx="60" ry="15" fill="#4B5A63" opacity="0.05" filter="url(#glow8s)"/>

  <!-- Solar warmth on left spire face — the sun hitting the stone -->
  <rect x="60" y="80" width="120" height="200" fill="#C4962A" opacity="0.04" filter="url(#glow18s)"/>

  <!-- Ground -->
  <rect x="0" y="450" width="800" height="50" fill="#0D1115"/>
  <rect x="0" y="448" width="800" height="6" fill="#1A2127"/>

  <!-- Vignette -->
  <rect width="800" height="500" fill="url(#vig4)"/>
</svg>
