<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-label="Bone Warrens wall and platform texture concept">
  <defs>
    <pattern id="bw-wall" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect width="16" height="16" fill="#0D1115"/>
      <circle cx="4" cy="4" r="1.1" fill="#2B343B" opacity="0.5"/>
      <circle cx="12" cy="10" r="0.9" fill="#2B343B" opacity="0.45"/>
    </pattern>
    <pattern id="bw-rune" patternUnits="userSpaceOnUse" width="32" height="32">
      <rect width="32" height="32" fill="transparent"/>
      <path d="M4 16 L28 16 M16 4 L16 28 M8 8 L24 24 M24 8 L8 24" stroke="#3A7BD5" stroke-width="0.5" opacity="0.25"/>
    </pattern>
    <linearGradient id="bw-plat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A2127"/>
      <stop offset="50%" stop-color="#2B343B"/>
      <stop offset="100%" stop-color="#1A2127"/>
    </linearGradient>
  </defs>
  <rect width="960" height="280" fill="#07090B"/>
  <text x="16" y="28" fill="#5d7870" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em">BONE WARRENS  WALL / PLATFORM / BORDER (CONCEPT)</text>
  <rect x="16" y="48" width="280" height="200" fill="url(#bw-wall)" stroke="#2B343B" stroke-width="2"/>
  <rect x="16" y="48" width="280" height="200" fill="url(#bw-rune)"/>
  <text x="24" y="72" fill="#5d7870" font-family="system-ui,sans-serif" font-size="10">CAVE WALL</text>
  <text x="24" y="220" fill="#3A7BD5" font-family="system-ui,sans-serif" font-size="9" opacity="0.85">funerary glyph · AH-ARCANE</text>
  <rect x="320" y="140" width="300" height="52" rx="4" fill="url(#bw-plat)" stroke="#2B343B" stroke-width="2"/>
  <text x="328" y="128" fill="#5d7870" font-family="system-ui,sans-serif" font-size="10">BURIAL SLAB / FLOOR</text>
  <text x="328" y="208" fill="#5d7870" font-family="system-ui,sans-serif" font-size="9">crack · bone chip read</text>
  <rect x="660" y="48" width="280" height="200" fill="#0D1115" stroke="#3A7BD5" stroke-width="0.5" opacity="0.9"/>
  <rect x="672" y="60" width="256" height="176" fill="none" stroke="#3A7BD5" stroke-width="1.5" opacity="0.5"/>
  <text x="668" y="28" fill="#5d7870" font-family="system-ui,sans-serif" font-size="10">NICHE / ARCH BORDER</text>
  <text x="668" y="264" fill="#A85B32" font-family="system-ui,sans-serif" font-size="9">torch warm · AH-EMBER-6 edge only</text>
</svg>
