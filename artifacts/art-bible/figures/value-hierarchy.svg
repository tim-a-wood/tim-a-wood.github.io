<svg xmlns="http://www.w3.org/2000/svg" width="440" height="236" viewBox="0 0 440 236" role="img" aria-labelledby="t d">
  <title id="t">Readability value stack</title>
  <desc id="d">Foreground playable plane highest contrast; midground compressed; far background fog-lifted.</desc>
  <rect width="100%" height="100%" fill="#07090B"/>
  <text x="16" y="26" fill="#7E8E95" font-family="system-ui,sans-serif" font-size="13">Foreground (playable)</text>
  <rect x="16" y="36" width="408" height="52" fill="#2B343B" stroke="#4B5A63" stroke-width="2"/>
  <text x="16" y="110" fill="#7E8E95" font-family="system-ui,sans-serif" font-size="13">Midground (atmosphere)</text>
  <rect x="16" y="120" width="408" height="40" fill="#1A2127" stroke="#2B343B" stroke-width="1"/>
  <text x="16" y="186" fill="#7E8E95" font-family="system-ui,sans-serif" font-size="13">Far background (fog cluster)</text>
  <rect x="16" y="196" width="408" height="28" fill="#0D1115" opacity="0.92"/>
  <rect x="16" y="196" width="408" height="28" fill="#7E8E95" opacity="0.12"/>
</svg>
