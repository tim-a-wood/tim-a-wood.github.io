<svg xmlns="http://www.w3.org/2000/svg" width="420" height="280" viewBox="0 0 420 280" role="img" aria-labelledby="t d">
  <title id="t">Ashen Hollow default key light</title>
  <desc id="d">Upper-left key at about 35 degrees, cool fill from lower-right, rim reserved for hero reads.</desc>
  <rect width="100%" height="100%" fill="#1A2127"/>
  <!-- ground plane -->
  <path d="M0 220 L420 200 L420 280 L0 280 Z" fill="#0D1115"/>
  <!-- subject orb -->
  <ellipse cx="220" cy="150" rx="48" ry="56" fill="#2B343B" stroke="#4B5A63" stroke-width="2"/>
  <!-- key light rays upper-left -->
  <g opacity="0.55">
    <path d="M40 32 L220 120 L200 128 Z" fill="#9FD6C7"/>
    <path d="M72 48 L220 125 L205 132 Z" fill="#9FD6C7"/>
  </g>
  <text x="24" y="28" fill="#7E8E95" font-family="system-ui,sans-serif" font-size="12">Key (~35?)</text>
  <text x="280" y="248" fill="#7E8E95" font-family="system-ui,sans-serif" font-size="12">Cool fill</text>
  <text x="300" y="120" fill="#7E8E95" font-family="system-ui,sans-serif" font-size="11">Rim (interactables)</text>
  <!-- fill hint lower-right -->
  <path d="M380 260 Q320 200 260 180" stroke="#2D6662" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- rim tick -->
  <path d="M268 104 Q288 96 300 110" stroke="#9FD6C7" stroke-width="2" fill="none" opacity="0.7"/>
</svg>
