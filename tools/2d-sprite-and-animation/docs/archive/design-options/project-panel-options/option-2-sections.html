<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Panel Option 2 - Sections</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: rgba(22,30,42,0.96);
      --panel-soft: #111722;
      --border: rgba(255,255,255,0.09);
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #4493f8;
      --accent-soft: rgba(68,147,248,0.16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(180deg, #0a1016, #0d1117 46%, #101824);
      color: var(--text);
      font: 14px/1.5 "IBM Plex Sans", Inter, sans-serif;
    }
    .panel {
      width: min(360px, 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      padding: 16px;
    }
    .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .section + .section { margin-top: 14px; }
    .section h2 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .item {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel-soft);
      padding: 10px 12px;
    }
    .item + .item { margin-top: 8px; }
    .item.active { border-color: rgba(68,147,248,0.34); }
    .muted { color: var(--muted); font-size: 13px; }
    button {
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="toolbar">
      <strong>Projects</strong>
      <button>New Project</button>
    </div>
    <div class="section">
      <h2>Current</h2>
      <article class="item active">
        <strong>Forest Courier</strong>
        <div class="muted">Concepts · next Character</div>
      </article>
    </div>
    <div class="section">
      <h2>In Progress</h2>
      <article class="item">
        <strong>Temple Mechanic</strong>
        <div class="muted">Character · next Animations</div>
      </article>
    </div>
    <div class="section">
      <h2>Ready To Export</h2>
      <article class="item">
        <strong>Dockside Vendor</strong>
        <div class="muted">Review & Export · QA passed</div>
      </article>
    </div>
  </section>
</body>
</html>
