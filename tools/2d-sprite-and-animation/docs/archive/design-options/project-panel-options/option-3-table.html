<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Panel Option 3 - Table</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: rgba(22,30,42,0.96);
      --panel-soft: #111722;
      --border: rgba(255,255,255,0.09);
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #4493f8;
      --accent-soft: rgba(68,147,248,0.16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(180deg, #0a1016, #0d1117 46%, #101824);
      color: var(--text);
      font: 14px/1.5 "IBM Plex Sans", Inter, sans-serif;
    }
    .panel {
      width: min(380px, 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      padding: 16px;
    }
    .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 8px;
      border-top: 1px solid var(--border);
      text-align: left;
    }
    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }
    tr.active {
      background: var(--accent-soft);
    }
    button {
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="toolbar">
      <strong>Projects</strong>
      <button>New Project</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phase</th>
          <th>Next</th>
        </tr>
      </thead>
      <tbody>
        <tr class="active">
          <td>Forest Courier</td>
          <td>Concepts</td>
          <td>Character</td>
        </tr>
        <tr>
          <td>Temple Mechanic</td>
          <td>Character</td>
          <td>Animations</td>
        </tr>
        <tr>
          <td>Dockside Vendor</td>
          <td>Review</td>
          <td>Export</td>
        </tr>
      </tbody>
    </table>
  </section>
</body>
</html>
