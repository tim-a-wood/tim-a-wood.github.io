<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Panel Option 1 - Compact List</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: rgba(22,30,42,0.96);
      --panel-soft: #111722;
      --border: rgba(255,255,255,0.09);
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #4493f8;
      --accent-soft: rgba(68,147,248,0.16);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(180deg, #0a1016, #0d1117 46%, #101824);
      color: var(--text);
      font: 14px/1.5 "IBM Plex Sans", Inter, sans-serif;
    }
    .panel {
      width: min(340px, 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      padding: 16px;
    }
    .toolbar, .row, .actions { display: flex; gap: 8px; align-items: center; }
    .toolbar { justify-content: space-between; margin-bottom: 12px; }
    .list { display: grid; gap: 8px; }
    .item {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel-soft);
      padding: 10px 12px;
    }
    .item.active { border-color: rgba(68,147,248,0.34); box-shadow: inset 0 0 0 1px rgba(68,147,248,0.18); }
    .item strong { display: block; }
    .muted { color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
    }
    .pill.active { color: var(--accent); background: var(--accent-soft); }
    button {
      border: 1px solid var(--border);
      background: var(--panel-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="toolbar">
      <strong>Projects</strong>
      <div class="actions">
        <button>New</button>
        <button>Archive</button>
      </div>
    </div>
    <div class="list">
      <article class="item active">
        <div class="row" style="justify-content:space-between;">
          <strong>Forest Courier</strong>
          <span class="pill active">Current</span>
        </div>
        <div class="muted">Concepts · next Character</div>
      </article>
      <article class="item">
        <div class="row" style="justify-content:space-between;">
          <strong>Temple Mechanic</strong>
          <span class="pill">Queued</span>
        </div>
        <div class="muted">Character · next Animations</div>
      </article>
      <article class="item">
        <div class="row" style="justify-content:space-between;">
          <strong>Dockside Vendor</strong>
          <span class="pill">Ready</span>
        </div>
        <div class="muted">Review & Export · QA passed</div>
      </article>
    </div>
  </section>
</body>
</html>
