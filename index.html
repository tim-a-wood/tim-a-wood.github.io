                }
            });
        });
    }

    buildWorldInteractables() {
        this.layoutKeys = [];
        this.layoutMovers = [];

        const finalGatePos = getLayoutDoorWorldPosition('R1', 'R1-D2', 500, 1000);
        const r1GateTexture = roomFinalGateTextureKey('R1', this.finalGateState === 'UNLOCKED' ? 'open' : 'locked');
        this.finalGate = this.physics.add.staticImage(finalGatePos.x, finalGatePos.y, r1GateTexture).refreshBody();
        this.finalGate.setDepth(0.22);
        this.add.text(finalGatePos.x, finalGatePos.y - 62, 'sealed threshold', { fontSize: '11px', fill: '#d7b57b', stroke: '#000', strokeThickness: 2 }).setOrigin(0.5).setAlpha(0.78).setDepth(0.23);
        this.gateFeedbackText = this.add.text(500, 885, '', {
            fontSize: '11px', fill: '#ffd78a', stroke: '#000', strokeThickness: 2
        }).setOrigin(0.5).setVisible(false);

    createBranchReward(branchId, keyX, keyY, abilityX, abilityY) {
        const key = this.keyPickupGroup.create(keyX, keyY, 'keyItem').refreshBody();
        key.setData('branch', branchId);
        const node = this.abilityNodeGroup.create(abilityX, abilityY, 'abilityNode').refreshBody();
        node.setData('branch', branchId);
    }

    markRoomVisited(roomId) {
        if (!roomId) return;
        const previousCount = this.visitedRooms.size;
        this.visitedRooms.add(roomId);
        if (this.visitedRooms.size !== previousCount) this.mapNeedsRedraw = true;
    }

    getVisitedMapRooms() {
        if (TEMP_SHOW_FULL_MAP) return getRuntimeLayoutRooms();
        return getRuntimeLayoutRooms().filter((room) => this.visitedRooms.has(room.id));
    }

    getPlayerGlobalMapPoint() {
        const room = getLayoutRoom(this.currentRoomId);
        if (!room || !ROOM_IDS[this.currentRoomId]) return null;

        ensureLayoutRoomShape(room);
        const localX = Phaser.Math.Clamp(this.player.x - ROOM_IDS[this.currentRoomId].start, 0, room.size.width);
        const localY = Phaser.Math.Clamp(this.player.y, 0, room.size.height);
        return {
            x: room.global.x + ((localX - (room.size.width / 2)) * GLOBAL_ROOM_PREVIEW_SCALE),
            y: room.global.y + ((localY - (room.size.height / 2)) * GLOBAL_ROOM_PREVIEW_SCALE)
        };
    }

    getMapProjection(rooms) {
        if (!rooms.length) return null;

        const xs = [];
        const ys = [];
        rooms.forEach((room) => {
            const previewHalfWidth = (room.size.width * GLOBAL_ROOM_PREVIEW_SCALE) / 2;
            const previewHalfHeight = (room.size.height * GLOBAL_ROOM_PREVIEW_SCALE) / 2;
            xs.push(room.global.x - previewHalfWidth, room.global.x + previewHalfWidth);
            ys.push(room.global.y - previewHalfHeight, room.global.y + previewHalfHeight);
        });

        const bounds = {
            minX: Math.min(...xs) - 220,
            maxX: Math.max(...xs) + 220,
            minY: Math.min(...ys) - 220,
            maxY: Math.max(...ys) + 220
        };
        const width = Math.max(bounds.maxX - bounds.minX, 1);
        const height = Math.max(bounds.maxY - bounds.minY, 1);
        const baseScale = Math.min((IN_GAME_MAP.mapWidth - 80) / width, (IN_GAME_MAP.mapHeight - 80) / height);
        const scale = baseScale * this.mapZoom;
        const contentWidth = width * scale;
        const contentHeight = height * scale;
        const mapCenterX = IN_GAME_MAP.mapX + (IN_GAME_MAP.mapWidth / 2);
        const mapCenterY = IN_GAME_MAP.mapY + (IN_GAME_MAP.mapHeight / 2);
        const focus = TEMP_SHOW_FULL_MAP
            ? {
                x: bounds.minX + (width / 2),
                y: bounds.minY + (height / 2)
            }
            : (this.getPlayerGlobalMapPoint() || {
                x: bounds.minX + (width / 2),
                y: bounds.minY + (height / 2)
            });

        let offsetX = mapCenterX - ((focus.x - bounds.minX) * scale);
        let offsetY = mapCenterY - ((focus.y - bounds.minY) * scale);

        if (contentWidth <= IN_GAME_MAP.mapWidth) {
            offsetX = IN_GAME_MAP.mapX + ((IN_GAME_MAP.mapWidth - contentWidth) / 2);
        } else {
            offsetX = Phaser.Math.Clamp(offsetX, IN_GAME_MAP.mapX + IN_GAME_MAP.mapWidth - contentWidth, IN_GAME_MAP.mapX);
        }

        if (contentHeight <= IN_GAME_MAP.mapHeight) {
            offsetY = IN_GAME_MAP.mapY + ((IN_GAME_MAP.mapHeight - contentHeight) / 2);
        } else {
            offsetY = Phaser.Math.Clamp(offsetY, IN_GAME_MAP.mapY + IN_GAME_MAP.mapHeight - contentHeight, IN_GAME_MAP.mapY);
        }

        return {
            bounds,
            scale,
            offsetX,
            offsetY
        };
    }

    mapGlobalToScreen(x, y, projection) {
        return {
            x: projection.offsetX + ((x - projection.bounds.minX) * projection.scale),
            y: projection.offsetY + ((y - projection.bounds.minY) * projection.scale)
        };
    }

    getMapRoomPoints(room, projection) {
        const previewScale = projection.scale * GLOBAL_ROOM_PREVIEW_SCALE;
        const center = this.mapGlobalToScreen(room.global.x, room.global.y, projection);
        return room.polygon.map(([x, y]) => ({
            x: center.x + ((x - (room.size.width / 2)) * previewScale),
            y: center.y + ((y - (room.size.height / 2)) * previewScale)
        }));
    }

    getPlayerMapPosition(projection) {
        const point = this.getPlayerGlobalMapPoint();
        if (!point) return null;
        return this.mapGlobalToScreen(point.x, point.y, projection);
    }

    clearMapLabels() {
        this.mapRoomLabels.forEach((label) => label.destroy());
        this.mapRoomLabels = [];
    }

    drawMapOverlay() {
        if (!this.mapGraphics) return;

        const rooms = this.getVisitedMapRooms();
        const projection = this.getMapProjection(rooms);

        this.mapGraphics.clear();
        this.clearMapLabels();

        this.mapGraphics.fillStyle(0x071018, 1);
        this.mapGraphics.fillRect(IN_GAME_MAP.mapX, IN_GAME_MAP.mapY, IN_GAME_MAP.mapWidth, IN_GAME_MAP.mapHeight);

        if (!rooms.length || !projection) {
            if (this.mapCurrentRoomText) this.mapCurrentRoomText.setText('Current: map unavailable');
            if (this.mapVisitedText) this.mapVisitedText.setText(TEMP_SHOW_FULL_MAP ? 'Map: full layout' : `Visited ${this.visitedRooms.size}/${ROOM_SEQUENCE.length}`);
            if (this.mapZoomText) this.mapZoomText.setText(`Zoom ${Math.round(this.mapZoom * 100)}%`);
            const emptyLabel = this.add.text(CONFIG.W / 2, IN_GAME_MAP.mapY + (IN_GAME_MAP.mapHeight / 2), 'No visited rooms to display.', {
                fontSize: '14px',
                fill: '#d8e7f3',
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5).setScrollFactor(0).setDepth(942);
            if (this.mapClipMask) emptyLabel.setMask(this.mapClipMask);
            this.mapRoomLabels.push(emptyLabel);
            this.mapNeedsRedraw = false;
            return;
        }

        const gridStep = Math.max(24, 48 * projection.scale);
        this.mapGraphics.lineStyle(1, 0x48637c, 0.28);
        for (let x = IN_GAME_MAP.mapX; x <= IN_GAME_MAP.mapX + IN_GAME_MAP.mapWidth; x += gridStep) {
            this.mapGraphics.lineBetween(x, IN_GAME_MAP.mapY, x, IN_GAME_MAP.mapY + IN_GAME_MAP.mapHeight);
        }
        for (let y = IN_GAME_MAP.mapY; y <= IN_GAME_MAP.mapY + IN_GAME_MAP.mapHeight; y += gridStep) {
            this.mapGraphics.lineBetween(IN_GAME_MAP.mapX, y, IN_GAME_MAP.mapX + IN_GAME_MAP.mapWidth, y);
        }

        rooms.forEach((room) => {
            const points = this.getMapRoomPoints(room, projection);
            const isCurrentRoom = room.id === this.currentRoomId;

            this.mapGraphics.beginPath();
            points.forEach((point, index) => {
                if (index === 0) this.mapGraphics.moveTo(point.x, point.y);
                else this.mapGraphics.lineTo(point.x, point.y);
            });
            this.mapGraphics.closePath();
            this.mapGraphics.fillStyle(isCurrentRoom ? 0x467ead : 0x183046, isCurrentRoom ? 0.9 : 0.82);
            this.mapGraphics.fillPath();
            this.mapGraphics.lineStyle(isCurrentRoom ? 2.5 : 1.5, isCurrentRoom ? 0xffd166 : 0x7fb2df, 1);
            this.mapGraphics.strokePath();

            const center = this.mapGlobalToScreen(room.global.x, room.global.y, projection);
            const roomLabel = this.add.text(center.x, center.y, room.id, {
                fontSize: '12px',
                fill: '#f0f7ff',
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5).setScrollFactor(0).setDepth(942);
            if (this.mapClipMask) roomLabel.setMask(this.mapClipMask);
            this.mapRoomLabels.push(roomLabel);
        });

        const playerMarker = this.getPlayerMapPosition(projection);
        if (playerMarker) {
            this.mapGraphics.lineStyle(2, 0xe8f8ff, 1);
            this.mapGraphics.strokeCircle(playerMarker.x, playerMarker.y, 8);
            this.mapGraphics.fillStyle(0x3be1ff, 1);
            this.mapGraphics.fillCircle(playerMarker.x, playerMarker.y, 4);
        }

        const currentRoom = getLayoutRoom(this.currentRoomId);
        const currentName = currentRoom?.name || this.currentRoomId;
        if (this.mapCurrentRoomText) this.mapCurrentRoomText.setText(`Current: ${this.currentRoomId} - ${currentName}`);
        if (this.mapVisitedText) this.mapVisitedText.setText(TEMP_SHOW_FULL_MAP ? 'Map: full layout' : `Visited ${this.visitedRooms.size}/${ROOM_SEQUENCE.length}`);
        if (this.mapZoomText) this.mapZoomText.setText(`Zoom ${Math.round(this.mapZoom * 100)}%`);
        this.mapNeedsRedraw = false;
    }

    setMapZoom(nextZoom) {
        const clampedZoom = Phaser.Math.Clamp(Number(nextZoom.toFixed(2)), 0.6, 3);
        if (clampedZoom === this.mapZoom) return false;
        this.mapZoom = clampedZoom;
        this.mapNeedsRedraw = true;
        if (this.isMapOpen) this.drawMapOverlay();
        return true;
    }

    adjustMapZoom(delta) {
        this.setMapZoom(this.mapZoom + delta);
    }

    resetMapPinch() {
        this.mapPinchActive = false;
        this.mapPinchStartDistance = 0;
        this.mapPinchStartZoom = this.mapZoom;
    }

    getTouchCanvasPoint(touch) {
        const rect = this.game.canvas.getBoundingClientRect();
        const gameWidth = this.scale.gameSize.width;
        const gameHeight = this.scale.gameSize.height;
        return {
            x: ((touch.clientX - rect.left) / rect.width) * gameWidth,
            y: ((touch.clientY - rect.top) / rect.height) * gameHeight
        };
    }

    isPointInMapPanel(x, y) {
        return x >= IN_GAME_MAP.panelX &&
            x <= IN_GAME_MAP.panelX + IN_GAME_MAP.panelWidth &&
            y >= IN_GAME_MAP.panelY &&
            y <= IN_GAME_MAP.panelY + IN_GAME_MAP.panelHeight;
    }

    beginMapPinch(touchA, touchB) {
        const pointA = this.getTouchCanvasPoint(touchA);
        const pointB = this.getTouchCanvasPoint(touchB);
        const centerX = (pointA.x + pointB.x) / 2;
        const centerY = (pointA.y + pointB.y) / 2;
        if (!this.isPointInMapPanel(centerX, centerY)) return false;

        this.mapPinchActive = true;
        this.mapPinchStartDistance = Phaser.Math.Distance.Between(pointA.x, pointA.y, pointB.x, pointB.y);
        this.mapPinchStartZoom = this.mapZoom;
        return this.mapPinchStartDistance > 0;
    }

    updateMapPinch(touchA, touchB) {
        if (!this.mapPinchActive || this.mapPinchStartDistance <= 0) return;

        const pointA = this.getTouchCanvasPoint(touchA);
        const pointB = this.getTouchCanvasPoint(touchB);
        const distance = Phaser.Math.Distance.Between(pointA.x, pointA.y, pointB.x, pointB.y);
        if (distance <= 0) return;

        this.setMapZoom(this.mapPinchStartZoom * (distance / this.mapPinchStartDistance));
    }

    toggleMapOverlay() {
        if (!this.mapGraphics || this.inRoomTransition || this.isGameOver) return;

        this.isMapOpen = !this.isMapOpen;
        const overlayObjects = [
            this.mapOverlayBackdrop,
            this.mapPanel,
            this.mapPanelBorder,
            this.mapGraphics,
            this.mapTitleText,
            this.mapHintText,
            this.mapCloseText,
            this.mapCurrentRoomText,
            this.mapVisitedText,
            this.mapRevealHintText,
            this.mapZoomText,
            this.mapZoomInText,
            this.mapZoomOutText
        ].filter(Boolean);
        overlayObjects.forEach((obj) => obj.setVisible(this.isMapOpen));
        [
            this.mapOverlayBackdrop,
            this.mapPanel,
            this.mapCloseText,
            this.mapZoomInText,
            this.mapZoomOutText
        ].filter((obj) => obj?.input).forEach((obj) => {
            obj.input.enabled = this.isMapOpen;
        });

        if (this.mapButtonText) {
            this.mapButtonText.setText(this.isMapOpen ? '[ CLOSE MAP ]' : '[ MAP ]');
        }

        if (this.isMapOpen) {
            this.inputState.left = false;
            this.inputState.right = false;
            this.inputState.jump = false;
            this.resetMapPinch();
            this.player.setVelocity(0, 0);
            this.physics.world.pause();
            if (this.interactBtn) {
                this.interactBtn.setVisible(false);
                this.interactBtnLabel.setVisible(false);
            }
            this.mapNeedsRedraw = true;
            this.drawMapOverlay();
            return;
        }

        this.resetMapPinch();
        this.clearMapLabels();
        if (!this.isGameOver) this.physics.world.resume();
    }

    hasInteractableNearby() {
        const room = this.currentRoomId;
        const px = this.player.x;
        const py = this.player.y;
        const dist = (x, y) => Phaser.Math.Distance.Between(px, py, x, y);
        if (room === 'R1' && this.r1ToR2Door && dist(this.r1ToR2Door.x, this.r1ToR2Door.y) < 130) return true;
        if (room === 'R2' && this.r2ToR1Door && dist(this.r2ToR1Door.x, this.r2ToR1Door.y) < 130) return true;
        if (room === 'R2' && this.branchDoors && this.branchDoors.length) {
            if (this.branchDoors.some((d) => dist(d.x, d.y) < 140)) return true;
        }
        if (room === 'R3') {
            if (this.r3ReturnDoor && dist(this.r3ReturnDoor.x, this.r3ReturnDoor.y) < 130) return true;
            if (this.r3ToR4Door && dist(this.r3ToR4Door.x, this.r3ToR4Door.y) < 130) return true;
        }
        if (room === 'R4' && this.r4ToR3Door && this.r4ToR3Door.visible) {
            if (dist(this.r4ToR3Door.x, this.r4ToR3Door.y) < 130) return true;
        }
        if (room === 'R11' && this.r11ToR3Door) {
            if (dist(this.r11ToR3Door.x, this.r11ToR3Door.y) < 130) return true;
        }
        if (room === 'R5' && this.r5ToR6Door && dist(this.r5ToR6Door.x, this.r5ToR6Door.y) < 130) return true;
        if (room === 'R5' && this.r5ToR2Door && dist(this.r5ToR2Door.x, this.r5ToR2Door.y) < 130) return true;
        if (room === 'R5' && this.r5ToR8Door && dist(this.r5ToR8Door.x, this.r5ToR8Door.y) < 130) return true;
        if (room === 'R7' && this.r7ToR8Door && dist(this.r7ToR8Door.x, this.r7ToR8Door.y) < 130) return true;
        if (room === 'R8' && this.r8ToR7Door && dist(this.r8ToR7Door.x, this.r8ToR7Door.y) < 130) return true;
        if (room === 'R8' && this.r8ToR5Door && dist(this.r8ToR5Door.x, this.r8ToR5Door.y) < 130) return true;
        if (this.layoutMovers && this.layoutMovers.some((mover) => mover.getData('roomId') === this.currentRoomId && dist(mover.x, mover.y) < 140)) return true;
        if (room === 'R1' && this.finalGate && dist(this.finalGate.x, this.finalGate.y) < 130) return true;
        return false;
    }

    setCurrentRoom(roomId) {
        this.previousRoomId = this.currentRoomId;
        this.currentRoomId = roomId;
        this.markRoomVisited(roomId);
        const room = ROOM_IDS[roomId];
        const style = deriveRoomEnvironmentRuntimeStyle(roomId);
        const contrastQa = isContrastQaEnvironment(roomId);
        const camRect = getRoomCameraChamberBoundsWorld(roomId);
        this.cameras.main.setBounds(camRect.x, camRect.y, camRect.width, camRect.height);
        this.cameras.main.setBackgroundColor(RUNTIME_REVIEW_CAPTURE_MODE ? '#050709' : getEnvironmentBackgroundColor(roomId));
        if (this.envKitText) {
            this.envKitText.setText(
                `KIT: ${style.wallFamily || 'default'} · ${style.platformFamily || 'default'} · ${style.doorFamily || 'default'}`
            );
        }
        if (this.starField && this.starField.setTint) {
            if (contrastQa) {
                this.starField.setAlpha(0);
            } else {
                this.starField.setTint(getEnvironmentStarfieldTint(roomId));
                this.starField.setAlpha(RUNTIME_REVIEW_CAPTURE_MODE ? 0 : (this.roomBackgroundSprites?.[roomId] ? 0.3 : 1));
            }
        }
        if (this.roomBackgroundSprites) {
            Object.entries(this.roomBackgroundSprites).forEach(([id, sprite]) => {
                if (!sprite) return;
                sprite.setVisible(!contrastQa && id === roomId);
            });
        }
        if (this.roomBackgroundFeatherSprites) {
            Object.entries(this.roomBackgroundFeatherSprites).forEach(([id, sprites]) => {
                (sprites || []).forEach((sprite) => {
                    if (!sprite) return;
                    sprite.setVisible(!contrastQa && id === roomId);
                });
            });
        }
        if (this.roomMidgroundSprites) {
            Object.entries(this.roomMidgroundSprites).forEach(([id, sprite]) => {
                const sprites = Array.isArray(sprite) ? sprite : [sprite];
                sprites.forEach((entry) => {
                    if (!entry) return;
                    entry.setVisible(!contrastQa && id === roomId);
                });
            });
        }
        this.roomEnteredAtMs = this.time.now;
        this.roomStallLogged = false;
        this.logNavigationEvent('room_enter', { room: roomId, from: this.previousRoomId || 'NONE' });
    }

    transitionToRoom(targetRoomId, targetX, targetY, statusLabel, options = {}) {
        if (this.inRoomTransition) return;
        const sourceY = this.player.y;
        const room = ROOM_IDS[targetRoomId];
        const roomMid = room.start + (room.width / 2);
        const entryEdge = options.entrySide || (targetX <= roomMid ? 'left' : 'right');
        const resolvedY = options.preserveY === false ? targetY : sourceY;
        const isVertical = entryEdge === 'top' || entryEdge === 'bottom';
        const preserveFacing = options.preserveFacing === true;
        const continuous = options.continuous === true;
        const preserveVelocity = continuous && options.preserveVelocity === true;
        const sourceVelocityX = this.player.body?.velocity?.x || 0;
        const sourceVelocityY = this.player.body?.velocity?.y || 0;
        const entryX = entryEdge === 'left' ? room.start + 56
            : entryEdge === 'right' ? room.end - 56
                : targetX;
        const verticalOffset = 180;
        let entryY;
        if (isVertical) {
            const targetVertical = targetY;
            const requestedDir = options.verticalDirection || 'auto';
            const direction = requestedDir === 'auto'
                ? (entryEdge === 'top' ? 'down' : 'up')
                : requestedDir;

            if (direction === 'up') {
                entryY = Math.min(CONFIG.WORLD_HEIGHT - 40, targetVertical + verticalOffset);
            } else {
                entryY = Math.max(40, targetVertical - verticalOffset);
            }
        } else {
            entryY = resolvedY;
        }
        const facingLeft = preserveFacing ? this.player.flipX : entryEdge === 'right';
        const transitionSpeedPxPerSec = CONFIG.PLAYER_SPEED;
        const entryDistancePx = isVertical
            ? Math.abs(targetY - entryY)
            : Math.abs(targetX - entryX);
        const entryDurationMs = Phaser.Math.Clamp(
            Math.round((entryDistancePx / transitionSpeedPxPerSec) * 1000),
            120,
            420
        );

        const clearBodyContactState = (body) => {
            if (!body) return;
            if (typeof body.resetFlags === 'function') {
                body.resetFlags(true);
            }
            if (body.touching) {
                body.touching.none = true;
                body.touching.up = false;
                body.touching.down = false;
                body.touching.left = false;
                body.touching.right = false;
            }
            if (body.wasTouching) {
                body.wasTouching.none = true;
                body.wasTouching.up = false;
                body.wasTouching.down = false;
                body.wasTouching.left = false;
                body.wasTouching.right = false;
            }
            if (body.blocked) {
                body.blocked.none = true;
                body.blocked.up = false;
                body.blocked.down = false;
                body.blocked.left = false;
                body.blocked.right = false;
            }
            body.embedded = false;
        };
        const finalizeStatus = () => {
            if (targetRoomId === 'R1') {
                this.setStatusMessage(`${statusLabel} | ${this.getR1ContextPrompt()}`);
            } else {
                this.setStatusMessage(statusLabel);
            }
        };

        if (continuous) {
            this.transitionCooldownUntil = this.time.now + 320;
            this.setCurrentRoom(targetRoomId);
            this.player.setFlipX(facingLeft);
            this.player.body.enable = true;
            this.player.setPosition(targetX, targetY);
            this.player.body.reset(targetX, targetY);
            clearBodyContactState(this.player.body);

            if (preserveVelocity) {
                let nextVelocityY = sourceVelocityY;
                if (entryEdge === 'top' && nextVelocityY <= 0) nextVelocityY = 24;
                else if (entryEdge === 'bottom' && nextVelocityY >= 0) nextVelocityY = -24;
                const clampedVelocity = {
                    x: Phaser.Math.Clamp(sourceVelocityX, -CONFIG.PLAYER_SPEED, CONFIG.PLAYER_SPEED),
                    y: Phaser.Math.Clamp(nextVelocityY, -520, 520)
                };
                this.player.setVelocity(clampedVelocity.x, clampedVelocity.y);
                this.continuousTransferVelocity = clampedVelocity;
                this.continuousTransferFrames = 4;
            } else {
                this.continuousTransferVelocity = null;
                this.continuousTransferFrames = 0;
            }

            this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
            this.cameras.main.setFollowOffset(0, 60);
            this.cameras.main.centerOn(this.player.x, this.player.y);
            this.tweens.killTweensOf(this.transitionOverlay);
            this.transitionOverlay.setAlpha(0.16);
            this.tweens.add({
                targets: this.transitionOverlay,
                alpha: 0,
                duration: 120,
                ease: 'Linear'
            });
            finalizeStatus();
            return;
        }

        this.inRoomTransition = true;
        this.transitionCooldownUntil = this.time.now + 700;
        this.cameras.main.stopFollow();

        this.tweens.add({
            targets: this.transitionOverlay,
            alpha: 1,
            duration: 140,
            onComplete: () => {
                this.setCurrentRoom(targetRoomId);
                this.player.setFlipX(facingLeft);

                const finalizeTransition = () => {
                    finalizeStatus();

                    this.tweens.add({
                        targets: this.transitionOverlay,
                        alpha: 0,
                        duration: 200,
                        ease: 'Linear',
                        onComplete: () => {
                            this.inRoomTransition = false;
                        }
                    });
                };

                this.player.body.enable = false;
                this.player.setPosition(entryX, entryY);

                this.cameras.main.centerOn(entryX, entryY);
                this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
                this.cameras.main.setFollowOffset(0, 60);

                const tweenProps = { targets: this.player, duration: entryDurationMs, ease: 'Linear' };
                if (entryEdge === 'top' || entryEdge === 'bottom') tweenProps.y = targetY;
                else tweenProps.x = targetX;

                this.tweens.add({
                    ...tweenProps,
                    onComplete: () => {
                        this.player.body.enable = true;
                        this.player.body.reset(this.player.x, this.player.y);
                        finalizeTransition();
                    }
                });
            }
        });
    }

    tryTraverseOpenEdgeEntrance() {
        const roomId = this.currentRoomId;
        const room = getLayoutRoom(roomId);
        const roomBounds = ROOM_IDS[roomId];
        if (!room || !roomBounds || !Array.isArray(room.edgeLinks) || !room.edgeLinks.length) return false;

        const localPlayer = {
            x: this.player.x - roomBounds.start,
            y: this.player.y
        };
        const velocity = this.player.body?.velocity || { x: 0, y: 0 };
        let bestCandidate = null;

        room.edgeLinks.forEach((link) => {
            if (!isLayoutRoomEdgeRemoved(roomId, link.edgeIndex) || !isLayoutRoomEdgeRemoved(link.targetRoomId, link.targetEdgeIndex)) {
                return;
            }
            if (hasLayoutDoorNearEdge(roomId, link.edgeIndex) || hasLayoutDoorNearEdge(link.targetRoomId, link.targetEdgeIndex)) {
                return;
            }

            const sourceEdge = getLayoutRoomEdge(roomId, link.edgeIndex);
            const targetEdge = getLayoutRoomEdge(link.targetRoomId, link.targetEdgeIndex);
            const targetRoom = getLayoutRoom(link.targetRoomId);
            if (!sourceEdge || !targetEdge || !targetRoom || !ROOM_IDS[link.targetRoomId]) return;

            const closest = closestPointOnSegment(
                localPlayer,
                [sourceEdge.start.x, sourceEdge.start.y],
                [sourceEdge.end.x, sourceEdge.end.y]
            );
            if (closest.distance > 28) return;

            const sourceNormal = getPolygonEdgeOutwardNormal(room.polygon, link.edgeIndex);
            const signedDistance = ((localPlayer.x - closest.point.x) * sourceNormal.x) + ((localPlayer.y - closest.point.y) * sourceNormal.y);
            const velocityDot = (velocity.x * sourceNormal.x) + (velocity.y * sourceNormal.y);
            const boundaryBlocked =
                (sourceNormal.y > 0.5 && this.player.body?.blocked?.down) ||
                (sourceNormal.y < -0.5 && this.player.body?.blocked?.up) ||
                (sourceNormal.x > 0.5 && this.player.body?.blocked?.right) ||
                (sourceNormal.x < -0.5 && this.player.body?.blocked?.left);
            if (signedDistance < -8 && velocityDot < 10 && !boundaryBlocked) return;

            if (!bestCandidate || closest.distance < bestCandidate.distance) {
                bestCandidate = {
                    link,
                    targetRoom,
                    sourceEdge,
                    targetEdge,
                    distance: closest.distance,
                    t: closest.t
                };
            }
        });

        if (!bestCandidate) return false;

        const { link, targetRoom, targetEdge, t } = bestCandidate;
        const targetNormal = getPolygonEdgeOutwardNormal(targetRoom.polygon, link.targetEdgeIndex);
        const targetT = isLayoutEdgeLinkReversed(roomId, link.edgeIndex, link.targetRoomId, link.targetEdgeIndex) ? 1 - t : t;
        const targetX = targetEdge.start.x + ((targetEdge.end.x - targetEdge.start.x) * targetT);
        const targetY = targetEdge.start.y + ((targetEdge.end.y - targetEdge.start.y) * targetT);
        const spawnLocalX = Phaser.Math.Clamp(targetX - (targetNormal.x * 40), 32, targetRoom.size.width - 32);
        const spawnLocalY = Phaser.Math.Clamp(targetY - (targetNormal.y * 40), 48, targetRoom.size.height - 48);
        const entrySide = getEntrySideFromNormal(targetNormal);

        this.transitionToRoom(
            link.targetRoomId,
            ROOM_IDS[link.targetRoomId].start + spawnLocalX,
            spawnLocalY,
            `Entrance: ${roomId} -> ${link.targetRoomId}`,
            {
                entrySide,
                preserveY: false,
                preserveFacing: true,
                preserveVelocity: true,
                continuous: true
            }
        );
        return true;
    }

    getR1ContextPrompt() {
        if (this.finalGateState === 'LOCKED_KEY_ITEMS') return 'Next: collect remaining key items.';
        if (this.finalGateState === 'LOCKED_ABILITIES') return 'Next: awaken remaining abilities.';
        if (!this.r9ShellComplete) return 'Gate ready: interact to enter final area.';
        return 'Loop complete: proceed to final routing.';
    }

    logNavigationEvent(type, details = {}) {
        this.navigationEvents.push({
            type,
            room: this.currentRoomId,
            atMs: this.time.now,
            ...details
        });
    }

    logWrongTurn(reason) {
        this.logNavigationEvent('wrong_turn', { reason });
    }

    recomputeProgressionCounts() {
        this.keyItemsCollected = Number(this.keyItemA) + Number(this.keyItemB) + Number(this.keyItemC);
        this.abilitiesUnlocked = Number(this.abilityA) + Number(this.abilityB) + Number(this.abilityC);
        if (this.keyItemsCollected < 3) this.finalGateState = 'LOCKED_KEY_ITEMS';
        else if (this.abilitiesUnlocked < 3) this.finalGateState = 'LOCKED_ABILITIES';
        else this.finalGateState = 'UNLOCKED';

        if (this.finalGate) {
            this.finalGate.setTexture(roomFinalGateTextureKey('R1', this.finalGateState === 'UNLOCKED' ? 'open' : 'locked'));
        }
        if (this.gateStateText) {
            this.gateStateText.setText(`Gate: ${this.finalGateState}\nKeys ${this.keyItemsCollected}/3 | Abilities ${this.abilitiesUnlocked}/3`);
        }
        this.refreshBranchBoard();
    }

    refreshObjectiveText() {
        if (this.finalGateState !== 'UNLOCKED') {
            this.objectiveText.setText('OBJECTIVE: Crawl branches R3-R8, collect 3 keys + unlock 3 abilities.');
            return;
        }
        if (!this.r9ShellComplete) {
            this.objectiveText.setText('OBJECTIVE: Enter final gate and clear R9 shell.');
            return;
        }
        this.objectiveText.setText('OBJECTIVE: Reach R10 exit, then use right-edge return link to R1.');
    }

    emitGateReaction(branchId) {
        this.gateReactionFrames = 150;
        if (!this.gateFeedbackText) return;
        this.gateFeedbackText.setText(
            `Gate reacts to Key ${branchId}: ${this.keyItemsCollected}/3 key runes lit`
        );
        this.gateFeedbackText.setVisible(true);
    }

    collectKeyItem(item) {
        if (!item.active) return;
        const branch = item.getData('branch');
        const map = { A: 'keyItemA', B: 'keyItemB', C: 'keyItemC' };
        if (this[map[branch]]) return;

        this[map[branch]] = true;
        item.disableBody(true, true);
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.emitGateReaction(branch);
        this.logNavigationEvent('key_collected', { branch });
        this.setStatusMessage(`Key Item ${branch} secured (${this.keyItemsCollected}/3).`);
    }

    collectAbility(node) {
        if (!node.active) return;
        const branch = node.getData('branch');
        const keyMap = { A: 'keyItemA', B: 'keyItemB', C: 'keyItemC' };
        const abilityMap = { A: 'abilityA', B: 'abilityB', C: 'abilityC' };

        if (!this[keyMap[branch]]) {
            this.setStatusMessage(`Branch ${branch}: claim Key Item first.`);
            return;
        }
        if (this[abilityMap[branch]]) return;

        this[abilityMap[branch]] = true;
        node.disableBody(true, true);
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.logNavigationEvent('ability_unlocked', { branch });
        this.setStatusMessage(`Ability Unlock ${branch} awakened (${this.abilitiesUnlocked}/3).`);
    }

    collectRuntimeKey(key) {
        if (!key.active) return;
        const targetId = key.getData('unlocksTarget');
        const label = key.getData('label') || key.getData('layoutId');
        key.disableBody(true, true);

        let handled = false;
        if (targetId) {
            const mover = this.layoutMovers.find((entry) => entry.getData('layoutId') === targetId);
            if (mover) {
                mover.setData('locked', false);
                mover.clearTint();
                handled = true;
                this.setStatusMessage(`${label} unlocked mover ${targetId}.`);
            }
        }

        if (!handled) {
            this.setStatusMessage(`${label} collected.`);
        }
    }

    updateRuntimeMovers() {
        if (!this.layoutMovers || this.inRoomTransition) return;

        this.layoutMovers.forEach((mover) => {
            if (!mover.active) return;
            if (!mover.getData('moving')) {
                mover.body.updateFromGameObject();
                return;
            }

            const targetX = mover.getData('targetX');
            const targetY = mover.getData('targetY');
            const dx = targetX - mover.x;
            const dy = targetY - mover.y;
            const dist = Math.hypot(dx, dy);
            const speed = mover.getData('speed') || 80;

            if (dist <= speed * (1 / 60)) {
                mover.setPosition(targetX, targetY);
                mover.setData('moving', false);
                mover.setData('forward', targetX === mover.getData('startX') && targetY === mover.getData('startY'));
                mover.body.updateFromGameObject();
                return;
            }

            const step = Math.min(dist, speed * (1 / 60));
            mover.setPosition(
                mover.x + ((dx / dist) * step),
                mover.y + ((dy / dist) * step)
            );
            mover.body.updateFromGameObject();
        });
    }

    sustainContinuousTransferMomentum() {
        if (!this.player?.body || this.continuousTransferFrames <= 0 || !this.continuousTransferVelocity) return;

        const body = this.player.body;
        if (typeof body.resetFlags === 'function') {
            body.resetFlags(true);
        }
        if (body.touching) {
            body.touching.none = true;
            body.touching.up = false;
            body.touching.down = false;
            body.touching.left = false;
            body.touching.right = false;
        }
        if (body.wasTouching) {
            body.wasTouching.none = true;
            body.wasTouching.up = false;
            body.wasTouching.down = false;
            body.wasTouching.left = false;
            body.wasTouching.right = false;
        }
        if (body.blocked) {
            body.blocked.none = true;
            body.blocked.up = false;
            body.blocked.down = false;
            body.blocked.left = false;
            body.blocked.right = false;
        }
        body.embedded = false;

        const carryX = this.continuousTransferVelocity.x;
        const carryY = this.continuousTransferVelocity.y;
        if (Math.abs(carryX) > Math.abs(body.velocity.x)) {
            this.player.setVelocityX(carryX);
        }
        if ((carryY >= 0 && body.velocity.y < carryY) || (carryY < 0 && body.velocity.y > carryY)) {
            this.player.setVelocityY(carryY);
        }

        this.continuousTransferFrames -= 1;
        if (this.continuousTransferFrames <= 0) {
            this.continuousTransferVelocity = null;
        }
    }

    handleDebugAnimationOverride() {
        if (!this.debugAnimationKeys) return;
        Object.entries(this.debugAnimationKeys).forEach(([code, key]) => {
            if (!key || !Phaser.Input.Keyboard.JustDown(key)) return;
            const clip = WORKBENCH_HERO_EXPORT.debugBindings[code];
            this.debugAnimationOverride = clip;
            if (clip) {
                this.setStatusMessage(`Debug animation override: ${clip}. Press 0 to return to auto.`, 180);
            } else {
                this.setStatusMessage('Debug animation override cleared.', 120);
            }
        });
    }

    triggerDebugActionPreview(clip) {
        this.debugActionClip = clip;
        this.debugActionFramesRemaining = 20;
        this.currentPlayerClip = null;
        this.setStatusMessage(`Previewing ${clip}.`, 90);
    }

    updateDebugActionPreview() {
        if (this.attackPreviewKey && Phaser.Input.Keyboard.JustDown(this.attackPreviewKey)) {
            this.triggerDebugActionPreview('attack');
        }
        if (this.parryPreviewKey && Phaser.Input.Keyboard.JustDown(this.parryPreviewKey)) {
            this.triggerDebugActionPreview('parry');
        }
        if (this.debugActionFramesRemaining > 0) {
            this.debugActionFramesRemaining -= 1;
            if (this.debugActionFramesRemaining === 0) {
                this.debugActionClip = null;
                this.currentPlayerClip = null;
            }
        }
    }

    updateJumpPose(onGround, velocityY) {
        if (!this.player || !this.textures.exists('wb-jump_00')) return;

        if (this.currentPlayerClip !== 'jump') {
            this.player.anims.stop();
            this.currentPlayerClip = 'jump';
            this.jumpRiseTicks = 0;
            this.jumpFallTicks = 0;
            this.jumpHasEnteredFall = false;
        }

        if (onGround && !this.debugAnimationOverride) {
            this.jumpRiseTicks = 0;
            this.jumpFallTicks = 0;
            this.jumpHasEnteredFall = false;
            return;
        }

        const isRising = velocityY < -20;
        const isFalling = velocityY > 20;
        let frameIndex = 1;

        if (isRising) {
            this.jumpRiseTicks += 1;
            this.jumpFallTicks = 0;
            this.jumpHasEnteredFall = false;
            frameIndex = this.jumpRiseTicks <= 6 ? 0 : 1;
        } else if (isFalling) {
            if (!this.jumpHasEnteredFall) {
                this.jumpHasEnteredFall = true;
                this.jumpFallTicks = 0;
            }
            this.jumpFallTicks += 1;
            frameIndex = this.jumpFallTicks <= 6 ? 2 : 3;
        } else {
            frameIndex = this.jumpHasEnteredFall ? 2 : 1;
        }

        this.player.setTexture(`wb-jump_${String(frameIndex).padStart(2, '0')}`);
    }

    updatePlayerAnimation() {
        if (!this.player || !this.textures.exists('wb-idle_00')) return;

        const body = this.player.body;
        const onGround = body.blocked.down && body.velocity.y >= 0;
        const movingHorizontally = Math.abs(body.velocity.x) > 20;
        const clip = this.debugActionClip || this.debugAnimationOverride || (!onGround ? 'jump' : (movingHorizontally ? 'run' : 'idle'));
        if (!clip) return;

        if (clip === 'jump') {
            this.updateJumpPose(onGround, body.velocity.y);
            return;
        }

        this.jumpRiseTicks = 0;
        this.jumpFallTicks = 0;
        this.jumpHasEnteredFall = false;
        if (this.currentPlayerClip === clip) return;

        const animKey = `hero-${clip}`;
        if (!this.anims.exists(animKey)) return;
        this.player.play(animKey, true);
        this.currentPlayerClip = clip;
    }

    update() {
        if (this.mapKey && Phaser.Input.Keyboard.JustDown(this.mapKey)) {
            this.toggleMapOverlay();
        }
        if (this.isMapOpen) {
            if (this.mapZoomQueuedDelta !== 0) {
                const delta = this.mapZoomQueuedDelta;
                this.mapZoomQueuedDelta = 0;
                this.adjustMapZoom(delta);
            }
            if (this.mapNeedsRedraw) this.drawMapOverlay();
            return;
        }
        if (this.isGameOver || this.inRoomTransition) return;

        this.handleDebugAnimationOverride();
        this.updateDebugActionPreview();
        this.updateRuntimeMovers();
        this.sustainContinuousTransferMomentum();

        const showInteract = this.hasInteractableNearby();
        if (this.interactBtn) {
            this.interactBtn.setVisible(showInteract);
            this.interactBtnLabel.setVisible(showInteract);
            this.interactBtn.setInteractive(showInteract);
        }

        this.handleMovement();
        this.updatePlayerAnimation();
        this.handleInteractionsAndTransitions();
        this.drawMotionTrail();

        const showSecretDoor = this.keyItemA;
        const showR4TunnelDoor = this.keyItemA;
        if (this.r4ToR3Door) this.r4ToR3Door.setVisible(showR4TunnelDoor);
        if (this.r4ToR3DoorLabel) this.r4ToR3DoorLabel.setVisible(showR4TunnelDoor);
        if (this.r3SecretDoor) this.r3SecretDoor.setVisible(showSecretDoor);
        if (this.r3SecretDoorLabel) this.r3SecretDoorLabel.setVisible(showSecretDoor);

        this.starField.tilePositionX = this.player.x * 0.15;
        this.distText.setText(`DIST ${Math.floor(this.player.x / 10)} m`);
        this.roomText.setText(`ROOM: ${this.currentRoomId}`);
        if (this.envHudText) {
            this.envHudText.setText(getEnvironmentHudLine(this.currentRoomId));
        }

        if (!this.roomStallLogged && this.roomEnteredAtMs > 0) {
            const dwellMs = this.time.now - this.roomEnteredAtMs;
            const isNavigationRoom = ['R2', 'R3', 'R4', 'R5', 'R6', 'R7', 'R8'].includes(this.currentRoomId);
            if (isNavigationRoom && dwellMs >= 20000) {
                this.roomStallLogged = true;
                this.logNavigationEvent('stall_over_20s', {
                    room: this.currentRoomId,
                    dwellSec: Number((dwellMs / 1000).toFixed(1))
                });
                this.setStatusMessage(`Navigation note: >20s stall logged in ${this.currentRoomId}.`, 120);
            }
        }

        if (this.gateReactionFrames > 0) {
            this.gateReactionFrames--;
            if (this.finalGate) {
                const alpha = 0.35 + 0.65 * Math.abs(Math.sin(this.gateReactionFrames * 0.25));
                const tint = Phaser.Display.Color.GetColor(
                    255,
                    Math.floor(170 + 70 * alpha),
                    Math.floor(70 + 80 * alpha)
                );
                this.finalGate.setTint(tint);
            }
            if (this.gateReactionFrames === 0) {
                if (this.finalGate) this.finalGate.clearTint();
                if (this.gateFeedbackText) this.gateFeedbackText.setVisible(false);
            }
        }

        if (this.player.y > CONFIG.WORLD_HEIGHT + 50) this.handlePlayerDeath();

        if (this.statusMessageFrames > 0) {
            this.statusMessageFrames--;
            if (this.statusMessageFrames === 0) this.statusText.setText('');
        }
    }

    handleInteractionsAndTransitions() {
        const now = this.time.now;
        const room = this.currentRoomId;
        const bounds = ROOM_IDS[room];
        const r4EntryPos = getDoorTargetPosition('R4', 'R4-D1', ROOM_IDS.R4.start + 120, 1020, -140, -128);
        const interactPressed = (this.interactKey && Phaser.Input.Keyboard.JustDown(this.interactKey)) ||
            this.interactQueued;
        this.interactQueued = false;

        if (this.debugBypassKey && Phaser.Input.Keyboard.JustDown(this.debugBypassKey)) this.runDebugBypass();
        if (this.debugUnlockKey && Phaser.Input.Keyboard.JustDown(this.debugUnlockKey) && ENABLE_DEBUG_UNLOCK) this.runDebugUnlock();

        if (now < this.transitionCooldownUntil) return;
        if (this.tryTraverseOpenEdgeEntrance()) return;

        if (room === 'R1' && interactPressed && this.r1ToR2Door) {
            const nearR1Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r1ToR2Door.x,
                this.r1ToR2Door.y
            ) < 130;
            if (nearR1Door) {
                const r2EntryPos = getDoorStandPosition('R2', 'R2-D1', ROOM_IDS.R2.start + 120, 1020);
                this.transitionToRoom('R2', r2EntryPos.x, r2EntryPos.y, 'Transition: R1 -> R2', {
                    entrySide: r2EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R2' && interactPressed && this.r2ToR1Door) {
            const nearR2Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r2ToR1Door.x,
                this.r2ToR1Door.y
            ) < 130;
            if (nearR2Door) {
                const r1EntryPos = getDoorStandPosition('R1', 'R1-D1', ROOM_IDS.R1.end - 140, 1020);
                this.transitionToRoom('R1', r1EntryPos.x, r1EntryPos.y, 'Transition: R2 -> R1', {
                    entrySide: r1EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R2' && interactPressed) {
            const nearbyDoor = this.branchDoors.find((door) => Phaser.Math.Distance.Between(this.player.x, this.player.y, door.x, door.y) < 140);
            if (nearbyDoor) {
                this.tryEnterBranchDoor(nearbyDoor);
                return;
            }
        }

        if (room === 'R3' && interactPressed) {
            let handled = false;

            if (this.r3ReturnDoor) {
                const nearR3ReturnDoor = Phaser.Math.Distance.Between(
                    this.player.x,
                    this.player.y,
                    this.r3ReturnDoor.x,
                    this.r3ReturnDoor.y
                ) < 130;
                if (nearR3ReturnDoor) {
                    if (!this.completeBranchRun('A')) return;
                    const r2NorthDoorPos = getDoorTargetPosition('R2', 'R2-D2', ROOM_IDS.R2.start + 680, 740, 0, 36);
                    this.transitionToRoom('R2', r2NorthDoorPos.x, r2NorthDoorPos.y, 'Branch A complete: return to R2', {
                        entrySide: 'top',
                        preserveY: false
                    });
                    handled = true;
                }
            }

            if (!handled && this.r3ToR4Door) {
                const nearR3ToR4Door = Phaser.Math.Distance.Between(
                    this.player.x,
                    this.player.y,
                    this.r3ToR4Door.x,
                    this.r3ToR4Door.y
                ) < 130;
                if (nearR3ToR4Door) {
                    this.transitionToRoom('R4', r4EntryPos.x, r4EntryPos.y, 'Transition: R3 -> R4 (west entry)', {
                        entrySide: 'left',
                        preserveY: false
                    });
                    handled = true;
                }
            }

            if (handled) return;
        }

        this.player.x = Phaser.Math.Clamp(this.player.x, bounds.start + 24, bounds.end - 24);

        if (room === 'R4' && interactPressed && this.r4ToR3Door && this.r4ToR3Door.visible) {
            const nearR4ReturnDoor = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r4ToR3Door.x,
                this.r4ToR3Door.y
            ) < 130;
            if (nearR4ReturnDoor) {
                const r11EntryPos = getDoorTargetPosition('R11', 'R11-D2', ROOM_IDS.R11.start + 1520, 214, -40, -6);
                this.transitionToRoom('R11', r11EntryPos.x, r11EntryPos.y, 'Transition: R4 -> Tunnel shaft', {
                    entrySide: 'right',
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R11' && interactPressed) {
            if (this.r11ToR3Door) {
                const nearR11SecretDoor = Phaser.Math.Distance.Between(
                    this.player.x,
                    this.player.y,
                    this.r11ToR3Door.x,
                    this.r11ToR3Door.y
                ) < 130;
                if (nearR11SecretDoor) {
                    const r3SecretExitPos = getDoorTargetPosition('R3', 'R3-D3', ROOM_IDS.R3.start + 1560, 560, -20, -40);
                    this.transitionToRoom('R3', r3SecretExitPos.x, r3SecretExitPos.y, 'Secret tunnel: R11 -> R3', {
                        entrySide: 'right',
                        preserveY: false
                    });
                    return;
                }
            }
        }

        if (interactPressed && this.layoutMovers) {
            const nearbyMover = this.layoutMovers.find((mover) =>
                mover.getData('roomId') === room &&
                Phaser.Math.Distance.Between(this.player.x, this.player.y, mover.x, mover.y) < 140
            );
            if (nearbyMover) {
                if (nearbyMover.getData('locked')) {
                    this.setStatusMessage(`Mover ${nearbyMover.getData('layoutId')} is locked.`);
                    return;
                }
                if (nearbyMover.getData('moving')) {
                    this.setStatusMessage(`Mover ${nearbyMover.getData('layoutId')} already moving.`);
                    return;
                }

                const currentlyAtStart = Phaser.Math.Distance.Between(
                    nearbyMover.x,
                    nearbyMover.y,
                    nearbyMover.getData('startX'),
                    nearbyMover.getData('startY')
                ) < 4;
                const currentlyAtEnd = Phaser.Math.Distance.Between(
                    nearbyMover.x,
                    nearbyMover.y,
                    nearbyMover.getData('endX'),
                    nearbyMover.getData('endY')
                ) < 4;

                let targetX = nearbyMover.getData('endX');
                let targetY = nearbyMover.getData('endY');
                if (currentlyAtEnd || (!currentlyAtStart && nearbyMover.getData('forward') === false)) {
                    targetX = nearbyMover.getData('startX');
                    targetY = nearbyMover.getData('startY');
                }

                nearbyMover.setData('targetX', targetX);
                nearbyMover.setData('targetY', targetY);
                nearbyMover.setData('moving', true);
                this.setStatusMessage(`Mover ${nearbyMover.getData('layoutId')} activated.`);
                return;
            }
        }

        if (room === 'R7' && interactPressed && this.r7ToR8Door) {
            const nearR7ToR8Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r7ToR8Door.x,
                this.r7ToR8Door.y
            ) < 130;
            if (nearR7ToR8Door) {
                const r8EntryPos = getDoorStandPosition('R8', 'R8-D1', ROOM_IDS.R8.start + 220, 980);
                this.transitionToRoom('R8', r8EntryPos.x, r8EntryPos.y, 'Transition: R7 -> R8', {
                    entrySide: r8EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R8' && interactPressed && this.r8ToR7Door) {
            const nearR8ToR7Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r8ToR7Door.x,
                this.r8ToR7Door.y
            ) < 130;
            if (nearR8ToR7Door) {
                const r7EntryPos = getDoorStandPosition('R7', 'R7-D1', ROOM_IDS.R7.end - 120, 573);
                this.transitionToRoom('R7', r7EntryPos.x, r7EntryPos.y, 'Transition: R8 -> R7', {
                    entrySide: r7EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R5' && interactPressed && this.r5ToR6Door) {
            const nearR5ToR6Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r5ToR6Door.x,
                this.r5ToR6Door.y
            ) < 130;
            if (nearR5ToR6Door) {
                const r6EntryPos = getDoorStandPosition('R6', 'R6-D1', ROOM_IDS.R6.start + 180, 980);
                this.transitionToRoom('R6', r6EntryPos.x, r6EntryPos.y, 'Transition: R5 -> R6', {
                    entrySide: r6EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R5' && interactPressed && this.r5ToR2Door) {
            const nearR5ToR2Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r5ToR2Door.x,
                this.r5ToR2Door.y
            ) < 130;
            if (nearR5ToR2Door) {
                if (!this.completeBranchRun('B')) return;
                const r2EastDoorPos = getDoorTargetPosition('R2', 'R2-D3', ROOM_IDS.R2.start + 1300, 940, 0, 20);
                this.transitionToRoom('R2', r2EastDoorPos.x, r2EastDoorPos.y, 'Branch B complete: return to R2', {
                    entrySide: 'right',
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R5' && interactPressed && this.r5ToR8Door) {
            const nearR5ToR8Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r5ToR8Door.x,
                this.r5ToR8Door.y
            ) < 130;
            if (nearR5ToR8Door) {
                const r8EntryPos = getDoorStandPosition('R8', 'R8-D2', ROOM_IDS.R8.start + 180, 320);
                this.transitionToRoom('R8', r8EntryPos.x, r8EntryPos.y, 'Shortcut: R5 -> R8', {
                    entrySide: r8EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R8' && interactPressed && this.r8ToR5Door) {
            const nearR8ToR5Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r8ToR5Door.x,
                this.r8ToR5Door.y
            ) < 130;
            if (nearR8ToR5Door) {
                const r5EntryPos = getDoorStandPosition('R5', 'R5-D3', ROOM_IDS.R5.start + 920, 1039);
                this.transitionToRoom('R5', r5EntryPos.x, r5EntryPos.y, 'Shortcut: R8 -> R5', {
                    entrySide: r5EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R5' && this.player.x > ROOM_IDS.R5.end - 70 && this.player.y > 900) {
            this.transitionToRoom('R6', ROOM_IDS.R6.start + 180, 980, 'Transition: R5 -> R6', {
                preserveY: false
            });
            return;
        }
        if (room === 'R6' && this.player.x > ROOM_IDS.R6.end - 70 && this.player.y < 940) {
            this.transitionToRoom('R5', ROOM_IDS.R5.start + 1360, 860, 'Transition: R6 -> R5 (loop back lane)', {
                entrySide: 'right',
                preserveY: false
            });
            return;
        }
        if (room === 'R5' && this.player.x < ROOM_IDS.R5.start + 70 && this.player.y < 940) {
            if (!this.completeBranchRun('B')) return;
            const r2EastDoorPos = getDoorTargetPosition('R2', 'R2-D3', ROOM_IDS.R2.start + 1300, 940, 0, 20);
            this.transitionToRoom('R2', r2EastDoorPos.x, r2EastDoorPos.y, 'Branch B complete: return to R2', {
                entrySide: 'right',
                preserveY: false
            });
            return;
        }

        if (room === 'R7' && this.player.x < ROOM_IDS.R7.start + 640 && this.player.y < 420) {
            if (!this.completeBranchRun('C')) return;
            const r2SouthDoorPos = getDoorTargetPosition('R2', 'R2-D4', ROOM_IDS.R2.start + 680, 1060, 0, -28);
            this.transitionToRoom('R2', r2SouthDoorPos.x, r2SouthDoorPos.y, 'Branch C complete: return to R2', {
                entrySide: 'bottom',
                preserveY: false
            });
            return;
        }

        if (room === 'R9' && !this.r9ShellComplete && this.player.x > ROOM_IDS.R9.end - 70) {
            this.logWrongTurn('r9_exit_attempt_before_objective');
            this.setStatusMessage('R9 objective incomplete: touch the core first.', 90);
            this.transitionCooldownUntil = now + 250;
            return;
        }
        if (room === 'R9' && this.r9ShellComplete && this.player.x > ROOM_IDS.R9.end - 70) {
            const r10EntryPos = getDoorTargetPosition('R10', 'R10-D1', ROOM_IDS.R10.start + 120, 1020, 96, 0);
            this.transitionToRoom('R10', r10EntryPos.x, r10EntryPos.y, 'Transition: R9 -> R10');
            return;
        }
        if (room === 'R10' && this.player.x < ROOM_IDS.R10.start + 70) {
            const r9EntryPos = getDoorTargetPosition('R9', 'R9-D1', ROOM_IDS.R9.end - 140, 1020, -96, 0);
            this.transitionToRoom('R9', r9EntryPos.x, r9EntryPos.y, 'Transition: R10 -> R9');
            return;
        }
        if (room === 'R10' && this.player.x > ROOM_IDS.R10.end - 50) {
            const r1GatePos = getDoorTargetPosition('R1', 'R1-D2', 620, 1020, 120, 20);
            this.transitionToRoom('R1', r1GatePos.x, r1GatePos.y, 'Transition: R10 -> R1 (gate return link)');
            return;
        }

        const nearGate = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.finalGate.x, this.finalGate.y) < 130;
        if (room === 'R1' && nearGate && interactPressed) {
            if (this.finalGateState === 'UNLOCKED') {
                this.preFinalCheckpointUnlocked = true;
                this.transitionToRoom('R9', ROOM_IDS.R9.start + 140, 1020, 'Gate opened. Entering R9 final area.');
            } else if (this.finalGateState === 'LOCKED_KEY_ITEMS') {
                this.logWrongTurn('gate_locked_missing_keys');
                this.setStatusMessage('Gate sealed: recover 3 Key Items.');
            } else {
                this.logWrongTurn('gate_locked_missing_abilities');
                this.setStatusMessage('Gate sealed: awaken 3 Abilities.');
            }
        }
    }

    tryEnterBranchDoor(door) {
        if (door.requires === 'A' && !this.abilityA) {
            this.logWrongTurn('branch_b_attempt_before_ability_a');
            this.setStatusMessage('Branch B sealed: requires Ability Unlock A (Abyss Dash).');
            return;
        }
        this.beginBranchRun(door.id);
        const branchSpawn = (roomId, fallbackX, fallbackY) => getRoomSpawnPoint(roomId, fallbackX, fallbackY);
        const branchEntryFallbacks = {
            A: branchSpawn('R3', door.spawnX || (ROOM_IDS.R3.start + 120), door.spawnY || 1020),
            B: branchSpawn('R5', door.spawnX || (ROOM_IDS.R5.start + 120), door.spawnY || 1020),
            C: branchSpawn('R7', door.spawnX || (ROOM_IDS.R7.start + 120), door.spawnY || 1020)
        };
        const resolvedSpawn = branchEntryFallbacks[door.id] || {
            x: door.spawnX || (ROOM_IDS[door.target].start + 120),
            y: door.spawnY || 1020
        };
        const spawnX = resolvedSpawn.x;
        const spawnY = resolvedSpawn.y;
        const entryFlavor = {
            A: 'Entering Branch A (North): narrow vertical ascent',
            B: 'Entering Branch B (East): wide horizontal crawl',
            C: 'Entering Branch C (South): narrow vertical descent'
        };
        this.transitionToRoom(door.target, spawnX, spawnY, entryFlavor[door.id] || `Entering Branch ${door.id}`, {
            entrySide: door.entrySide,
            verticalDirection: door.verticalDirection,
            preserveY: door.preserveY
        });
    }

    completeFinalShell(_player, core) {
        if (this.r9ShellComplete) return;
        this.r9ShellComplete = true;
        core.disableBody(true, true);
        this.refreshObjectiveText();
        this.setStatusMessage('R9 shell complete. Proceed to R10 exit.');
    }

    tryExitRun() {
        if (!this.r9ShellComplete) return;
        this.setStatusMessage('MVP loop complete. Return to R1 via R10 right-edge link.', 360);
    }

    runDebugBypass() {
        this.preFinalCheckpointUnlocked = true;
        this.transitionToRoom('R9', ROOM_IDS.R9.start + 140, 1020, 'DEBUG BYPASS: jumped to R9.');
    }

    runDebugUnlock() {
        this.keyItemA = this.keyItemB = this.keyItemC = true;
        this.abilityA = this.abilityB = this.abilityC = true;
        this.branchCompleteA = this.branchCompleteB = this.branchCompleteC = true;
        if (this.branchDurationsSec.A === null) this.branchDurationsSec.A = 0;
        if (this.branchDurationsSec.B === null) this.branchDurationsSec.B = 0;
        if (this.branchDurationsSec.C === null) this.branchDurationsSec.C = 0;
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.setStatusMessage('DEBUG: Gate requirements set to 3/3 + 3/3.');
    }

    setStatusMessage(message, frames = 180) {
        this.statusText.setText(message);
        this.statusMessageFrames = frames;
    }

    handleMovement() {
        const onGround = this.player.body.blocked.down;
        const velocityY = this.player.body.velocity.y;
        const inAir = !onGround || velocityY < 0;
        const left = this.inputState.left || this.cursors.left.isDown;
        const right = this.inputState.right || this.cursors.right.isDown;
        const jump = this.inputState.jump || this.cursors.up.isDown || this.spaceKey.isDown;
        const jumpJustPressed = (this.cursors.up && this.cursors.up.justDown) ||
            (this.spaceKey && this.spaceKey.justDown) ||
            (this.inputState.jump && !this.jumpWasDownLastFrame);

        if (jumpJustPressed) this.jumpBuffer = 5;
        if (this.jumpBuffer > 0) this.jumpBuffer--;
        if (onGround && velocityY >= 0) this.jumpsRemaining = 1;

        if (left) this.player.setVelocityX(-CONFIG.PLAYER_SPEED).setFlipX(true);
        else if (right) this.player.setVelocityX(CONFIG.PLAYER_SPEED).setFlipX(false);
        else this.player.setVelocityX(this.player.body.velocity.x * CONFIG.FRICTION);

        if (jump && onGround && this.jumpsRemaining > 0) {
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            this.jumpsRemaining--;
            this.jumpBuffer = 0;
        } else if ((jumpJustPressed || this.jumpBuffer > 0) && inAir && this.jumpsRemaining > 0) {
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            this.jumpsRemaining--;
            this.jumpBuffer = 0;
        }

        this.jumpWasDownLastFrame = jump;
    }

    handlePlayerDeath() {
        this.lives--;
        this.updateLifeDisplay();

        if (this.lives <= 0) {
            this.isGameOver = true;
            this.physics.pause();
            this.player.setTint(0xff0000);
            this.add.text(CONFIG.W / 2, CONFIG.H / 2, 'GAME OVER\nTap Restart', {
                fontSize: '32px', fill: '#ff0066', align: 'center'
            }).setOrigin(0.5).setScrollFactor(0);
            return;
        }

        const respawnRoom = this.preFinalCheckpointUnlocked ? 'R9' : 'R1';
        const respawn = getRoomSpawnPoint(respawnRoom, ROOM_IDS[respawnRoom].start + 140, CONFIG.WORLD_HEIGHT - 80);
        this.setCurrentRoom(respawnRoom);
        this.player.setPosition(respawn.x, respawn.y).setVelocity(0, 0);
        this.tweens.add({ targets: this.player, alpha: 0.2, duration: 100, yoyo: true, repeat: 5 });
    }

    updateLifeDisplay() {
        this.lifeIcons.clear(true, true);
        for (let i = 0; i < this.lives; i++) {
            this.lifeIcons.create(CONFIG.W - 30 - (i * 25), 25, 'heroFallback').setScale(0.5).setScrollFactor(0);
        }
    }

    drawMotionTrail() {
        if (Math.abs(this.player.body.velocity.x) > 100) {
            this.trailPts.push({ x: this.player.x, y: this.player.y + 4, life: 10 });
        }
        this.trail.clear();
        this.trailPts = this.trailPts.filter((p) => p.life > 0);
        this.trailPts.forEach((p) => {
            p.life--;
            this.trail.fillStyle(0x00eeff, (p.life / 10) * 0.4);
            this.trail.fillRect(p.x - 4, p.y - 4, 8, 8);
        });
    }
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
        } catch (_) {}

        if ('caches' in window) {
            try {
                const cacheKeys = await caches.keys();
                await Promise.all(cacheKeys.map((key) => caches.delete(key)));
            } catch (_) {}
        }
    });
}

async function bootGame() {
    try {
        setPageBootState('BOOT: loading hero export');
        WORKBENCH_HERO_EXPORT = await loadWorkbenchHeroExport();
        setPageBootState('BOOT: loading canonical layout');
        const canonicalData = await loadCanonicalLayoutData();
        const hashUrlData = await loadLayoutDataFromHashUrl();
        if (/#preview=embed/.test(window.location.hash || '')) {
            setPageBootState('BOOT: waiting for preview layout');
            let attempts = 0;
            while (!hashUrlData && !window.__previewLayoutFromParent?.layout && attempts < 40) {
                await new Promise((r) => setTimeout(r, 25));
                attempts += 1;
            }
        }
        setPageBootState('BOOT: applying runtime layout');
        applyRuntimeLayoutData(canonicalData, hashUrlData);
        applyRuntimeReviewCaptureViewport();
        applyRuntimeReviewCaptureContainerAspect();
        setPageBootState('BOOT: creating Phaser game');
        new Phaser.Game({
            type: Phaser.AUTO,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: CONFIG.W,
                height: CONFIG.H
            },
            parent: 'game-container',
            pixelArt: true,
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: CONFIG.GRAVITY }, debug: false }
            },
            scene: AshenHollow
        });
        setPageBootState('BOOT: Phaser game created');
    } catch (error) {
        const message = error?.message || String(error || 'Unknown boot error');
        console.error('Ashen Hollow bootGame failure:', error);
        setPageBootState(`BOOT ERROR: ${message}`, 'error');
    }
}

bootGame();
</script>
