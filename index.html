    const roomWidths = new Map();

        layoutData.rooms.forEach((room) => {
            const width = Number(room?.size?.width);
            if (Number.isFinite(width) && width >= 320) {
                roomWidths.set(room.id, width);

        const width = roomWidths.get(roomId) || CONFIG.ROOM_WIDTH;
        ROOM_IDS[roomId] = {
            start: cursor,
            end: cursor + width - 1,
            width
        };
        cursor += width;
    });

    CONFIG.WORLD_WIDTH = cursor;
}

let ACTIVE_LAYOUT_DATA = null;
let ACTIVE_LAYOUT_SOURCE = 'default';

function pointInPolygon(x, y, polygon) {
    let inside = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i][0];
        const yi = polygon[i][1];
        const xj = polygon[j][0];
        const yj = polygon[j][1];
        const intersects = ((yi > y) !== (yj > y)) &&
            (x < ((xj - xi) * (y - yi) / ((yj - yi) || 1e-9)) + xi);
        if (intersects) inside = !inside;
    }
    return inside;
}

function getRoomWidth(roomId) {
    return ROOM_IDS[roomId]?.width || CONFIG.ROOM_WIDTH;
}

function buildWallRectsFromPolygon(polygon, roomWidth = CONFIG.ROOM_WIDTH, roomHeight = CONFIG.WORLD_HEIGHT) {
    const tile = 32;
    const cols = Math.floor(roomWidth / tile);
    const rows = Math.floor(roomHeight / tile);
    const rects = [];

    for (let row = 0; row < rows; row++) {
        let runStart = null;
        for (let col = 0; col < cols; col++) {
            const x = (col * tile) + 16;
            const y = (row * tile) + 16;
            const inside = pointInPolygon(x, y, polygon);

            if (!inside && runStart === null) runStart = col;

            if ((inside || col === cols - 1) && runStart !== null) {
                const endCol = inside ? col - 1 : col;
                rects.push({
                    x: runStart * tile,
                    y: (row * tile) + 16,
                    wTiles: (endCol - runStart) + 1,
                    hTiles: 1
                });
                runStart = null;
            }
        }
    }

    return rects;
}

function loadLayoutDataFromStorage() {
    try {
        const raw = window.localStorage.getItem(LAYOUT_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.rooms)) return null;
        return parsed;
    } catch (_) {
        return null;
    }
}

async function loadCanonicalLayoutData() {
    try {
        const response = await fetch(`./room-layout-data.json?ts=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) return null;
        const parsed = await response.json();
        if (!parsed || !Array.isArray(parsed.rooms)) return null;
        return parsed;
    } catch (_) {
        return null;
    }
}

function loadLayoutDataFromHash() {
    try {
        const hash = window.location.hash || '';
        const match = hash.match(/layout=([^&]+)/);
        if (!match) return null;
        const decoded = decodeURIComponent(match[1]);
        const json = decodeURIComponent(escape(atob(decoded)));
        const parsed = JSON.parse(json);
        if (!parsed || !Array.isArray(parsed.rooms)) return null;
        return parsed;
    } catch (_) {
        return null;
    }
}

function applyRuntimeLayoutData(canonicalData = null) {
    const hashData = loadLayoutDataFromHash();
    const storageData = loadLayoutDataFromStorage();
    const data = hashData || canonicalData || storageData;
    rebuildRoomGeometry(data);
    if (!data) return;

    ACTIVE_LAYOUT_DATA = data;
    ACTIVE_LAYOUT_SOURCE = hashData ? 'hash' : canonicalData ? 'canonical' : 'storage';
    const runtimeRooms = data.rooms.filter((room) => ROOM_IDS[room.id]);

    const nextPlatforms = {};
    runtimeRooms.forEach((room) => {
        nextPlatforms[room.id] = (room.platforms || []).map((platform) => ({
            x: ROOM_IDS[room.id].start + platform.x,
            y: platform.y,
            len: platform.len,
            tint: platform.tint || 0
        }));
    });
    ROOM_PLATFORM_LAYOUTS = nextPlatforms;

    DUNGEON_WALL_RECTS = runtimeRooms
        .filter((room) => Array.isArray(room.polygon) && room.polygon.length >= 3)
        .map((room) => ({
            room: room.id,
            rects: buildWallRectsFromPolygon(room.polygon, Number(room?.size?.width) || getRoomWidth(room.id), CONFIG.WORLD_HEIGHT)
        }));
}

function getLayoutRoom(roomId) {
    if (!ACTIVE_LAYOUT_DATA) return null;
    return ACTIVE_LAYOUT_DATA.rooms.find((room) => room.id === roomId) || null;
}

function getLayoutDoor(roomId, doorId) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.doors)) return null;
    return room.doors.find((door) => door.id === doorId) || null;
}

function getLayoutPlatform(roomId, platformId) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.platforms)) return null;
    return room.platforms.find((platform) => platform.id === platformId) || null;
}

function getLayoutKeys(roomId) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.keys)) return [];
    return room.keys;
}

function getLayoutMovingPlatforms(roomId) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.movingPlatforms)) return [];
    return room.movingPlatforms;
}

function getLayoutDoorWorldPosition(roomId, doorId, fallbackX, fallbackY) {
    const door = getLayoutDoor(roomId, doorId);
    if (!door || !ROOM_IDS[roomId]) return { x: fallbackX, y: fallbackY, source: null };
    return {
        x: ROOM_IDS[roomId].start + door.x,
        y: door.y,
        source: door
    };
}

function getDoorTargetPosition(roomId, doorId, fallbackX, fallbackY, offsetX = 0, offsetY = 0) {
    const pos = getLayoutDoorWorldPosition(roomId, doorId, fallbackX, fallbackY);
    return {
        x: pos.x + offsetX,
        y: pos.y + offsetY
    };
}

function getDoorStandPosition(roomId, doorId, fallbackX, fallbackY) {
    const room = getLayoutRoom(roomId);
    const fallback = { x: fallbackX, y: fallbackY, entrySide: 'left' };
    if (!room) return fallback;

    const door = getLayoutDoor(roomId, doorId);
    if (!door) return fallback;

    const leftGap = door.x;
    const rightGap = getRoomWidth(roomId) - door.x;
    const topGap = door.y;
    const bottomGap = CONFIG.WORLD_HEIGHT - door.y;
    const minGap = Math.min(leftGap, rightGap, topGap, bottomGap);

    if (minGap === leftGap) {
        return { x: ROOM_IDS[roomId].start + door.x + 96, y: door.y, entrySide: 'left' };
    }
    if (minGap === rightGap) {
        return { x: ROOM_IDS[roomId].start + door.x - 96, y: door.y, entrySide: 'right' };
    }
    if (minGap === topGap) {
        return { x: ROOM_IDS[roomId].start + door.x, y: door.y + 96, entrySide: 'top' };
    }
    return { x: ROOM_IDS[roomId].start + door.x, y: door.y - 96, entrySide: 'bottom' };
}

function getRoomSpawnPoint(roomId, fallbackX, fallbackY) {
    const room = getLayoutRoom(roomId);
    const roomStart = ROOM_IDS[roomId].start;
    if (room && room.playerStart && Number.isFinite(Number(room.playerStart.x)) && Number.isFinite(Number(room.playerStart.y))) {
        return {
            x: roomStart + Number(room.playerStart.x),
            y: Number(room.playerStart.y)
        };
    }

    if (!room || !Array.isArray(room.platforms) || room.platforms.length === 0) {
        return { x: fallbackX, y: fallbackY };
    }

    const preferredPlatform = room.platforms.find((platform) => platform.id === `${roomId}-P1`) || room.platforms[0];
    const platformWidth = preferredPlatform.len * 32;
    const centeredX = roomStart + preferredPlatform.x + Math.min(96, Math.max(32, Math.floor(platformWidth / 2)));
    const spawnY = preferredPlatform.y - 36;

    return {
        x: centeredX,
        y: spawnY
    };
}

    getBranchIdForRoom(roomId) {
        if (roomId === 'R3' || roomId === 'R4') return 'A';
        if (roomId === 'R5' || roomId === 'R6') return 'B';
        if (roomId === 'R7' || roomId === 'R8') return 'C';
        return null;
    }

    getBranchIdForRewardRoom(roomId) {
        if (roomId === 'R4') return 'A';
        if (roomId === 'R6') return 'B';
        if (roomId === 'R8') return 'C';
        return null;
    }

    beginBranchRun(branchId) {
        if (!branchId) return;
        this.activeBranchId = branchId;
        this.activeBranchStartMs = this.time.now;
        if (this.sequenceAttemptLog[this.sequenceAttemptLog.length - 1] !== branchId) {
            this.sequenceAttemptLog.push(branchId);
        }
        this.refreshBranchBoard();
    }

    completeBranchRun(branchId) {
        if (!branchId) return false;

        const keyFlag = { A: this.keyItemA, B: this.keyItemB, C: this.keyItemC }[branchId];
        const abilityFlag = { A: this.abilityA, B: this.abilityB, C: this.abilityC }[branchId];
        if (!keyFlag || !abilityFlag) {
            this.logWrongTurn(`branch_${branchId}_return_before_rewards`);
            this.setStatusMessage(`Branch ${branchId} incomplete: secure key + ability first.`);
            return false;
        }

        const completeKey = { A: 'branchCompleteA', B: 'branchCompleteB', C: 'branchCompleteC' }[branchId];
        if (!this[completeKey]) {
            this[completeKey] = true;
            this.sequenceResolvedLog.push(branchId);
        }

        if (this.activeBranchId === branchId && this.activeBranchStartMs > 0) {
            const durationSec = Number(((this.time.now - this.activeBranchStartMs) / 1000).toFixed(1));
            this.branchDurationsSec[branchId] = durationSec;
            this.activeBranchId = null;
            this.activeBranchStartMs = 0;
        }

        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.refreshBranchBoard();
        return true;
    }

    getBranchDurationStatus(branchId) {
        const sec = this.branchDurationsSec[branchId];
        if (sec === null) return '--';
        const target = BRANCH_DURATION_TARGET_SEC[branchId];
        if (sec < target.min) return `${sec}s LOW`;
        if (sec > target.max) return `${sec}s HIGH`;
        return `${sec}s OK`;
    }

    runSequenceChecks() {
        const orders = [
            ['A', 'B', 'C'],
            ['B', 'C', 'A'],
            ['C', 'A', 'B']
        ];
        this.sequenceChecks = orders.map((attempt) => this.simulateSequenceAttempt(attempt));
    }

    simulateSequenceAttempt(order) {
        const ability = { A: false, B: false, C: false };
        const completed = [];
        const pending = [...order];
        let guard = 0;

        while (pending.length > 0 && guard < 12) {
            const branch = pending.shift();
            if (completed.includes(branch)) {
                guard++;
                continue;
            }
            if (branch === 'B' && !ability.A) {
                pending.push(branch);
                guard++;
                continue;
            }
            ability[branch] = true;
            completed.push(branch);
            guard++;
        }

        return {
            attempt: order.join('-'),
            resolved: completed.join('-'),
            passed: completed.length === 3
        };
    }

    refreshBranchBoard() {
        if (!this.branchBoardText) return;
        const lineA = `A ${this.branchCompleteA ? 'DONE' : 'OPEN'} | ${this.getBranchDurationStatus('A')}`;
        const lineB = `B ${this.branchCompleteB ? 'DONE' : (this.abilityA ? 'OPEN' : 'LOCKED')} | ${this.getBranchDurationStatus('B')}`;
        const lineC = `C ${this.branchCompleteC ? 'DONE' : 'OPEN'} | ${this.getBranchDurationStatus('C')}`;
        const seq = this.sequenceChecks.map((r) => `${r.attempt}->${r.resolved}:${r.passed ? 'OK' : 'FAIL'}`).join(' ');
        const runLog = this.sequenceAttemptLog.length ? this.sequenceAttemptLog.join('-') : '--';
        this.branchBoardText.setText(
            `R2 HUB\\n${lineA}\\n${lineB}\\n${lineC}\\nSeq ${seq}\\nRun ${runLog}`
        );
    }

    buildWorldGeometry() {
        const tile = 32;
        for (let tx = 0; tx < CONFIG.WORLD_WIDTH; tx += tile) {
            this.platforms.create(tx + 16, CONFIG.WORLD_HEIGHT - 16, 'floor').refreshBody();
            this.platforms.create(tx + 16, 16, 'floor').refreshBody();
        }
        for (let ty = tile; ty < CONFIG.WORLD_HEIGHT - 32; ty += tile) {
            this.platforms.create(16, ty + 16, 'floor').refreshBody();
            this.platforms.create(CONFIG.WORLD_WIDTH - 16, ty + 16, 'floor').refreshBody();
        }

        Object.values(ROOM_PLATFORM_LAYOUTS).forEach((ledges) => {
            ledges.forEach(({ x, y, len, tint }) => {
                for (let i = 0; i < len; i++) {
                    this.platforms.create(x + (i * tile) + 16, y, `p${tint}`).refreshBody();
                }
            });
        });

        DUNGEON_WALL_RECTS.forEach(({ room, rects }) => {
            const roomStart = ROOM_IDS[room].start;
            rects.forEach(({ x, y, wTiles, hTiles }) => {
                for (let xi = 0; xi < wTiles; xi++) {
                    for (let yi = 0; yi < hTiles; yi++) {
                        this.platforms.create(roomStart + x + (xi * tile) + 16, y + (yi * tile), 'floor').refreshBody();
                    }
                }
            });
        });
    }

    hasInteractableNearby() {
        const room = this.currentRoomId;
        const px = this.player.x;
        const py = this.player.y;
        const dist = (x, y) => Phaser.Math.Distance.Between(px, py, x, y);
        if (room === 'R1' && this.r1ToR2Door && dist(this.r1ToR2Door.x, this.r1ToR2Door.y) < 130) return true;
        if (room === 'R2' && this.r2ToR1Door && dist(this.r2ToR1Door.x, this.r2ToR1Door.y) < 130) return true;
        if (room === 'R2' && this.branchDoors && this.branchDoors.length) {
            if (this.branchDoors.some((d) => dist(d.x, d.y) < 140)) return true;
        }
        if (room === 'R3') {
            if (this.r3ReturnDoor && dist(this.r3ReturnDoor.x, this.r3ReturnDoor.y) < 130) return true;
            if (this.r3ToR4Door && dist(this.r3ToR4Door.x, this.r3ToR4Door.y) < 130) return true;
        }
        if (room === 'R4' && this.r4ToR3Door && this.r4ToR3Door.visible) {
            if (dist(this.r4ToR3Door.x, this.r4ToR3Door.y) < 130) return true;
        }
        if (room === 'R11' && this.r11ToR3Door) {
            if (dist(this.r11ToR3Door.x, this.r11ToR3Door.y) < 130) return true;
        }
        if (room === 'R7' && this.r7ToR8Door && dist(this.r7ToR8Door.x, this.r7ToR8Door.y) < 130) return true;
        if (room === 'R8' && this.r8ToR7Door && dist(this.r8ToR7Door.x, this.r8ToR7Door.y) < 130) return true;
        if (this.layoutMovers && this.layoutMovers.some((mover) => mover.getData('roomId') === this.currentRoomId && dist(mover.x, mover.y) < 140)) return true;
        if (room === 'R1' && this.finalGate && dist(this.finalGate.x, this.finalGate.y) < 130) return true;
        return false;
    }

    createTransitionOverlay() {
        this.transitionOverlay = this.add.rectangle(0, 0, CONFIG.W, CONFIG.H, 0x000000, 0)
            .setScrollFactor(0).setOrigin(0, 0).setDepth(1000);
    }

    setCurrentRoom(roomId) {
        this.previousRoomId = this.currentRoomId;
        this.currentRoomId = roomId;
        const room = ROOM_IDS[roomId];
        this.cameras.main.setBounds(room.start, 0, room.width, CONFIG.WORLD_HEIGHT);
        this.roomEnteredAtMs = this.time.now;
        this.roomStallLogged = false;
        this.logNavigationEvent('room_enter', { room: roomId, from: this.previousRoomId || 'NONE' });
    }

    transitionToRoom(targetRoomId, targetX, targetY, statusLabel, options = {}) {
        if (this.inRoomTransition) return;
        this.inRoomTransition = true;
        this.transitionCooldownUntil = this.time.now + 700;

        this.cameras.main.stopFollow();

        const sourceY = this.player.y;
        const room = ROOM_IDS[targetRoomId];
        const roomMid = room.start + (room.width / 2);
        const entryEdge = options.entrySide || (targetX <= roomMid ? 'left' : 'right');
        const resolvedY = options.preserveY === false ? targetY : sourceY;
        const isVertical = entryEdge === 'top' || entryEdge === 'bottom';
        const entryX = entryEdge === 'left' ? room.start + 56
            : entryEdge === 'right' ? room.end - 56
                : targetX;
        const verticalOffset = 180;
        let entryY;
        if (isVertical) {
            const targetVertical = targetY;
            const requestedDir = options.verticalDirection || 'auto';
            const direction = requestedDir === 'auto'
                ? (entryEdge === 'top' ? 'down' : 'up')
                : requestedDir;

            if (direction === 'up') {
                entryY = Math.min(CONFIG.WORLD_HEIGHT - 40, targetVertical + verticalOffset);
            } else {
                entryY = Math.max(40, targetVertical - verticalOffset);
            }
        } else {
            entryY = resolvedY;
        }
        const facingLeft = entryEdge === 'right';
        const transitionSpeedPxPerSec = CONFIG.PLAYER_SPEED;
        const entryDistancePx = isVertical
            ? Math.abs(targetY - entryY)
            : Math.abs(targetX - entryX);
        const entryDurationMs = Phaser.Math.Clamp(
            Math.round((entryDistancePx / transitionSpeedPxPerSec) * 1000),
            120,
            420
        );

        this.tweens.add({
            targets: this.transitionOverlay,
            alpha: 1,
            duration: 140,
            onComplete: () => {
                this.setCurrentRoom(targetRoomId);
                this.player.body.enable = false;
                this.player.setPosition(entryX, entryY).setFlipX(facingLeft);

                this.cameras.main.centerOn(entryX, entryY);
                this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

                const tweenProps = { targets: this.player, duration: entryDurationMs, ease: 'Linear' };
                if (entryEdge === 'top' || entryEdge === 'bottom') tweenProps.y = targetY;
                else tweenProps.x = targetX;

                this.tweens.add({
                    ...tweenProps,
                    onComplete: () => {
                        this.player.body.enable = true;
                        this.player.body.reset(this.player.x, this.player.y);
                        if (targetRoomId === 'R1') {
                            this.setStatusMessage(`${statusLabel} | ${this.getR1ContextPrompt()}`);
                        } else {
                            this.setStatusMessage(statusLabel);
                        }

                        this.tweens.add({
                            targets: this.transitionOverlay,
                            alpha: 0,
                            duration: 200,
                            ease: 'Linear',
                            onComplete: () => {
                                this.inRoomTransition = false;
                            }
                        });
                    }
                });
            }
        });
    }

    getR1ContextPrompt() {
        if (this.finalGateState === 'LOCKED_KEY_ITEMS') return 'Next: collect remaining key items.';
        if (this.finalGateState === 'LOCKED_ABILITIES') return 'Next: awaken remaining abilities.';
        if (!this.r9ShellComplete) return 'Gate ready: interact to enter final area.';
        return 'Loop complete: proceed to final routing.';
    }

    logNavigationEvent(type, details = {}) {
        this.navigationEvents.push({
            type,
            room: this.currentRoomId,
            atMs: this.time.now,
            ...details
        });
    }

    logWrongTurn(reason) {

    recomputeProgressionCounts() {
        this.keyItemsCollected = Number(this.keyItemA) + Number(this.keyItemB) + Number(this.keyItemC);
        this.abilitiesUnlocked = Number(this.abilityA) + Number(this.abilityB) + Number(this.abilityC);
        if (this.keyItemsCollected < 3) this.finalGateState = 'LOCKED_KEY_ITEMS';
        else if (this.abilitiesUnlocked < 3) this.finalGateState = 'LOCKED_ABILITIES';
        else this.finalGateState = 'UNLOCKED';

        if (this.finalGate) this.finalGate.setTexture(this.finalGateState === 'UNLOCKED' ? 'finalGateOpen' : 'finalGateLocked');
        if (this.gateStateText) {
            this.gateStateText.setText(`Gate: ${this.finalGateState}\nKeys ${this.keyItemsCollected}/3 | Abilities ${this.abilitiesUnlocked}/3`);
        }
        this.refreshBranchBoard();
    }

    refreshObjectiveText() {
        if (this.finalGateState !== 'UNLOCKED') {
            this.objectiveText.setText('OBJECTIVE: Crawl branches R3-R8, collect 3 keys + unlock 3 abilities.');
            return;
        }
        if (!this.r9ShellComplete) {
            this.objectiveText.setText('OBJECTIVE: Enter final gate and clear R9 shell.');
            return;
        }
        this.objectiveText.setText('OBJECTIVE: Reach R10 exit, then use right-edge return link to R1.');
    }

    emitGateReaction(branchId) {
        this.gateReactionFrames = 150;
        if (!this.gateFeedbackText) return;
        this.gateFeedbackText.setText(
            `Gate reacts to Key ${branchId}: ${this.keyItemsCollected}/3 key runes lit`
        );
        this.gateFeedbackText.setVisible(true);
    }

    collectKeyItem(item) {
        if (!item.active) return;
        const branch = item.getData('branch');
        const map = { A: 'keyItemA', B: 'keyItemB', C: 'keyItemC' };
        if (this[map[branch]]) return;

        this[map[branch]] = true;
        item.disableBody(true, true);
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.emitGateReaction(branch);
        this.logNavigationEvent('key_collected', { branch });
        this.setStatusMessage(`Key Item ${branch} secured (${this.keyItemsCollected}/3).`);
    }

    collectAbility(node) {
        if (!node.active) return;
        const branch = node.getData('branch');
        const keyMap = { A: 'keyItemA', B: 'keyItemB', C: 'keyItemC' };
        const abilityMap = { A: 'abilityA', B: 'abilityB', C: 'abilityC' };

        if (!this[keyMap[branch]]) {
            this.setStatusMessage(`Branch ${branch}: claim Key Item first.`);
            return;
        }
        if (this[abilityMap[branch]]) return;

        this[abilityMap[branch]] = true;
        node.disableBody(true, true);
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.logNavigationEvent('ability_unlocked', { branch });
        this.setStatusMessage(`Ability Unlock ${branch} awakened (${this.abilitiesUnlocked}/3).`);
    }

    collectRuntimeKey(key) {
        if (!key.active) return;
        const targetId = key.getData('unlocksTarget');
        const label = key.getData('label') || key.getData('layoutId');
        key.disableBody(true, true);

        let handled = false;
        if (targetId) {
            const mover = this.layoutMovers.find((entry) => entry.getData('layoutId') === targetId);
            if (mover) {
                mover.setData('locked', false);
                mover.clearTint();
                handled = true;
                this.setStatusMessage(`${label} unlocked mover ${targetId}.`);
            }
        }

        if (!handled) {
            this.setStatusMessage(`${label} collected.`);
        }
    }

    updateRuntimeMovers() {
        if (!this.layoutMovers || this.inRoomTransition) return;

        this.layoutMovers.forEach((mover) => {
            if (!mover.active) return;
            if (!mover.getData('moving')) {
                mover.body.updateFromGameObject();
                return;
            }

            const targetX = mover.getData('targetX');
            const targetY = mover.getData('targetY');
            const dx = targetX - mover.x;
            const dy = targetY - mover.y;
            const dist = Math.hypot(dx, dy);
            const speed = mover.getData('speed') || 80;

            if (dist <= speed * (1 / 60)) {
                mover.setPosition(targetX, targetY);
                mover.setData('moving', false);
                mover.setData('forward', targetX === mover.getData('startX') && targetY === mover.getData('startY'));
                mover.body.updateFromGameObject();
                return;
            }

            const step = Math.min(dist, speed * (1 / 60));
            mover.setPosition(
                mover.x + ((dx / dist) * step),
                mover.y + ((dy / dist) * step)
            );
            mover.body.updateFromGameObject();
        });
    }

    update() {
        if (this.isGameOver || this.inRoomTransition) return;

        this.updateRuntimeMovers();

        const showInteract = this.hasInteractableNearby();
        if (this.interactBtn) {
            this.interactBtn.setVisible(showInteract);
            this.interactBtnLabel.setVisible(showInteract);
            this.interactBtn.setInteractive(showInteract);
        }

        this.handleMovement();
        this.handleInteractionsAndTransitions();
        this.drawMotionTrail();

        const showSecretDoor = this.keyItemA;
        const showR4TunnelDoor = this.keyItemA;
        if (this.r4ToR3Door) this.r4ToR3Door.setVisible(showR4TunnelDoor);
        if (this.r4ToR3DoorLabel) this.r4ToR3DoorLabel.setVisible(showR4TunnelDoor);
        if (this.r3SecretDoor) this.r3SecretDoor.setVisible(showSecretDoor);
        if (this.r3SecretDoorLabel) this.r3SecretDoorLabel.setVisible(showSecretDoor);

        this.starField.tilePositionX = this.player.x * 0.15;
        this.distText.setText(`DIST ${Math.floor(this.player.x / 10)} m`);
        this.roomText.setText(`ROOM: ${this.currentRoomId}`);

        if (!this.roomStallLogged && this.roomEnteredAtMs > 0) {
            const dwellMs = this.time.now - this.roomEnteredAtMs;
            const isNavigationRoom = ['R2', 'R3', 'R4', 'R5', 'R6', 'R7', 'R8'].includes(this.currentRoomId);
            if (isNavigationRoom && dwellMs >= 20000) {
                this.roomStallLogged = true;
                this.logNavigationEvent('stall_over_20s', {
                    room: this.currentRoomId,
                    dwellSec: Number((dwellMs / 1000).toFixed(1))
                });
                this.setStatusMessage(`Navigation note: >20s stall logged in ${this.currentRoomId}.`, 120);
            }
        }

        if (this.gateReactionFrames > 0) {
            this.gateReactionFrames--;
            if (this.finalGate) {
                const alpha = 0.35 + 0.65 * Math.abs(Math.sin(this.gateReactionFrames * 0.25));
                const tint = Phaser.Display.Color.GetColor(
                    255,
                    Math.floor(170 + 70 * alpha),
                    Math.floor(70 + 80 * alpha)
                );
                this.finalGate.setTint(tint);
            }
            if (this.gateReactionFrames === 0) {
                if (this.finalGate) this.finalGate.clearTint();
                if (this.gateFeedbackText) this.gateFeedbackText.setVisible(false);
            }
        }

        if (this.player.y > CONFIG.WORLD_HEIGHT + 50) this.handlePlayerDeath();

        if (this.statusMessageFrames > 0) {
            this.statusMessageFrames--;
            if (this.statusMessageFrames === 0) this.statusText.setText('');
        }
    }

    handleInteractionsAndTransitions() {
        const now = this.time.now;
        const room = this.currentRoomId;
        const bounds = ROOM_IDS[room];
        const r4EntryPos = getDoorTargetPosition('R4', 'R4-D1', ROOM_IDS.R4.start + 120, 1020, -140, -128);
        const interactPressed = (this.interactKey && Phaser.Input.Keyboard.JustDown(this.interactKey)) ||
            this.interactQueued;
        this.interactQueued = false;

        if (this.debugBypassKey && Phaser.Input.Keyboard.JustDown(this.debugBypassKey)) this.runDebugBypass();
        if (this.debugUnlockKey && Phaser.Input.Keyboard.JustDown(this.debugUnlockKey) && ENABLE_DEBUG_UNLOCK) this.runDebugUnlock();

        if (now < this.transitionCooldownUntil) return;

        if (room === 'R1' && interactPressed && this.r1ToR2Door) {
            const nearR1Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r1ToR2Door.x,
                this.r1ToR2Door.y
            ) < 130;
            if (nearR1Door) {
                const r2EntryPos = getDoorStandPosition('R2', 'R2-D1', ROOM_IDS.R2.start + 120, 1020);
                this.transitionToRoom('R2', r2EntryPos.x, r2EntryPos.y, 'Transition: R1 -> R2', {
                    entrySide: r2EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R2' && interactPressed && this.r2ToR1Door) {
            const nearR2Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r2ToR1Door.x,
                this.r2ToR1Door.y
            ) < 130;
            if (nearR2Door) {
                const r1EntryPos = getDoorStandPosition('R1', 'R1-D1', ROOM_IDS.R1.end - 140, 1020);
                this.transitionToRoom('R1', r1EntryPos.x, r1EntryPos.y, 'Transition: R2 -> R1', {
                    entrySide: r1EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R2' && interactPressed) {
            const nearbyDoor = this.branchDoors.find((door) => Phaser.Math.Distance.Between(this.player.x, this.player.y, door.x, door.y) < 140);
            if (nearbyDoor) {
                this.tryEnterBranchDoor(nearbyDoor);
                return;
            }
        }

        if (room === 'R3' && interactPressed) {
            let handled = false;

            if (this.r3ReturnDoor) {
                const nearR3ReturnDoor = Phaser.Math.Distance.Between(
                    this.player.x,
                    this.player.y,
                    this.r3ReturnDoor.x,
                    this.r3ReturnDoor.y
                ) < 130;
                if (nearR3ReturnDoor) {
                    if (!this.completeBranchRun('A')) return;
                    const r2NorthDoorPos = getDoorTargetPosition('R2', 'R2-D2', ROOM_IDS.R2.start + 680, 740, 0, 36);
                    this.transitionToRoom('R2', r2NorthDoorPos.x, r2NorthDoorPos.y, 'Branch A complete: return to R2', {
                        entrySide: 'top',
                        preserveY: false
                    });
                    handled = true;
                }
            }

            if (!handled && this.r3ToR4Door) {
                const nearR3ToR4Door = Phaser.Math.Distance.Between(
                    this.player.x,
                    this.player.y,
                    this.r3ToR4Door.x,
                    this.r3ToR4Door.y
                ) < 130;
                if (nearR3ToR4Door) {
                    this.transitionToRoom('R4', r4EntryPos.x, r4EntryPos.y, 'Transition: R3 -> R4 (west entry)', {
                        entrySide: 'left',
                        preserveY: false
                    });
                    handled = true;
                }
            }

            if (handled) return;
        }

        this.player.x = Phaser.Math.Clamp(this.player.x, bounds.start + 24, bounds.end - 24);

        if (room === 'R4' && interactPressed && this.r4ToR3Door && this.r4ToR3Door.visible) {
            const nearR4ReturnDoor = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r4ToR3Door.x,
                this.r4ToR3Door.y
            ) < 130;
            if (nearR4ReturnDoor) {
                const r11EntryPos = getDoorTargetPosition('R11', 'R11-D2', ROOM_IDS.R11.start + 1520, 214, -40, -6);
                this.transitionToRoom('R11', r11EntryPos.x, r11EntryPos.y, 'Transition: R4 -> Tunnel shaft', {
                    entrySide: 'right',
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R11' && interactPressed) {
            if (this.r11ToR3Door) {
                const nearR11SecretDoor = Phaser.Math.Distance.Between(
                    this.player.x,
                    this.player.y,
                    this.r11ToR3Door.x,
                    this.r11ToR3Door.y
                ) < 130;
                if (nearR11SecretDoor) {
                    const r3SecretExitPos = getDoorTargetPosition('R3', 'R3-D3', ROOM_IDS.R3.start + 1560, 560, -20, -40);
                    this.transitionToRoom('R3', r3SecretExitPos.x, r3SecretExitPos.y, 'Secret tunnel: R11 -> R3', {
                        entrySide: 'right',
                        preserveY: false
                    });
                    return;
                }
            }
        }

        if (interactPressed && this.layoutMovers) {
            const nearbyMover = this.layoutMovers.find((mover) =>
                mover.getData('roomId') === room &&
                Phaser.Math.Distance.Between(this.player.x, this.player.y, mover.x, mover.y) < 140
            );
            if (nearbyMover) {
                if (nearbyMover.getData('locked')) {
                    this.setStatusMessage(`Mover ${nearbyMover.getData('layoutId')} is locked.`);
                    return;
                }
                if (nearbyMover.getData('moving')) {
                    this.setStatusMessage(`Mover ${nearbyMover.getData('layoutId')} already moving.`);
                    return;
                }

                const currentlyAtStart = Phaser.Math.Distance.Between(
                    nearbyMover.x,
                    nearbyMover.y,
                    nearbyMover.getData('startX'),
                    nearbyMover.getData('startY')
                ) < 4;
                const currentlyAtEnd = Phaser.Math.Distance.Between(
                    nearbyMover.x,
                    nearbyMover.y,
                    nearbyMover.getData('endX'),
                    nearbyMover.getData('endY')
                ) < 4;

                let targetX = nearbyMover.getData('endX');
                let targetY = nearbyMover.getData('endY');
                if (currentlyAtEnd || (!currentlyAtStart && nearbyMover.getData('forward') === false)) {
                    targetX = nearbyMover.getData('startX');
                    targetY = nearbyMover.getData('startY');
                }

                nearbyMover.setData('targetX', targetX);
                nearbyMover.setData('targetY', targetY);
                nearbyMover.setData('moving', true);
                this.setStatusMessage(`Mover ${nearbyMover.getData('layoutId')} activated.`);
                return;
            }
        }

        if (room === 'R7' && interactPressed && this.r7ToR8Door) {
            const nearR7ToR8Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r7ToR8Door.x,
                this.r7ToR8Door.y
            ) < 130;
            if (nearR7ToR8Door) {
                const r8EntryPos = getDoorStandPosition('R8', 'R8-D1', ROOM_IDS.R8.start + 220, 980);
                this.transitionToRoom('R8', r8EntryPos.x, r8EntryPos.y, 'Transition: R7 -> R8', {
                    entrySide: r8EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R8' && interactPressed && this.r8ToR7Door) {
            const nearR8ToR7Door = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r8ToR7Door.x,
                this.r8ToR7Door.y
            ) < 130;
            if (nearR8ToR7Door) {
                const r7EntryPos = getDoorStandPosition('R7', 'R7-D1', ROOM_IDS.R7.end - 120, 573);
                this.transitionToRoom('R7', r7EntryPos.x, r7EntryPos.y, 'Transition: R8 -> R7', {
                    entrySide: r7EntryPos.entrySide,
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R5' && this.player.x > ROOM_IDS.R5.end - 70 && this.player.y > 900) {
            this.transitionToRoom('R6', ROOM_IDS.R6.start + 180, 980, 'Transition: R5 -> R6', {
                preserveY: false
            });
            return;
        }
        if (room === 'R6' && this.player.x > ROOM_IDS.R6.end - 70 && this.player.y < 940) {
            this.transitionToRoom('R5', ROOM_IDS.R5.start + 1360, 860, 'Transition: R6 -> R5 (loop back lane)', {
                entrySide: 'right',
                preserveY: false
            });
            return;
        }
        if (room === 'R5' && this.player.x < ROOM_IDS.R5.start + 70 && this.player.y < 940) {
            if (!this.completeBranchRun('B')) return;
            const r2EastDoorPos = getDoorTargetPosition('R2', 'R2-D3', ROOM_IDS.R2.start + 1300, 940, 0, 20);
            this.transitionToRoom('R2', r2EastDoorPos.x, r2EastDoorPos.y, 'Branch B complete: return to R2', {
                entrySide: 'right',
                preserveY: false
            });
            return;
        }

        if (room === 'R7' && this.player.x < ROOM_IDS.R7.start + 640 && this.player.y < 420) {
            if (!this.completeBranchRun('C')) return;
            const r2SouthDoorPos = getDoorTargetPosition('R2', 'R2-D4', ROOM_IDS.R2.start + 680, 1060, 0, -28);
            this.transitionToRoom('R2', r2SouthDoorPos.x, r2SouthDoorPos.y, 'Branch C complete: return to R2', {
                entrySide: 'bottom',
                preserveY: false
            });
            return;
        }

        if (room === 'R9' && !this.r9ShellComplete && this.player.x > ROOM_IDS.R9.end - 70) {
            this.logWrongTurn('r9_exit_attempt_before_objective');
            this.setStatusMessage('R9 objective incomplete: touch the core first.', 90);
            this.transitionCooldownUntil = now + 250;
            return;
        }
        if (room === 'R9' && this.r9ShellComplete && this.player.x > ROOM_IDS.R9.end - 70) {
            const r10EntryPos = getDoorTargetPosition('R10', 'R10-D1', ROOM_IDS.R10.start + 120, 1020, 96, 0);
            this.transitionToRoom('R10', r10EntryPos.x, r10EntryPos.y, 'Transition: R9 -> R10');
            return;
        }
        if (room === 'R10' && this.player.x < ROOM_IDS.R10.start + 70) {
            const r9EntryPos = getDoorTargetPosition('R9', 'R9-D1', ROOM_IDS.R9.end - 140, 1020, -96, 0);
            this.transitionToRoom('R9', r9EntryPos.x, r9EntryPos.y, 'Transition: R10 -> R9');
            return;
        }
        if (room === 'R10' && this.player.x > ROOM_IDS.R10.end - 50) {
            const r1GatePos = getDoorTargetPosition('R1', 'R1-D2', 620, 1020, 120, 20);
            this.transitionToRoom('R1', r1GatePos.x, r1GatePos.y, 'Transition: R10 -> R1 (gate return link)');
            return;
        }

        const nearGate = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.finalGate.x, this.finalGate.y) < 130;
        if (room === 'R1' && nearGate && interactPressed) {
            if (this.finalGateState === 'UNLOCKED') {
                this.preFinalCheckpointUnlocked = true;
                this.transitionToRoom('R9', ROOM_IDS.R9.start + 140, 1020, 'Gate opened. Entering R9 final area.');
            } else if (this.finalGateState === 'LOCKED_KEY_ITEMS') {
                this.logWrongTurn('gate_locked_missing_keys');
                this.setStatusMessage('Gate sealed: recover 3 Key Items.');
            } else {
                this.logWrongTurn('gate_locked_missing_abilities');
                this.setStatusMessage('Gate sealed: awaken 3 Abilities.');
            }
        }
    }

    tryEnterBranchDoor(door) {
        if (door.requires === 'A' && !this.abilityA) {
            this.logWrongTurn('branch_b_attempt_before_ability_a');
            this.setStatusMessage('Branch B sealed: requires Ability Unlock A (Abyss Dash).');
            return;
        }
        this.beginBranchRun(door.id);
        const branchSpawn = (roomId, fallbackX, fallbackY) => getRoomSpawnPoint(roomId, fallbackX, fallbackY);
        const branchEntryFallbacks = {
            A: branchSpawn('R3', door.spawnX || (ROOM_IDS.R3.start + 120), door.spawnY || 1020),
            B: branchSpawn('R5', door.spawnX || (ROOM_IDS.R5.start + 120), door.spawnY || 1020),
            C: branchSpawn('R7', door.spawnX || (ROOM_IDS.R7.start + 120), door.spawnY || 1020)
        };
        const resolvedSpawn = branchEntryFallbacks[door.id] || {
            x: door.spawnX || (ROOM_IDS[door.target].start + 120),
            y: door.spawnY || 1020
        };
        const spawnX = resolvedSpawn.x;
        const spawnY = resolvedSpawn.y;
        const entryFlavor = {
            A: 'Entering Branch A (North): narrow vertical ascent',
            B: 'Entering Branch B (East): wide horizontal crawl',
            C: 'Entering Branch C (South): narrow vertical descent'
        };
        this.transitionToRoom(door.target, spawnX, spawnY, entryFlavor[door.id] || `Entering Branch ${door.id}`, {
            entrySide: door.entrySide,
            verticalDirection: door.verticalDirection,
            preserveY: door.preserveY
        });
    }

    completeFinalShell(_player, core) {
        if (this.r9ShellComplete) return;
        this.r9ShellComplete = true;
        core.disableBody(true, true);
        this.refreshObjectiveText();
        this.setStatusMessage('R9 shell complete. Proceed to R10 exit.');
    }

    tryExitRun() {
        if (!this.r9ShellComplete) return;
        this.setStatusMessage('MVP loop complete. Return to R1 via R10 right-edge link.', 360);
    }

    runDebugBypass() {
        this.preFinalCheckpointUnlocked = true;
        this.transitionToRoom('R9', ROOM_IDS.R9.start + 140, 1020, 'DEBUG BYPASS: jumped to R9.');
    }

    runDebugUnlock() {
        this.keyItemA = this.keyItemB = this.keyItemC = true;
        this.abilityA = this.abilityB = this.abilityC = true;
        this.branchCompleteA = this.branchCompleteB = this.branchCompleteC = true;
        if (this.branchDurationsSec.A === null) this.branchDurationsSec.A = 0;
        if (this.branchDurationsSec.B === null) this.branchDurationsSec.B = 0;
        if (this.branchDurationsSec.C === null) this.branchDurationsSec.C = 0;
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.setStatusMessage('DEBUG: Gate requirements set to 3/3 + 3/3.');
    }

    setStatusMessage(message, frames = 180) {
        this.statusText.setText(message);
        this.statusMessageFrames = frames;
    }

    handleMovement() {
        const onGround = this.player.body.blocked.down;
        const velocityY = this.player.body.velocity.y;
        const inAir = !onGround || velocityY < 0;
        const left = this.inputState.left || this.cursors.left.isDown;
        const right = this.inputState.right || this.cursors.right.isDown;
        const jump = this.inputState.jump || this.cursors.up.isDown || this.spaceKey.isDown;
        const jumpJustPressed = (this.cursors.up && this.cursors.up.justDown) ||
            (this.spaceKey && this.spaceKey.justDown) ||
            (this.inputState.jump && !this.jumpWasDownLastFrame);

        if (jumpJustPressed) this.jumpBuffer = 5;
        if (this.jumpBuffer > 0) this.jumpBuffer--;
        if (onGround && velocityY >= 0) this.jumpsRemaining = 1;

        if (left) this.player.setVelocityX(-CONFIG.PLAYER_SPEED).setFlipX(true);
        else if (right) this.player.setVelocityX(CONFIG.PLAYER_SPEED).setFlipX(false);
        else this.player.setVelocityX(this.player.body.velocity.x * CONFIG.FRICTION);

        if (jump && onGround && this.jumpsRemaining > 0) {
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            this.jumpsRemaining--;
            this.jumpBuffer = 0;
        } else if ((jumpJustPressed || this.jumpBuffer > 0) && inAir && this.jumpsRemaining > 0) {
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            this.jumpsRemaining--;
            this.jumpBuffer = 0;
        }

        this.jumpWasDownLastFrame = jump;
    }

    handlePlayerDeath() {
        this.lives--;
        this.updateLifeDisplay();

        if (this.lives <= 0) {
            this.isGameOver = true;
            this.physics.pause();
            this.player.setTint(0xff0000);
            this.add.text(CONFIG.W / 2, CONFIG.H / 2, 'GAME OVER\nTap Restart', {
                fontSize: '32px', fill: '#ff0066', align: 'center'
            }).setOrigin(0.5).setScrollFactor(0);
            return;
        }

        const respawnRoom = this.preFinalCheckpointUnlocked ? 'R9' : 'R1';
        const respawn = getRoomSpawnPoint(respawnRoom, ROOM_IDS[respawnRoom].start + 140, CONFIG.WORLD_HEIGHT - 80);
        this.setCurrentRoom(respawnRoom);
        this.player.setPosition(respawn.x, respawn.y).setVelocity(0, 0);
        this.tweens.add({ targets: this.player, alpha: 0.2, duration: 100, yoyo: true, repeat: 5 });
    }

    updateLifeDisplay() {
        this.lifeIcons.clear(true, true);
        for (let i = 0; i < this.lives; i++) {
            this.lifeIcons.create(CONFIG.W - 30 - (i * 25), 25, 'hero').setScale(0.5).setScrollFactor(0);
        }
    }

    drawMotionTrail() {
        if (Math.abs(this.player.body.velocity.x) > 100) {
            this.trailPts.push({ x: this.player.x, y: this.player.y + 4, life: 10 });
        }
        this.trail.clear();
        this.trailPts = this.trailPts.filter((p) => p.life > 0);
        this.trailPts.forEach((p) => {
            p.life--;
            this.trail.fillStyle(0x00eeff, (p.life / 10) * 0.4);
            this.trail.fillRect(p.x - 4, p.y - 4, 8, 8);
        });
    }
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
        } catch (_) {}

        if ('caches' in window) {
            try {
                const cacheKeys = await caches.keys();
                await Promise.all(cacheKeys.map((key) => caches.delete(key)));
            } catch (_) {}
        }
    });
}

async function bootGame() {
    const canonicalData = await loadCanonicalLayoutData();
    applyRuntimeLayoutData(canonicalData);

    new Phaser.Game({
        type: Phaser.AUTO,
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
            width: CONFIG.W,
            height: CONFIG.H
        },
        parent: 'game-container',
        pixelArt: true,
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: CONFIG.GRAVITY }, debug: false }
        },
        scene: AshenHollow
    });
}

bootGame();
</script>
