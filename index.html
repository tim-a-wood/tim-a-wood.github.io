const BASE_ROOM_SEQUENCE = ['R1', 'R2', 'R3', 'R4', 'R5', 'R6', 'R7', 'R8', 'R9', 'R10', 'R11'];
let ROOM_SEQUENCE = [...BASE_ROOM_SEQUENCE];

function mergeRoomSequence(layoutData) {
    if (layoutData && Array.isArray(layoutData.rooms)) {
        const ordered = [];
        layoutData.rooms.forEach((room) => {
            const id = room?.id;
            if (typeof id !== 'string') return;
            const normalized = id.trim();
            if (!normalized || ordered.includes(normalized)) return;
            ordered.push(normalized);
        });
        if (ordered.length) return ordered;
    }
    return [...BASE_ROOM_SEQUENCE];
}

const ROOM_IDS = {};

function rebuildRoomGeometry(layoutData = null) {
    ROOM_SEQUENCE = mergeRoomSequence(layoutData);
    const roomWidths = new Map();
    if (layoutData && Array.isArray(layoutData.rooms)) {
        layoutData.rooms.forEach((room) => {
            const width = Number(room?.size?.width);
            if (Number.isFinite(width) && width >= 320) {
                roomWidths.set(room.id, width);
            }
        });
    }

    let cursor = 0;
    ROOM_SEQUENCE.forEach((roomId) => {
        const width = roomWidths.get(roomId) || CONFIG.ROOM_WIDTH;
        ROOM_IDS[roomId] = {
            start: cursor,
            end: cursor + width - 1,
            width
        };
        cursor += width;
    });

    CONFIG.WORLD_WIDTH = cursor;
}

function normalizeWorkbenchHeroExport(manifest) {
    const fallback = DEFAULT_WORKBENCH_HERO_EXPORT;
    const clips = {};
    const sourceClips = manifest?.clips && typeof manifest.clips === 'object' ? manifest.clips : fallback.clips;
    Object.entries(sourceClips).forEach(([clipName, clip]) => {
        const frames = Array.isArray(clip?.frames) && clip.frames.length
            ? clip.frames.map((frame) => String(frame))
            : Array.from({ length: Number(clip?.frame_count ?? clip?.frameCount ?? fallback.clips[clipName]?.frameCount ?? 0) }, (_, frameIndex) =>
                `${clipName}_${String(frameIndex).padStart(2, '0')}.png`
            );
        clips[clipName] = {
            fps: Number(clip?.fps ?? fallback.clips[clipName]?.fps ?? 12),
            loop: clip?.loop ?? fallback.clips[clipName]?.loop ?? true,
            frameCount: Number(clip?.frame_count ?? clip?.frameCount ?? frames.length),
            frames
        };
    });
    return {
        basePath: String(manifest?.basePath || fallback.basePath),
        frameWidth: Number(manifest?.frameWidth || fallback.frameWidth),
        frameHeight: Number(manifest?.frameHeight || fallback.frameHeight),
        pivot: {
            x: Number(manifest?.pivot?.x ?? fallback.pivot.x),
            y: Number(manifest?.pivot?.y ?? fallback.pivot.y)
        },
        scale: Number(manifest?.scale ?? fallback.scale),
        body: {
            width: Number(manifest?.body?.width ?? fallback.body.width),
            height: Number(manifest?.body?.height ?? fallback.body.height),
            offsetX: Number(manifest?.body?.offsetX ?? fallback.body.offsetX),
            offsetY: Number(manifest?.body?.offsetY ?? fallback.body.offsetY)
        },
        clips,
        debugBindings: manifest?.debugBindings && typeof manifest.debugBindings === 'object'
            ? manifest.debugBindings
            : fallback.debugBindings
    };
}

async function loadWorkbenchHeroExport() {
    try {
        const response = await fetch(WORKBENCH_HERO_MANIFEST_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const manifest = await response.json();
        return normalizeWorkbenchHeroExport(manifest);
    } catch (error) {
        console.warn('Falling back to embedded workbench hero export config.', error);
        return normalizeWorkbenchHeroExport(DEFAULT_WORKBENCH_HERO_EXPORT);
    }
}

function pointInPolygon(x, y, polygon) {
    let inside = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i][0];
        const yi = polygon[i][1];
        const xj = polygon[j][0];
        const yj = polygon[j][1];
        const intersects = ((yi > y) !== (yj > y)) &&
            (x < ((xj - xi) * (y - yi) / ((yj - yi) || 1e-9)) + xi);
        if (intersects) inside = !inside;
    }
    return inside;
}

function closestPointOnSegment(point, start, end) {
    const dx = end[0] - start[0];
    const dy = end[1] - start[1];
    const lengthSquared = (dx * dx) + (dy * dy);
    if (lengthSquared === 0) {
        return {
            point: { x: start[0], y: start[1] },
            distance: Math.hypot(point.x - start[0], point.y - start[1]),
            t: 0
        };
    }
    let t = (((point.x - start[0]) * dx) + ((point.y - start[1]) * dy)) / lengthSquared;
    t = Math.max(0, Math.min(1, t));
    const projectedX = start[0] + (dx * t);
    const projectedY = start[1] + (dy * t);
    return {
        point: { x: projectedX, y: projectedY },
        distance: Math.hypot(point.x - projectedX, point.y - projectedY),
        t
    };
}

function getPolygonEdge(polygon, edgeIndex) {
    if (!Array.isArray(polygon) || polygon.length < 2) return null;
    const count = polygon.length;
    const normalizedIndex = ((Number(edgeIndex) % count) + count) % count;
    return {
        edgeIndex: normalizedIndex,
        start: polygon[normalizedIndex],
        end: polygon[(normalizedIndex + 1) % count]
    };
}

function getPolygonEdgeOutwardNormal(polygon, edgeIndex) {
    const edge = getPolygonEdge(polygon, edgeIndex);
    if (!edge) return { x: 0, y: -1 };
    const dx = edge.end[0] - edge.start[0];
    const dy = edge.end[1] - edge.start[1];
    const length = Math.hypot(dx, dy) || 1;
    const normalA = { x: -dy / length, y: dx / length };
    const normalB = { x: dy / length, y: -dx / length };
    const midX = (edge.start[0] + edge.end[0]) / 2;
    const midY = (edge.start[1] + edge.end[1]) / 2;
    const sampleDistance = 8;
    if (!pointInPolygon(midX + (normalA.x * sampleDistance), midY + (normalA.y * sampleDistance), polygon)) {
        return normalA;
    }
    if (!pointInPolygon(midX + (normalB.x * sampleDistance), midY + (normalB.y * sampleDistance), polygon)) {
        return normalB;
    }
    return normalA;
}

function isPointInRemovedEdgeTunnel(point, polygon, edgeIndex, options = {}) {
    const edge = getPolygonEdge(polygon, edgeIndex);
    if (!edge) return false;
    const dx = edge.end[0] - edge.start[0];
    const dy = edge.end[1] - edge.start[1];
    const lengthSquared = (dx * dx) + (dy * dy);
    if (lengthSquared === 0) return false;
    const length = Math.sqrt(lengthSquared);
    const endpointPad = Number.isFinite(options.endpointPad) ? options.endpointPad : 28;
    const inwardPad = Number.isFinite(options.inwardPad) ? options.inwardPad : 10;
    const normal = getPolygonEdgeOutwardNormal(polygon, edgeIndex);
    const relX = point.x - edge.start[0];
    const relY = point.y - edge.start[1];
    const t = ((relX * dx) + (relY * dy)) / lengthSquared;
    const padT = endpointPad / length;
    if (t < -padT || t > 1 + padT) return false;
    const signedDistance = (relX * normal.x) + (relY * normal.y);
    return signedDistance >= -inwardPad;
}

function getRoomWidth(roomId) {
    return ROOM_IDS[roomId]?.width || CONFIG.ROOM_WIDTH;
}

function clampNumber(value, min, max) {
    return Math.min(max, Math.max(min, value));
}

function normalizeLayoutRoom(room) {
    if (!room) return null;

    const fallbackWidth = getRoomWidth(room.id);
    const width = Math.max(320, Number(room?.size?.width || fallbackWidth));
    const sourceHeight = Math.max(320, Number(room?.size?.height || CONFIG.WORLD_HEIGHT));
    const scaleY = CONFIG.WORLD_HEIGHT / sourceHeight;
    const normalizeX = (value, fallback = 0) => {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) return fallback;
        return clampNumber(numeric, 0, width);
    };
    const normalizeY = (value, fallback = CONFIG.WORLD_HEIGHT - 64) => {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) return fallback;
        const scaled = sourceHeight === CONFIG.WORLD_HEIGHT ? numeric : (numeric * scaleY);
        return clampNumber(Number(scaled.toFixed(2)), 0, CONFIG.WORLD_HEIGHT);
    };

    const normalizedRoom = {
        ...room,
        size: {
            width,
            height: CONFIG.WORLD_HEIGHT
        },
        global: room.global &&
            Number.isFinite(Number(room.global.x)) &&
            Number.isFinite(Number(room.global.y))
            ? { x: Number(room.global.x), y: Number(room.global.y) }
            : { x: 0, y: 0 }
    };

    if (Array.isArray(room.polygon) && room.polygon.length >= 3) {
        normalizedRoom.polygon = room.polygon.map((point) => [
            normalizeX(point?.[0], 0),
            normalizeY(point?.[1], 0)
        ]);
    } else {
        const insetX = Math.min(160, Math.max(32, Math.floor(width * 0.2)));
        const insetY = Math.min(160, Math.max(32, Math.floor(CONFIG.WORLD_HEIGHT * 0.2)));
        normalizedRoom.polygon = [
            [insetX, insetY],
            [width - insetX, insetY],
            [width - insetX, CONFIG.WORLD_HEIGHT - insetY],
            [insetX, CONFIG.WORLD_HEIGHT - insetY]
        ];
    }

    normalizedRoom.platforms = Array.isArray(room.platforms)
        ? room.platforms.map((platform) => ({
            ...platform,
            x: normalizeX(platform.x, 0),
            y: normalizeY(platform.y, CONFIG.WORLD_HEIGHT - 64),
            len: Math.max(1, Number(platform.len || 1)),
            tint: Number(platform.tint || 0)
        }))
        : [];

    normalizedRoom.doors = Array.isArray(room.doors)
        ? room.doors.map((door) => ({
            ...door,
            x: normalizeX(door.x, 0),
            y: normalizeY(door.y, CONFIG.WORLD_HEIGHT - 64)
        }))
        : [];

    normalizedRoom.keys = Array.isArray(room.keys)
        ? room.keys.map((key) => ({
            ...key,
            x: normalizeX(key.x, 0),
            y: normalizeY(key.y, CONFIG.WORLD_HEIGHT - 64)
        }))
        : [];

    normalizedRoom.movingPlatforms = Array.isArray(room.movingPlatforms)
        ? room.movingPlatforms.map((mover) => {
            const startX = normalizeX(mover.x, 0);
            const startY = normalizeY(mover.y, CONFIG.WORLD_HEIGHT - 64);
            return {
                ...mover,
                x: startX,
                y: startY,
                endX: normalizeX(mover.endX, startX),
                endY: normalizeY(mover.endY, startY),
                len: Math.max(1, Number(mover.len || 1)),
                tint: Number(mover.tint || 0)
            };
        })
        : [];

    normalizedRoom.playerStart = room.playerStart &&
        Number.isFinite(Number(room.playerStart.x)) &&
        Number.isFinite(Number(room.playerStart.y))
        ? {
            x: normalizeX(room.playerStart.x, 120),
            y: normalizeY(room.playerStart.y, CONFIG.WORLD_HEIGHT - 80)
        }
        : null;

    normalizedRoom.edgeLinks = Array.isArray(room.edgeLinks)
        ? room.edgeLinks
            .map((link) => ({
                edgeIndex: Number(link?.edgeIndex),
                targetRoomId: String(link?.targetRoomId || ''),
                targetEdgeIndex: Number(link?.targetEdgeIndex)
            }))
            .filter((link) => Number.isInteger(link.edgeIndex) && link.edgeIndex >= 0 && Number.isInteger(link.targetEdgeIndex) && link.targetEdgeIndex >= 0 && link.targetRoomId)
        : [];

    normalizedRoom.removedEdges = [...new Set(
        (Array.isArray(room.removedEdges) ? room.removedEdges : Array.isArray(room.openEdges) ? room.openEdges : [])
            .map((edgeIndex) => Number(edgeIndex))
            .filter((edgeIndex) => Number.isInteger(edgeIndex) && edgeIndex >= 0 && edgeIndex < normalizedRoom.polygon.length)
    )].sort((a, b) => a - b);

    normalizedRoom.environment = normalizeEnvironmentFromLayout(room);

    return normalizedRoom;
}

function normalizeLayoutData(data) {
    if (!data || !Array.isArray(data.rooms)) return null;
    return {
        ...data,
        rooms: data.rooms.map((room) => normalizeLayoutRoom(room)).filter(Boolean)
    };
}

function ensureLayoutRoomShape(room) {
    return normalizeLayoutRoom(room);
}

function getRuntimeLayoutRooms() {
    if (!ACTIVE_LAYOUT_DATA || !Array.isArray(ACTIVE_LAYOUT_DATA.rooms)) return [];
    return ACTIVE_LAYOUT_DATA.rooms
        .filter((room) => ROOM_IDS[room.id])
        .map((room) => ensureLayoutRoomShape(room));
}

function buildWallRectsFromPolygon(polygon, roomWidth = CONFIG.ROOM_WIDTH, roomHeight = CONFIG.WORLD_HEIGHT, removedEdges = []) {
    const tile = 32;
    const cols = Math.floor(roomWidth / tile);
    const rows = Math.floor(roomHeight / tile);
    const wallGrid = Array.from({ length: rows }, () => Array(cols).fill(false));
    const rects = [];

    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            const x = (col * tile) + 16;
            const y = (row * tile) + 16;
            wallGrid[row][col] = !pointInPolygon(x, y, polygon);
        }
    }

    removedEdges.forEach((edgeIndex) => {
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                if (!wallGrid[row][col]) continue;
                const point = { x: (col * tile) + 16, y: (row * tile) + 16 };
                if (isPointInRemovedEdgeTunnel(point, polygon, edgeIndex, {
                    endpointPad: tile,
                    inwardPad: tile * 0.5
                })) {
                    wallGrid[row][col] = false;
                }
            }
        }
    });

    for (let row = 0; row < rows; row++) {
        let runStart = null;
        for (let col = 0; col < cols; col++) {
            const isWall = wallGrid[row][col];
            if (isWall && runStart === null) runStart = col;
            if ((!isWall || col === cols - 1) && runStart !== null) {
                const endCol = isWall ? col : col - 1;
                rects.push({
                    x: runStart * tile,
                    y: (row * tile) + 16,
                    wTiles: (endCol - runStart) + 1,
                    hTiles: 1
                });
                runStart = null;
            }
        }
    }

    return rects;
}

/** True when polygon-derived wall rects will actually spawn procedural wall tiles. */
function roomHasPolygonWallTileRects(roomId) {
    const entry = DUNGEON_WALL_RECTS.find((e) => e.room === roomId);
    return Boolean(entry && Array.isArray(entry.rects) && entry.rects.length > 0);
}

function loadLayoutDataFromStorage() {
    try {
        const raw = window.localStorage.getItem(LAYOUT_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.rooms)) return null;
        return parsed;
    } catch (_) {
        return null;
    }
}

async function loadCanonicalLayoutData() {
    try {
        const response = await fetch(`./room-layout-data.json?ts=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) return null;
        const parsed = await response.json();
        if (!parsed || !Array.isArray(parsed.rooms)) return null;
        return parsed;
    } catch (_) {
        return null;
    }
}

async function loadLayoutDataFromHashUrl() {
    try {
        const hash = window.location.hash || '';
        const match = hash.match(/layout_url=([^&]+)/);
        if (!match) return null;
        const target = decodeURIComponent(match[1]);
        if (!target) return null;
        const response = await fetch(target, { cache: 'no-store' });
        if (!response.ok) return null;
        const parsed = await response.json();
        if (!parsed || !Array.isArray(parsed.rooms)) return null;
        return parsed;
    } catch (_) {
        return null;
    }
}

function loadLayoutDataFromHash() {
    try {
        const hash = window.location.hash || '';
        const match = hash.match(/layout=([^&]+)/);
        if (!match) return null;
        const decoded = decodeURIComponent(match[1]);
        const json = decodeURIComponent(escape(atob(decoded)));
        const parsed = JSON.parse(json);
        if (!parsed || !Array.isArray(parsed.rooms)) return null;
        return parsed;
    } catch (_) {
        return null;
    }
}

function applyRuntimeLayoutData(canonicalData = null, hashUrlData = null) {
    const layoutFromEmbed = window.__previewLayoutFromParent;
    const embedMeta = layoutFromEmbed ? { startRoom: layoutFromEmbed.startRoom } : null;
    if (layoutFromEmbed) window.__previewLayoutFromParent = null;

    const hashData = loadLayoutDataFromHash();
    const storageData = loadLayoutDataFromStorage();
    const data = normalizeLayoutData(
        layoutFromEmbed?.layout || hashUrlData || hashData || canonicalData || storageData
    );
    rebuildRoomGeometry(data);
    if (!data) {
        ACTIVE_LAYOUT_DATA = null;
        ACTIVE_LAYOUT_SOURCE = 'default';
        return;
    }

    ACTIVE_LAYOUT_DATA = data;
    ACTIVE_LAYOUT_SOURCE = layoutFromEmbed ? 'embed' : hashData ? 'hash' : canonicalData ? 'canonical' : 'storage';
    const runtimeRooms = data.rooms.filter((room) => ROOM_IDS[room.id]);

    const nextPlatforms = {};
    runtimeRooms.forEach((room) => {
        nextPlatforms[room.id] = (room.platforms || []).map((platform) => ({
            x: ROOM_IDS[room.id].start + platform.x,
            y: platform.y,
            len: platform.len,
            tint: platform.tint || 0
        }));
    });
    ROOM_PLATFORM_LAYOUTS = nextPlatforms;

    DUNGEON_WALL_RECTS = runtimeRooms
        .filter((room) => Array.isArray(room.polygon) && room.polygon.length >= 3)
        .map((room) => ({
            room: room.id,
            rects: buildWallRectsFromPolygon(
                room.polygon,
                Number(room?.size?.width) || getRoomWidth(room.id),
                CONFIG.WORLD_HEIGHT,
                room.removedEdges || []
            )
        }));

    applyPreviewStartFromHash(embedMeta);
}

function getLayoutRoom(roomId) {
    if (!ACTIVE_LAYOUT_DATA) return null;
    return ACTIVE_LAYOUT_DATA.rooms.find((room) => room.id === roomId) || null;
}

function getRoomVerticalBounds(roomId) {
    const room = getLayoutRoom(roomId);
    if (room && Array.isArray(room.polygon) && room.polygon.length >= 3) {
        const ys = room.polygon.map((point) => Number(point?.[1])).filter((value) => Number.isFinite(value));
        if (ys.length) {
            return {
                top: Math.min(...ys),
                bottom: Math.max(...ys)
            };
        }
    }
    return { top: 0, bottom: CONFIG.WORLD_HEIGHT };
}

function getRoomPolygonBounds(roomId) {
    const room = getLayoutRoom(roomId);
    const fallbackWidth = getRoomWidth(roomId);
    if (room && Array.isArray(room.polygon) && room.polygon.length >= 3) {
        const xs = room.polygon.map((point) => Number(point?.[0])).filter((value) => Number.isFinite(value));
        const ys = room.polygon.map((point) => Number(point?.[1])).filter((value) => Number.isFinite(value));
        if (xs.length && ys.length) {
            return {
                left: Math.max(0, Math.min(...xs)),
                right: Math.min(fallbackWidth, Math.max(...xs)),
                top: Math.max(0, Math.min(...ys)),
                bottom: Math.min(CONFIG.WORLD_HEIGHT, Math.max(...ys))
            };
        }
    }
    return { left: 0, right: fallbackWidth, top: 0, bottom: CONFIG.WORLD_HEIGHT };
}

function getRoomPolygonWorldPoints(roomId, roomBounds) {
    if (!roomBounds) return [];
    const room = getLayoutRoom(roomId);
    const poly = room?.polygon;
    if (!Array.isArray(poly) || poly.length < 3) return [];
    const roomStart = Number(roomBounds.start || 0);
    return poly.map((p) => {
        const lx = Number(p?.[0]);
        const ly = Number(p?.[1]);
        if (!Number.isFinite(lx) || !Number.isFinite(ly)) return null;
        return { x: roomStart + lx, y: ly };
    }).filter(Boolean);
}

function ensureRoomFootprintGeometryMask(scene, roomId, roomBounds, invertAlpha = false) {
    if (!scene || !roomBounds) return null;
    const maskType = invertAlpha ? 'outer-shell' : 'room-opening';
    scene.roomEnvironmentFootprintMasks = scene.roomEnvironmentFootprintMasks || {};
    const cached = scene.roomEnvironmentFootprintMasks?.[roomId]?.[maskType];
    if (cached?.mask) return cached.mask;
    const worldPts = getRoomPolygonWorldPoints(roomId, roomBounds);
    if (worldPts.length < 3) return null;
    const maskG = scene.add.graphics();
    maskG.fillStyle(0xffffff, 1);
    maskG.beginPath();
    maskG.moveTo(worldPts[0].x, worldPts[0].y);
    for (let i = 1; i < worldPts.length; i += 1) {
        maskG.lineTo(worldPts[i].x, worldPts[i].y);
    }
    maskG.closePath();
    maskG.fillPath();
    const mask = maskG.createGeometryMask();
    if (mask && typeof mask === 'object' && 'invertAlpha' in mask) {
        mask.invertAlpha = invertAlpha;
    }
    maskG.setVisible(false);
    scene.roomEnvironmentFootprintMasks[roomId] = scene.roomEnvironmentFootprintMasks[roomId] || {};
    scene.roomEnvironmentFootprintMasks[roomId][maskType] = { mask, graphics: maskG };
    scene.environmentDecor = scene.environmentDecor || [];
    if (Array.isArray(scene.environmentDecor)) {
        scene.environmentDecor.push(maskG);
    }
    return mask;
}

function applyRoomInteriorFootprintMask(scene, sprite, roomId, roomBounds) {
    if (!scene || !sprite || !roomBounds) return;
    const mask = ensureRoomFootprintGeometryMask(scene, roomId, roomBounds, false);
    if (mask) sprite.setMask(mask);
}

/**
 * Primary floor spans along the polygon bottom: for each tile column, find the lowest interior
 * point (max Y) and snap to the 32px floor grid. Merging runs yields disjoint horizontal segments
 * at possibly different tile-center Y values so the floor cap / lip follows stepped or non-rect footprints
 * instead of one full-width strip from the axis-aligned bbox.
 */
function getRoomPolygonPrimaryFloorSpans(roomId) {
    const room = getLayoutRoom(roomId);
    const slot = ROOM_IDS[roomId];
    if (!room || !slot || !Array.isArray(room.polygon) || room.polygon.length < 3) {
        return null;
    }
    const poly = room.polygon;
    const pb = getRoomPolygonBounds(roomId);
    const roomWidth = slot.width;
    const yTop = Math.max(0, Number(pb.top) - 8);
    const yBot = Math.min(CONFIG.WORLD_HEIGHT - 1, Number(pb.bottom) + 64);
    const xMin = Math.max(16, Math.floor(Number(pb.left) / 32) * 32 + 16);
    const xMax = Math.min(roomWidth - 16, Math.ceil(Number(pb.right) / 32) * 32 - 16);
    if (xMin > xMax) {
        return null;
    }
    const samples = [];
    for (let cx = xMin; cx <= xMax; cx += 32) {
        let maxInside = null;
        for (let y = yBot; y >= yTop; y -= 8) {
            if (pointInPolygon(cx, y, poly)) {
                maxInside = y;
                break;
            }
        }
        if (maxInside == null) {
            continue;
        }
        const rawCenter = maxInside - 16;
        const snapped = Math.round((rawCenter - 16) / 32) * 32 + 16;
        samples.push({ cx, ty: snapped });
    }
    if (!samples.length) {
        return null;
    }
    const spans = [];
    let segStart = samples[0].cx;
    let segEnd = samples[0].cx;
    let segTy = samples[0].ty;
    for (let i = 1; i < samples.length; i += 1) {
        if (samples[i].ty !== segTy) {
            spans.push({ localLeft: segStart - 16, localRight: segEnd + 16, tileCenterY: segTy });
            segStart = samples[i].cx;
            segEnd = samples[i].cx;
            segTy = samples[i].ty;
        } else {
            segEnd = samples[i].cx;
        }
    }
    spans.push({ localLeft: segStart - 16, localRight: segEnd + 16, tileCenterY: segTy });
    return spans;
}

/**
 * World-space rectangle for camera clamping: footprint polygon plus bleed when present
 * (wider horizontally for wall strips, one tile vertically), otherwise the full room slot.
 */
function getRoomCameraChamberBoundsWorld(roomId) {
    const slot = ROOM_IDS[roomId];
    if (!slot) {
        return { x: 0, y: 0, width: CONFIG.WORLD_WIDTH, height: CONFIG.WORLD_HEIGHT };
    }
    const layoutRoom = getLayoutRoom(roomId);
    const poly = getRoomPolygonBounds(roomId);
    const hasPoly = layoutRoom && Array.isArray(layoutRoom.polygon) && layoutRoom.polygon.length >= 3
        && (poly.right > poly.left) && (poly.bottom > poly.top);
    if (hasPoly) {
        const bleedY = Number(CONFIG.CAMERA_CHAMBER_SURFACE_BLEED_PX) || 32;
        const bleedX = Number(CONFIG.CAMERA_CHAMBER_SIDE_BLEED_PX) || bleedY;
        const innerLeft = Math.max(0, Number(poly.left) - bleedX);
        const innerTop = Math.max(0, Number(poly.top) - bleedY);
        const innerRight = Math.min(Number(slot.width), Number(poly.right) + bleedX);
        const innerBottom = Math.min(CONFIG.WORLD_HEIGHT, Number(poly.bottom) + bleedY);
        return {
            x: slot.start + innerLeft,
            y: innerTop,
            width: Math.max(64, innerRight - innerLeft),
            height: Math.max(64, innerBottom - innerTop)
        };
    }
    return { x: slot.start, y: 0, width: slot.width, height: CONFIG.WORLD_HEIGHT };
}

/** Bottom Y for backgrounds, midground, and default floor row — always world bottom (polygon max Y can sit above the floor plane). */
function getRoomVisualWorldBottom() {
    return CONFIG.WORLD_HEIGHT;
}

/**
 * AI shell strips are authored at fixed pixel sizes; TileSprite defaults repeat at 1:1 and read as a grid of arches/noise.
 * Stretch one texture instance to fill the rect (non-uniform) so walls/floors read as continuous surfaces.
 */
function applyEnvironmentStripTileScale(sprite, width, height, texW, texH) {
    if (!sprite || width < 8 || height < 8 || !texW || !texH) return;
    sprite.tileScaleX = width / texW;
    sprite.tileScaleY = height / texH;
}

/** TileSprite fill scale: use frame size (32×32 procedural vs 512×512 AI strips). */
function applyWallStripTileScaleFromTexture(scene, sprite, width, height, textureKey) {
    if (!sprite || width < 8 || height < 8 || !scene?.textures?.exists(textureKey)) return;
    let texW = 512;
    let texH = 512;
    try {
        const tex = scene.textures.get(textureKey);
        const frame = tex.get();
        const fw = Number(frame?.width);
        const fh = Number(frame?.height);
        if (fw > 0 && fh > 0) {
            texW = fw;
            texH = fh;
        } else {
            const src = tex.getSourceImage?.();
            const w = Number(src?.naturalWidth || src?.width);
            const h = Number(src?.naturalHeight || src?.height);
            if (w > 0 && h > 0) {
                texW = w;
                texH = h;
            }
        }
    } catch (_) {
        /* keep defaults */
    }
    applyEnvironmentStripTileScale(sprite, width, height, texW, texH);
}

function getPrimaryFloorPlatform(roomId) {
    const room = getLayoutRoom(roomId);
    const platforms = Array.isArray(room?.platforms) ? room.platforms : [];
    if (!platforms.length || !ROOM_IDS[roomId]) return null;
    const polygonBounds = getRoomPolygonBounds(roomId);
    const chamberWidth = Math.max(1, polygonBounds.right - polygonBounds.left);
    const { bottom } = getRoomVerticalBounds(roomId);
    const candidates = platforms
        .map((platform) => ({
            platform,
            width: Math.max(1, Number(platform.len || 1)) * 32,
            y: Number(platform.y || 0)
        }))
        .filter((entry) => entry.width >= chamberWidth * 0.68 && entry.y >= bottom - 96)
        .sort((a, b) => b.width - a.width || b.y - a.y);
    return candidates[0]?.platform || null;
}

/** Y center of primary floor tile row — matches `createRoomSurfaceTile` for floor physics. */
function getPrimaryFloorTileCenterY(roomId, floorWorldY) {
    const pf = getPrimaryFloorPlatform(roomId);
    if (pf) return Number(pf.y || floorWorldY);
    return floorWorldY;
}

/**
 * Y center of the floor tile row that matches the layout footprint: polygon `bottom` is the bottom edge
 * of the floor tile row (room-local), so tile center = bottom − 16 (32px tiles). When no polygon, fall back
 * to the widest primary platform / world floor row.
 */
function getLayoutFloorTileCenterY(roomId, floorWorldY) {
    const room = getLayoutRoom(roomId);
    if (room && Array.isArray(room.polygon) && room.polygon.length >= 3) {
        const b = Number(getRoomPolygonBounds(roomId).bottom);
        if (Number.isFinite(b) && b > 0) {
            return b - 16;
        }
    }
    return getPrimaryFloorTileCenterY(roomId, floorWorldY);
}

/**
 * Top of walk surface (floor tiles are 32×32 with center at layout floor row).
 */
function getRoomWalkPlaneTopY(roomId, floorWorldY) {
    return getLayoutFloorTileCenterY(roomId, floorWorldY) - 16;
}

/**
 * RW-4 — strongly differentiated for QA (background + starfield read as different biomes).
 * Editor `themeId` values must match js/wizard/environment.js THEME_PRESETS ids.
 *
 * `contrast-qa` — temporary QA only: solid black camera clear color to read bespoke shell
 * (walls/floor/platform strips) against a neutral ground. Not a shipping biome preset.
 * Playtest/embed may still send another `themeId`; add **?contrast-qa=1** to the game URL to force the same black-void + masonry styling.
 */
const ROOM_ENV_THEME_BG = {
    cave: '#0a1628',
    /* Cool near-void: warm brown (#2a1a0a) read as a sepia haze over most of the viewport in playtest/embed */
    ruins: '#101820',
    forest: '#061a0c',
    shrine: '#1f0a2a',
    sewer: '#0a2a22',
    void: '#240818',
    custom: '#101018',
    'contrast-qa': '#000000'
};

/** Multiply tint on the parallax star tile (Phaser hex). */
const ROOM_ENV_STARFIELD_TINT = {
    cave: 0x8899dd,
    ruins: 0x7a8fa3,
    forest: 0x77dd99,
    shrine: 0xbb88ff,
    sewer: 0x55eedd,
    void: 0xee77cc,
    custom: 0xcccccc,
    'contrast-qa': 0x333333
};

function normalizeEnvironmentFromLayout(room) {
    const defaults = { version: 1, themeId: 'contrast-qa', tags: [], spec: {}, preview: {}, runtime: {} };
    if (!room || !room.environment || typeof room.environment !== 'object') {
        return { ...defaults };
    }
    const e = room.environment;
    const tags = Array.isArray(e.tags) ? e.tags.map((t) => String(t).trim()).filter(Boolean) : [];
    const themeId =
        typeof e.themeId === 'string' && e.themeId.trim() ? e.themeId.trim() : defaults.themeId;
    const version = typeof e.version === 'number' && e.version >= 1 ? e.version : defaults.version;
    const spec = e.spec && typeof e.spec === 'object' ? e.spec : {};
    const preview = e.preview && typeof e.preview === 'object' ? e.preview : {};
    const runtime = e.runtime && typeof e.runtime === 'object' ? e.runtime : {};
    return { version, themeId, tags, spec, preview, runtime };
}

function isContrastQaUrlForced() {
    try {
        if (typeof window === 'undefined' || !window.location || typeof window.location.search !== 'string') return false;
        return /(?:^|[?&])contrast-qa=1(?:&|$)/.test(window.location.search);
    } catch (_) {
        return false;
    }
}

/**
 * True when the void behind gameplay should be solid black and scenic layers suppressed:
 * room `themeId` is `contrast-qa`, or the playtest URL includes `?contrast-qa=1` (embed may still show another theme in HUD).
 */
function isContrastQaEnvironment(roomId) {
    if (isContrastQaUrlForced()) return true;
    const env = normalizeEnvironmentFromLayout(getLayoutRoom(roomId));
    return env.themeId === 'contrast-qa';
}

function getEnvironmentHudLine(roomId) {
    const room = getLayoutRoom(roomId);
    const env = normalizeEnvironmentFromLayout(room);
    const tagStr = env.tags.length ? env.tags.join(', ') : '—';
    const qaHint = isContrastQaUrlForced() ? ' · black-void(QA)' : '';
    return `ENV: ${env.themeId} · ${tagStr}${qaHint}`;
}

function getEnvironmentBackgroundColor(roomId) {
    if (isContrastQaEnvironment(roomId)) return '#000000';
    const env = normalizeEnvironmentFromLayout(getLayoutRoom(roomId));
    return ROOM_ENV_THEME_BG[env.themeId] || ROOM_ENV_THEME_BG.cave;
}

function getEnvironmentStarfieldTint(roomId) {
    const env = normalizeEnvironmentFromLayout(getLayoutRoom(roomId));
    return ROOM_ENV_STARFIELD_TINT[env.themeId] != null
        ? ROOM_ENV_STARFIELD_TINT[env.themeId]
        : ROOM_ENV_STARFIELD_TINT.custom;
}

function clamp8(value) {
    return Math.max(0, Math.min(255, Math.round(value)));
}

function hexToRgb(value, fallback) {
    const text = String(value || '').trim().replace(/^#/, '');
    if (/^[0-9a-fA-F]{6}$/.test(text)) {
        return {
            r: parseInt(text.slice(0, 2), 16),
            g: parseInt(text.slice(2, 4), 16),
            b: parseInt(text.slice(4, 6), 16)
        };
    }
    return fallback;
}

function rgbToHexInt(rgb) {
    return ((clamp8(rgb.r) << 16) | (clamp8(rgb.g) << 8) | clamp8(rgb.b)) >>> 0;
}

function mixRgb(a, b, t) {
    return {
        r: clamp8((a.r * (1 - t)) + (b.r * t)),
        g: clamp8((a.g * (1 - t)) + (b.g * t)),
        b: clamp8((a.b * (1 - t)) + (b.b * t))
    };
}

function adjustRgb(rgb, delta) {
    return { r: clamp8(rgb.r + delta), g: clamp8(rgb.g + delta), b: clamp8(rgb.b + delta) };
}

function textureMatchesExpectedSize(scene, textureKey, width, height) {
    if (!scene?.textures?.exists(textureKey)) return false;
    const texture = scene.textures.get(textureKey);
    const source = texture?.getSourceImage?.() || texture?.source?.[0]?.image || texture?.source?.[0];
    const frame = texture?.frames?.__BASE || texture?.get?.('__BASE') || null;
    const sourceWidth = Number(
        frame?.cutWidth
        || frame?.realWidth
        || frame?.width
        || source?.naturalWidth
        || source?.videoWidth
        || source?.width
        || 0
    );
    const sourceHeight = Number(
        frame?.cutHeight
        || frame?.realHeight
        || frame?.height
        || source?.naturalHeight
        || source?.videoHeight
        || source?.height
        || 0
    );
    if (!sourceWidth || !sourceHeight) return false;
    return sourceWidth === width && sourceHeight === height;
}

/** Native pixel size of a loaded bespoke env texture (for capping display stretch). */
function getEnvBespokeTextureFrameSize(scene, slotId) {
    const textureKey = slotId ? `env-bespoke-${slotId}` : '';
    if (!textureKey || !scene?.textures?.exists(textureKey)) {
        return { w: 320, h: 640 };
    }
    const texture = scene.textures.get(textureKey);
    const source = texture?.getSourceImage?.() || texture?.source?.[0]?.image || texture?.source?.[0];
    const frame = texture?.frames?.__BASE || texture?.get?.('__BASE') || null;
    const w = Number(
        frame?.cutWidth
        || frame?.realWidth
        || frame?.width
        || source?.naturalWidth
        || source?.videoWidth
        || source?.width
        || 0
    );
    const h = Number(
        frame?.cutHeight
        || frame?.realHeight
        || frame?.height
        || source?.naturalHeight
        || source?.videoHeight
        || source?.height
        || 0
    );
    if (w > 0 && h > 0) return { w, h };
    return { w: 320, h: 640 };
}

function getRoomEnvironmentAssetPack(roomId) {
    const env = normalizeEnvironmentFromLayout(getLayoutRoom(roomId));
    const pack = env.runtime?.asset_pack;
    return pack && typeof pack === 'object' ? pack : null;
}

function getRoomEnvironmentBespokeManifest(roomId) {
    const env = normalizeEnvironmentFromLayout(getLayoutRoom(roomId));
    const manifest = env.runtime?.bespoke_asset_manifest;
    return manifest && typeof manifest === 'object' ? manifest : null;
}

function isPlayableRoomEnvironmentBespokeManifest(manifest) {
    if (!ENABLE_BESPOKE_ROOM_RUNTIME) return false;
    if (!manifest || typeof manifest !== 'object') return false;
    if (manifest.status === 'ready') return true;
    return manifest.status === 'failed' && Array.isArray(manifest.built_slots) && manifest.built_slots.length > 0;
}

function getRoomEnvironmentAsset(roomId, kind) {
    const pack = getRoomEnvironmentAssetPack(roomId);
    const assets = pack?.assets;
    const asset = assets && typeof assets === 'object' ? assets[kind] : null;
    return asset && typeof asset === 'object' ? asset : null;
}

function getRoomEnvironmentBespokeAsset(roomId, componentType) {
    if (!ENABLE_BESPOKE_ROOM_RUNTIME) return null;
    const manifest = getRoomEnvironmentBespokeManifest(roomId);
    if (!isPlayableRoomEnvironmentBespokeManifest(manifest)) return null;
    const assets = manifest.assets && typeof manifest.assets === 'object' ? Object.values(manifest.assets) : [];
    const aliases = {
        background_plate: ['background_far_plate', 'background_plate'],
        midground_frame: ['midground_side_frame', 'midground_frame'],
        primary_floor_piece: ['main_floor_top', 'primary_floor_piece'],
        hero_platform_piece: ['hero_platform_top', 'hero_platform_piece'],
        door_piece: ['door_frame', 'door_piece'],
        background_far_plate: ['background_far_plate'],
        midground_side_frame: ['midground_side_frame'],
        main_floor_top: ['main_floor_top'],
        main_floor_face: ['main_floor_face'],
        hero_platform_top: ['hero_platform_top'],
        hero_platform_face: ['hero_platform_face'],
        wall_module_left: ['wall_module_left'],
        wall_module_right: ['wall_module_right'],
        wall_base_trim_left: ['wall_base_trim_left'],
        wall_base_trim_right: ['wall_base_trim_right'],
        door_frame: ['door_frame'],
        ceiling_band: ['ceiling_band'],
        ceiling_piece: ['ceiling_piece', 'ceiling_band'],
        room_shell_foreground: ['room_shell_foreground']
    };
    const accepted = aliases[componentType] || [componentType];
    return assets.find((item) => item && accepted.includes(item.component_type) && item.url) || null;
}

function roomHasBespokeUnifiedShellForeground(roomId) {
    if (!ENABLE_BESPOKE_ROOM_RUNTIME) return false;
    const asset = getRoomEnvironmentBespokeAsset(roomId, 'room_shell_foreground');
    return Boolean(asset?.url);
}

function getRoomEnvironmentBespokeAssetsByType(roomId, componentTypes) {
    if (!ENABLE_BESPOKE_ROOM_RUNTIME) return [];
    const manifest = getRoomEnvironmentBespokeManifest(roomId);
    if (!isPlayableRoomEnvironmentBespokeManifest(manifest)) return [];
    const accepted = new Set(Array.isArray(componentTypes) ? componentTypes : [componentTypes]);
    const assets = manifest.assets && typeof manifest.assets === 'object' ? Object.values(manifest.assets) : [];
    return assets.filter((item) => item && accepted.has(item.component_type) && item.url);
}

function getRoomEnvironmentBespokeBackgroundPlacement(roomId) {
    const asset = getRoomEnvironmentBespokeAsset(roomId, 'background_far_plate');
    const placement = asset?.placement || {};
    const displayWidth = Math.max(1, Number(placement.display_width || asset?.final_dimensions?.width || 0));
    const displayHeight = Math.max(1, Number(placement.display_height || asset?.final_dimensions?.height || 0));
    const originX = Phaser.Math.Clamp(Number(placement.origin_x ?? 0.5), 0, 1);
    const originY = Phaser.Math.Clamp(Number(placement.origin_y ?? 1), 0, 1);
    const localX = Number(placement.x || (getRoomWidth(roomId) * 0.5));
    const localY = Number(placement.y || getRoomVisualWorldBottom());
    if (!asset?.url || displayWidth <= 1 || displayHeight <= 1) return null;
    return { asset, displayWidth, displayHeight, originX, originY, localX, localY };
}

/** Pixels to reserve at chamber top for bespoke ceiling slab so background/midground do not duplicate arch read under it. */
function getRoomBespokeCeilingCapHeightForRuntime(scene, roomId) {
    if (!ENABLE_BESPOKE_ROOM_RUNTIME || !scene?.textures?.exists) return 0;
    /* Unified shell PNG already includes top rim; separate ceiling decor is skipped. Reserving cap height here
     * would scale the background to vaultHeight while the shell uses full chamberHeight — misaligned double framing. */
    if (roomHasBespokeUnifiedShellForeground(roomId)) return 0;
    const assets = getRoomEnvironmentBespokeAssetsByType(roomId, ['ceiling_band', 'ceiling_piece']);
    const asset = assets[0];
    if (!asset?.slot_id || !scene.textures.exists(`env-bespoke-${asset.slot_id}`)) return 0;
    const pl = asset.placement || {};
    return Math.max(32, Math.round(Number(pl.display_height || asset.final_dimensions?.height || 224)));
}

/**
 * Wall modules for runtime decor: prefer wall_module_left/right; some manifests only emit generic wall_piece.
 * addPlacedBespokeAsset expects placement.x in room-local coords (0..room width), not world X.
 */
function getRoomEnvironmentBespokeWallShellAssets(roomId) {
    const modules = getRoomEnvironmentBespokeAssetsByType(roomId, ['wall_module_left', 'wall_module_right']);
    if (modules.length) return modules;
    const manifest = getRoomEnvironmentBespokeManifest(roomId);
    if (!isPlayableRoomEnvironmentBespokeManifest(manifest)) return [];
    const pieces = Object.values(manifest.assets || {}).filter(
        (item) => item && item.url && String(item.component_type || '').trim() === 'wall_piece'
    );
    if (!pieces.length) return [];
    const roomW = Math.max(1, getRoomWidth(roomId));
    const sorted = [...pieces].sort(
        (a, b) => Number((a.placement || {}).x || 0) - Number((b.placement || {}).x || 0)
    );
    if (sorted.length === 1) {
        const a = sorted[0];
        const px = Number((a.placement || {}).x || 0);
        const dw = Number((a.placement || {}).display_width || 0);
        const mid = px + (dw > 0 ? dw * 0.5 : 160);
        const side = mid < roomW * 0.5 ? 'wall_module_left' : 'wall_module_right';
        return [{ ...a, component_type: side }];
    }
    return [
        { ...sorted[0], component_type: 'wall_module_left' },
        { ...sorted[sorted.length - 1], component_type: 'wall_module_right' },
    ];
}

function getRoomEnvironmentBespokePlatformAsset(roomId, slotId) {
    if (!ENABLE_BESPOKE_ROOM_RUNTIME) return null;
    const manifest = getRoomEnvironmentBespokeManifest(roomId);
    if (!isPlayableRoomEnvironmentBespokeManifest(manifest)) return null;
    const asset = manifest.assets && typeof manifest.assets === 'object' ? manifest.assets[slotId] : null;
    return asset && typeof asset === 'object' && asset.url ? asset : null;
}

function getRoomEnvironmentBespokePrimaryFloorAsset(roomId) {
    return getRoomEnvironmentBespokeAsset(roomId, 'primary_floor_piece');
}

function getRoomEnvironmentBespokePlanEntry(roomId, componentType) {
    if (!ENABLE_BESPOKE_ROOM_RUNTIME) return null;
    const manifest = getRoomEnvironmentBespokeManifest(roomId);
    if (!isPlayableRoomEnvironmentBespokeManifest(manifest) || !Array.isArray(manifest.generation_plan)) return null;
    return manifest.generation_plan.find((item) => item && item.component_type === componentType) || null;
}

/**
 * Stable hash of footprint polygon + chamber AABB so premask cache invalidates when layout changes
 * (same slot_id would otherwise reuse a stale Canvas punch after editor polygon edits).
 */
function hashRoomFootprintForShellPremask(roomId) {
    const room = getLayoutRoom(roomId);
    const poly = room?.polygon;
    if (!Array.isArray(poly) || poly.length < 3) return '0';
    const b = getRoomPolygonBounds(roomId);
    let s = `${b.left},${b.top},${b.right},${b.bottom}|`;
    for (let i = 0; i < poly.length; i += 1) {
        const p = poly[i];
        const x = Math.round(Number(p[0]) * 100) / 100;
        const y = Math.round(Number(p[1]) * 100) / 100;
        s += `${x},${y};`;
    }
    let h = 2166136261;
    for (let i = 0; i < s.length; i += 1) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 16777619);
    }
    return (h >>> 0).toString(36);
}

/**
 * SHELL_TEXTURE_PREMASK (§202b) — punch out the polygon interior from the shell texture using Canvas 2D
 * compositing so the shell inner edge matches the footprint exactly. Bypasses Phaser GeometryMask
 * invertAlpha (stencil flicker in some WebGL paths). Result cached as `env-bespoke-{slotId}-masked-{footprintHash}`.
 */
function getOrCreatePremaskedShellTexture(scene, slotId, roomId) {
    const baseKey = `env-bespoke-${slotId}`;
    const fp = hashRoomFootprintForShellPremask(roomId);
    const maskedKey = `${baseKey}-masked-${fp}`;
    if (scene.textures.exists(maskedKey)) return maskedKey;
    if (!scene.textures.exists(baseKey)) return baseKey;
    const room = getLayoutRoom(roomId);
    const poly = room?.polygon;
    if (!Array.isArray(poly) || poly.length < 3) return baseKey;
    const bounds = getRoomPolygonBounds(roomId);
    const cL = bounds.left;
    const cT = bounds.top;
    const cW = Math.max(1, bounds.right - cL);
    const cH = Math.max(1, bounds.bottom - cT);
    try {
        const src = scene.textures.get(baseKey).getSourceImage();
        const w = Number(src?.naturalWidth || src?.width || 0);
        const h = Number(src?.naturalHeight || src?.height || 0);
        if (!w || !h) return baseKey;
        const cvs = document.createElement('canvas');
        cvs.width = w;
        cvs.height = h;
        const ctx = cvs.getContext('2d');
        ctx.drawImage(src, 0, 0);
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.beginPath();
        const sx = w / cW;
        const sy = h / cH;
        poly.forEach((p, i) => {
            const tx = (Number(p[0]) - cL) * sx;
            const ty = (Number(p[1]) - cT) * sy;
            if (i === 0) ctx.moveTo(tx, ty);
            else ctx.lineTo(tx, ty);
        });
        ctx.closePath();
        ctx.fill();
        scene.textures.addCanvas(maskedKey, cvs);
        return maskedKey;
    } catch (_) {
        return baseKey;
    }
}

/**
 * Measure the walkable-interior hole in a unified shell texture for placement math.
 *
 * Why not a single alpha envelope? R1-room-shell.png has disconnected transparent regions: a
 * partial-width band y=0..105, then opaque stone y=106..114, then the main void. A naive min/max
 * bbox of all alpha<th pixels forces minY=0 and ignores the stone bridge; vertical scale is wrong and the
 * inner bevel sits above the polygon top (shell reads shifted up/left vs the grid).
 *
 * Derived fix: 4-connected flood on pixels with alpha < threshold; keep the largest component
 * only; return its axis-aligned bbox (x,y,w,h) in source pixels plus sw,sh.
 * Cached per scene + texture key.
 */
function measureShellInteriorHoleBBoxFromTexture(scene, textureKey) {
    if (!scene || !textureKey || !scene.textures.exists(textureKey)) return null;
    scene.shellInteriorHoleBBoxCache = scene.shellInteriorHoleBBoxCache || {};
    const cached = scene.shellInteriorHoleBBoxCache[textureKey];
    if (cached !== undefined) return cached.empty ? null : cached;
    try {
        const src = scene.textures.get(textureKey).getSourceImage();
        const sw = Number(src?.naturalWidth || src?.width || 0);
        const sh = Number(src?.naturalHeight || src?.height || 0);
        if (!sw || !sh) {
            scene.shellInteriorHoleBBoxCache[textureKey] = { empty: true };
            return null;
        }
        const cvs = document.createElement('canvas');
        cvs.width = sw;
        cvs.height = sh;
        const ctx = cvs.getContext('2d');
        ctx.drawImage(src, 0, 0);
        const data = ctx.getImageData(0, 0, sw, sh).data;
        const threshold = 8;
        const frameArea = sw * sh;
        const visited = new Uint8Array(frameArea);
        let bestArea = 0;
        let minX = 0;
        let minY = 0;
        let maxX = 0;
        let maxY = 0;
        const stack = [];
        for (let sy = 0; sy < sh; sy += 1) {
            const rowBase = sy * sw;
            for (let sx = 0; sx < sw; sx += 1) {
                const si = rowBase + sx;
                if (visited[si]) continue;
                if (data[si * 4 + 3] >= threshold) continue;
                let compMinX = sx;
                let compMinY = sy;
                let compMaxX = sx;
                let compMaxY = sy;
                let area = 0;
                visited[si] = 1;
                stack.length = 0;
                stack.push(sx, sy);
                while (stack.length) {
                    const cy = stack.pop();
                    const cx = stack.pop();
                    area += 1;
                    if (cx < compMinX) compMinX = cx;
                    if (cy < compMinY) compMinY = cy;
                    if (cx > compMaxX) compMaxX = cx;
                    if (cy > compMaxY) compMaxY = cy;
                    if (cx + 1 < sw) {
                        const i = cy * sw + cx + 1;
                        if (!visited[i] && data[i * 4 + 3] < threshold) {
                            visited[i] = 1;
                            stack.push(cx + 1, cy);
                        }
                    }
                    if (cx > 0) {
                        const i = cy * sw + cx - 1;
                        if (!visited[i] && data[i * 4 + 3] < threshold) {
                            visited[i] = 1;
                            stack.push(cx - 1, cy);
                        }
                    }
                    if (cy + 1 < sh) {
                        const i = (cy + 1) * sw + cx;
                        if (!visited[i] && data[i * 4 + 3] < threshold) {
                            visited[i] = 1;
                            stack.push(cx, cy + 1);
                        }
                    }
                    if (cy > 0) {
                        const i = (cy - 1) * sw + cx;
                        if (!visited[i] && data[i * 4 + 3] < threshold) {
                            visited[i] = 1;
                            stack.push(cx, cy - 1);
                        }
                    }
                }
                if (area > bestArea) {
                    bestArea = area;
                    minX = compMinX;
                    minY = compMinY;
                    maxX = compMaxX;
                    maxY = compMaxY;
                }
            }
        }
        if (bestArea < 64) {
            scene.shellInteriorHoleBBoxCache[textureKey] = { empty: true };
            return null;
        }
        const w = maxX - minX + 1;
        const h = maxY - minY + 1;
        if (w < 8 || h < 8 || w * h > frameArea * 0.97) {
            scene.shellInteriorHoleBBoxCache[textureKey] = { empty: true };
            return null;
        }
        const result = { x: minX, y: minY, w, h, sw, sh };
        scene.shellInteriorHoleBBoxCache[textureKey] = result;
        return result;
    } catch (_) {
        scene.shellInteriorHoleBBoxCache[textureKey] = { empty: true };
        return null;
    }
}

/**
 * UNIFIED_SHELL_PLACEMENT_CHAMBER_BBOX — map the shell texture so the raster interior hole matches the
 * live polygon AABB (room-local). Raw PNG: scale = chamber span / measured hole span; offset top-left so
 * hole (x,y) lands on chamber (left,top). Canvas premask (§202b): keep 1:1 chamber AABB in texture space
 * (polygon punch is authored in that mapping). Ignores manifest placement.x/y.
 */
function computeUnifiedShellWorldPlacement(roomId, asset, support, options = {}) {
    const pl = asset?.placement || {};
    const roomBounds = support.roomBounds;
    const scene = options.scene || null;
    const usePremask = Boolean(options.usePremask);
    const b = getRoomPolygonBounds(roomId);
    const curLeft = Math.round(Number(b.left || 0));
    const curRight = Math.round(Number(b.right || roomBounds.width));
    const curTop = Math.round(Number(b.top || 0));
    const curBottom = Math.round(Number(b.bottom || CONFIG.WORLD_HEIGHT));
    const chamberW = Math.max(1, curRight - curLeft);
    const chamberH = Math.max(1, curBottom - curTop);
    let dw = chamberW;
    let dh = chamberH;
    let localX = curLeft;
    let localY = curTop;

    if (usePremask) {
        const pdw = Number(pl.display_width || 0);
        const pdh = Number(pl.display_height || 0);
        const eps = 3;
        if (Number.isFinite(pdw) && pdw > 0 && Number.isFinite(pdh) && pdh > 0
            && Math.abs(Math.round(pdw) - chamberW) <= eps && Math.abs(Math.round(pdh) - chamberH) <= eps) {
            dw = Math.round(pdw);
            dh = Math.round(pdh);
        }
        return { dw, dh, ox: 0, oy: 0, localX, localY };
    }

    const baseKey = asset?.slot_id ? `env-bespoke-${asset.slot_id}` : null;
    const hole = baseKey && scene ? measureShellInteriorHoleBBoxFromTexture(scene, baseKey) : null;
    if (hole && hole.w > 0 && hole.h > 0 && hole.sw > 0 && hole.sh > 0) {
        dw = hole.sw * chamberW / hole.w;
        dh = hole.sh * chamberH / hole.h;
        localX = curLeft - hole.x * (dw / hole.sw);
        localY = curTop - hole.y * (dh / hole.sh);
    } else {
        const pdw = Number(pl.display_width || 0);
        const pdh = Number(pl.display_height || 0);
        const eps = 3;
        if (Number.isFinite(pdw) && pdw > 0 && Number.isFinite(pdh) && pdh > 0
            && Math.abs(Math.round(pdw) - chamberW) <= eps && Math.abs(Math.round(pdh) - chamberH) <= eps) {
            dw = Math.round(pdw);
            dh = Math.round(pdh);
        }
    }

    return {
        dw: Math.max(1, Math.round(dw)),
        dh: Math.max(1, Math.round(dh)),
        ox: 0,
        oy: 0,
        localX: Math.round(localX),
        localY: Math.round(localY)
    };
}

function getRoomEnvironmentBespokeHeroPlatformAsset(roomId, platform) {
    if (!ENABLE_BESPOKE_ROOM_RUNTIME) return null;
    const manifest = getRoomEnvironmentBespokeManifest(roomId);
    if (!isPlayableRoomEnvironmentBespokeManifest(manifest)) return null;
    const localX = Number(platform?.x || 0);
    const localY = Number(platform?.y || 0);
    const width = Math.max(1, Number(platform?.len || 1)) * 32;
    const assets = manifest.assets && typeof manifest.assets === 'object' ? Object.values(manifest.assets) : [];
    return assets.find((asset) => {
        if (!asset || !['hero_platform_top', 'hero_platform_piece'].includes(asset.component_type) || !asset.url) return false;
        const placement = asset.placement || {};
        return Number(placement.x || 0) === localX && Number(placement.y || 0) === localY && Number(placement.display_width || 0) === width;
    }) || null;
}

function getRoomEnvironmentBespokeHeroPlatformFaceAsset(roomId, platform) {
    if (!ENABLE_BESPOKE_ROOM_RUNTIME) return null;
    const manifest = getRoomEnvironmentBespokeManifest(roomId);
    if (!isPlayableRoomEnvironmentBespokeManifest(manifest)) return null;
    const localX = Number(platform?.x || 0);
    const localY = Number(platform?.y || 0);
    const width = Math.max(1, Number(platform?.len || 1)) * 32;
    const assets = manifest.assets && typeof manifest.assets === 'object' ? Object.values(manifest.assets) : [];
    return assets.find((asset) => {
        if (!asset || asset.component_type !== 'hero_platform_face' || !asset.url) return false;
        const placement = asset.placement || {};
        return Number(placement.x || 0) === localX && Number(placement.y || 0) === localY + 8 && Number(placement.display_width || 0) === width;
    }) || null;
}

function getRoomEnvironmentSceneSchema(roomId) {
    const env = normalizeEnvironmentFromLayout(getLayoutRoom(roomId));
    const schema = env.spec?.scene_schema;
    if (!schema || typeof schema !== 'object') {
        return { background_layers: [], set_dressing: [], effects: {} };
    }
    return {
        background_layers: Array.isArray(schema.background_layers) ? schema.background_layers : [],
        set_dressing: Array.isArray(schema.set_dressing) ? schema.set_dressing : [],
        effects: schema.effects && typeof schema.effects === 'object' ? schema.effects : {}
    };
}

function getRoomEnvironmentRuntimeComposition(roomId) {
    const manifest = getRoomEnvironmentBespokeManifest(roomId);
    const hasBespokeManifest = Boolean(isPlayableRoomEnvironmentBespokeManifest(manifest));
    const backgroundAsset = hasBespokeManifest ? getRoomEnvironmentBespokeAsset(roomId, 'background_plate') : null;
    const midgroundAsset = (!DISABLE_RUNTIME_MIDGROUND && hasBespokeManifest) ? getRoomEnvironmentBespokeAsset(roomId, 'midground_frame') : null;
    const backgroundPlan = hasBespokeManifest ? (getRoomEnvironmentBespokePlanEntry(roomId, 'background_far_plate') || getRoomEnvironmentBespokePlanEntry(roomId, 'background_plate')) : null;
    const midgroundPlan = (!DISABLE_RUNTIME_MIDGROUND && hasBespokeManifest) ? (getRoomEnvironmentBespokePlanEntry(roomId, 'midground_side_frame') || getRoomEnvironmentBespokePlanEntry(roomId, 'midground_frame')) : null;
    const midgroundZone = Array.isArray(midgroundPlan?.protected_zones)
        ? midgroundPlan.protected_zones.find((zone) => zone && Number(zone.width || 0) > 0)
        : null;
    const room = getLayoutRoom(roomId);
    const hasFootprintPolygon = Boolean(room && Array.isArray(room.polygon) && room.polygon.length >= 3);
    return {
        hasBespokeManifest,
        hasBespokeBackground: Boolean(backgroundAsset?.url),
        hasBespokeMidground: Boolean(midgroundAsset?.url),
        backgroundAsset,
        midgroundAsset,
        backgroundPlan,
        midgroundPlan,
        midgroundZone,
        suppressBackdropOverlay: Boolean(backgroundAsset?.url),
        suppressFocalSetDressing: Boolean(backgroundAsset?.url || midgroundAsset?.url),
        /* Footprint polygon: show readable procedural wall tiles in playtest even before bespoke / contrast-qa. */
        emphasizeWalls: hasBespokeManifest || isContrastQaEnvironment(roomId) || hasFootprintPolygon
    };
}

function resolveRoomWallTexture(scene, roomId) {
    return roomSurfaceTextureKey(roomId, 'wall', 0);
}

function resolveRoomWallBodyTexture(scene, roomId) {
    const asset = getRoomEnvironmentAsset(roomId, 'wall_body_strip');
    if (asset?.source === 'ai' && asset?.url && textureMatchesExpectedSize(scene, roomWallBodyAssetKey(roomId), 512, 512)) {
        return roomWallBodyAssetKey(roomId);
    }
    /* Without a loaded AI strip, wall mass / body decor would skip entirely — use generated env-surface wall tile. */
    const proceduralKey = roomSurfaceTextureKey(roomId, 'wall', 0);
    if (scene?.textures?.exists(proceduralKey)) return proceduralKey;
    return null;
}

function resolveRoomFloorTexture(scene, roomId) {
    return roomSurfaceTextureKey(roomId, 'floor', 0);
}

function resolveRoomFloorCapTexture(scene, roomId) {
    const bespoke = getRoomEnvironmentBespokeAsset(roomId, 'primary_floor_piece');
    if (bespoke?.url) return null;
    const asset = getRoomEnvironmentAsset(roomId, 'floor_cap_strip');
    if (asset?.source === 'ai' && asset?.url && textureMatchesExpectedSize(scene, roomFloorCapAssetKey(roomId), 512, 96)) {
        return roomFloorCapAssetKey(roomId);
    }
    return null;
}

function resolveRoomSurfaceTexture(scene, roomId, role = 'wall') {
    return role === 'floor' ? resolveRoomFloorTexture(scene, roomId) : resolveRoomWallTexture(scene, roomId);
}

function resolveRoomPlatformTexture(scene, roomId, tint = 0) {
    return roomPlatformTextureKey(roomId, tint, 0);
}

function resolveRoomPlatformLedgeTexture(scene, roomId) {
    const manifest = getRoomEnvironmentBespokeManifest(roomId);
    if (isPlayableRoomEnvironmentBespokeManifest(manifest)) return null;
    const asset = getRoomEnvironmentAsset(roomId, 'platform_ledge_strip');
    if (asset?.source === 'ai' && asset?.url && textureMatchesExpectedSize(scene, roomPlatformLedgeAssetKey(roomId), 512, 72)) {

    return null;
}

function resolveRoomDoorTexture(scene, roomId) {
    const bespoke = getRoomEnvironmentBespokeAsset(roomId, 'door_piece');
    if (bespoke?.url && textureMatchesExpectedSize(scene, roomDoorAssetKey(roomId), 192, 288)) {
        return roomDoorAssetKey(roomId);
    }
    const pack = getRoomEnvironmentAssetPack(roomId);
    if (pack?.assets?.door?.url && textureMatchesExpectedSize(scene, roomDoorAssetKey(roomId), 192, 288)) {
        return roomDoorAssetKey(roomId);
    }
    return roomDoorTextureKey(roomId);

function resolveRoomMidgroundTexture(scene, roomId) {
    if (DISABLE_RUNTIME_MIDGROUND) return null;

    }
    const pack = getRoomEnvironmentAssetPack(roomId);
    if (pack?.assets?.midground_arches?.url && textureMatchesExpectedSize(scene, roomMidgroundAssetKey(roomId), 1600, 1200)) {
        return roomMidgroundAssetKey(roomId);
    }
    return null;
}

function resolveRoomBackgroundTexture(scene, roomId) {
    const bespoke = getRoomEnvironmentBespokeAsset(roomId, 'background_plate');
    if (bespoke?.url && textureMatchesExpectedSize(scene, roomBackgroundAssetKey(roomId), 1600, 1200)) {
        return roomBackgroundAssetKey(roomId);
    }

function isResolvedRoomSurfaceAsset(roomId, textureKey) {
    return textureKey === roomWallAssetKey(roomId) || textureKey === roomFloorAssetKey(roomId);
}

function isResolvedRoomPlatformAsset(roomId, textureKey) {
    return textureKey === roomPlatformAssetKey(roomId);
}

function hasRoomWallBodyStrip(scene, roomId) {
    return Boolean(resolveRoomWallBodyTexture(scene, roomId));
}

function hasRoomFloorCapStrip(scene, roomId) {
    return Boolean(resolveRoomFloorCapTexture(scene, roomId));
}

function hasRoomPlatformLedgeStrip(scene, roomId) {
    return Boolean(resolveRoomPlatformLedgeTexture(scene, roomId));
}

function isResolvedRoomDoorAsset(roomId, textureKey) {

}

function resolveZoneTargetX(roomId, zone) {
    const room = getLayoutRoom(roomId);
    const width = Math.max(320, Number(room?.size?.width || 1600));
    if (zone === 'left') return width * 0.22;
    if (zone === 'right') return width * 0.78;
    if (zone === 'focal') return width * 0.55;
    return width * 0.5;
}

function pickSurfaceVariantKey(roomId, x, y, role = 'wall') {
    const variant = Math.abs((Math.floor(x / 32) * 3) + Math.floor(y / 32)) % 3;
    return roomSurfaceTextureKey(roomId, role, variant);
}

function pickPlatformVariantKey(roomId, x, y, tint = 0) {
    const variant = Math.abs(Math.floor((x + y) / 32)) % 3;
    return roomPlatformTextureKey(roomId, tint, variant);
}

function deriveRoomEnvironmentRuntimeStyle(roomId) {
    const env = normalizeEnvironmentFromLayout(getLayoutRoom(roomId));
    const isContrastQa = env.themeId === 'contrast-qa' || isContrastQaUrlForced();
    const kit = env.spec?.scene_schema?.kit || {};
    const components = env.spec?.components || {};
    const shellFamily = String(kit.shell_family || '');
    const runtimePalette = env.runtime?.surface_palette && typeof env.runtime.surface_palette === 'object'
        ? env.runtime.surface_palette
        : (env.preview?.approved_palette && typeof env.preview.approved_palette === 'object' ? env.preview.approved_palette : null);
    const dominant = Array.isArray(runtimePalette?.dominant)
        ? runtimePalette.dominant
        : (Array.isArray(env.spec?.palette?.dominant) ? env.spec.palette.dominant : []);
    const accent = Array.isArray(runtimePalette?.accent)
        ? runtimePalette.accent
        : (Array.isArray(env.spec?.palette?.accent) ? env.spec.palette.accent : []);
    const baseThemes = {
        cave: { floor: { r: 46, g: 60, b: 88 }, accent: { r: 138, g: 160, b: 220 } },
        ruins: { floor: { r: 76, g: 58, b: 38 }, accent: { r: 212, g: 170, b: 92 } },
        forest: { floor: { r: 34, g: 78, b: 52 }, accent: { r: 118, g: 198, b: 138 } },
        shrine: { floor: { r: 70, g: 52, b: 82 }, accent: { r: 164, g: 220, b: 210 } },
        sewer: { floor: { r: 30, g: 74, b: 72 }, accent: { r: 134, g: 198, b: 166 } },
        void: { floor: { r: 70, g: 40, b: 82 }, accent: { r: 194, g: 122, b: 214 } },
        custom: { floor: { r: 62, g: 64, b: 74 }, accent: { r: 174, g: 182, b: 194 } },
        'contrast-qa': { floor: { r: 62, g: 64, b: 74 }, accent: { r: 174, g: 182, b: 194 } }
    };
    const preset = isContrastQa ? baseThemes.ruins : (baseThemes[env.themeId] || baseThemes.cave);
    const shadowHex = typeof runtimePalette?.shadow === 'string' ? runtimePalette.shadow : '';
    const glowHex = typeof runtimePalette?.glow === 'string' ? runtimePalette.glow : '';
    let floorBase;
    let floorAlt;
    if (isContrastQa && !shadowHex) {
        floorBase = preset.floor;
        floorAlt = adjustRgb(floorBase, 14);
    } else {
        floorBase = shadowHex ? hexToRgb(shadowHex, preset.floor) : (dominant.length ? hexToRgb(dominant[0], preset.floor) : preset.floor);
        floorAlt = dominant.length > 1
            ? hexToRgb(dominant[1], adjustRgb(floorBase, 16))
            : (runtimePalette?.average ? hexToRgb(runtimePalette.average, adjustRgb(floorBase, 16)) : adjustRgb(floorBase, 16));
    }
    const accentBase = isContrastQa && !glowHex && !accent.length
        ? preset.accent
        : (glowHex ? hexToRgb(glowHex, preset.accent) : (accent.length ? hexToRgb(accent[0], preset.accent) : preset.accent));
    const componentText = Object.values(components)
        .map((item) => String(item?.prompt || ''))
        .join(' ');
    const moodText = `${env.themeId} ${(env.tags || []).join(' ')} ${(env.spec?.materials || []).join(' ')} ${(env.runtime?.material_keywords || []).join(' ')} ${Object.values(kit).join(' ')} ${componentText}`.toLowerCase();
    const mossy = /(moss|overgrow|root|shrine|forest)/.test(moodText) || /rooted_overgrowth/.test(shellFamily);
    const wet = /(wet|flood|water|damp|sewer)/.test(moodText);
    const ritual = /(ritual|sacred|shrine|altar)/.test(moodText) || /ritual_shrine|void_structure/.test(shellFamily);
    const industrial = /(industrial|underworks|steel|pipe|boiler|machinery)/.test(moodText)
        || /(industrial_ribbed|iron_walkway|iron_gate|industrial_depth|industrial_underworks)/.test(String(Object.values(kit).join(' ')).toLowerCase());
    const carved = isContrastQa || /(carved|gothic|arch|ritual|shrine)/.test(moodText) || /gothic_ruin|ritual_shrine/.test(shellFamily);
    const fracturedStone = isContrastQa || /(fractured|broken|cracked|masonry|stone|buttress|gothic|arch)/.test(moodText)
        || /gothic_ruin|flooded_stone|weathered_stone/.test(shellFamily);
    const circularFloor = /(ritual circle|circular|circle carving|slab)/.test(moodText);
    let wallFamily = String(kit.wall_family || '');
    let platformFamily = String(kit.platform_family || '');
    let doorFamily = String(kit.door_family || '');
    let backdropFamily = String(kit.backdrop_family || '');
    if (isContrastQa) {
        if (!wallFamily) wallFamily = 'broken_gothic_stone';
        platformFamily = 'broken_masonry_ledge';
        if (!doorFamily) doorFamily = 'arch_door';
        if (!backdropFamily) backdropFamily = 'ruined_arch_hall';
    }
    return {
        floorBase,
        floorAlt,
        edge: adjustRgb(floorBase, 36),
        crack: adjustRgb(floorBase, -28),
        moss: mossy ? mixRgb(floorBase, { r: 86, g: 132, b: 92 }, 0.55) : mixRgb(floorBase, floorAlt, 0.45),
        water: wet ? mixRgb(floorAlt, { r: 92, g: 130, b: 138 }, 0.45) : mixRgb(floorBase, floorAlt, 0.25),
        accent: accentBase,
        glow: ritual ? mixRgb(accentBase, { r: 240, g: 234, b: 206 }, 0.38) : accentBase,
        mossy,
        wet,
        ritual,
        industrial,
        carved,
        fracturedStone,
        circularFloor,
        shellFamily,
        wallFamily,
        platformFamily,
        doorFamily,
        backdropFamily,
        propDensity: String(kit.prop_density || 'medium')
    };
}

function getLayoutRoomEdge(roomId, edgeIndex) {
    const room = getLayoutRoom(roomId);
    if (!room) return null;
    const edge = getPolygonEdge(room.polygon, edgeIndex);
    if (!edge) return null;
    return {
        room,
        edgeIndex: edge.edgeIndex,
        start: { x: edge.start[0], y: edge.start[1] },
        end: { x: edge.end[0], y: edge.end[1] }
    };
}

function getLayoutRoomEdgeLink(roomId, edgeIndex) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.edgeLinks)) return null;
    const normalized = getPolygonEdge(room.polygon, edgeIndex)?.edgeIndex;
    if (!Number.isInteger(normalized)) return null;
    return room.edgeLinks.find((link) => Number(link.edgeIndex) === normalized) || null;
}

function isLayoutRoomEdgeRemoved(roomId, edgeIndex) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.removedEdges)) return false;
    const normalized = getPolygonEdge(room.polygon, edgeIndex)?.edgeIndex;
    return Number.isInteger(normalized) && room.removedEdges.includes(normalized);
}

function hasLayoutDoorNearEdge(roomId, edgeIndex, distanceThreshold = 72) {
    const room = getLayoutRoom(roomId);
    const edge = getLayoutRoomEdge(roomId, edgeIndex);
    if (!room || !edge || !Array.isArray(room.doors) || !room.doors.length) return false;
    return room.doors.some((door) => {
        const projected = closestPointOnSegment(
            { x: Number(door.x), y: Number(door.y) },
            [edge.start.x, edge.start.y],
            [edge.end.x, edge.end.y]
        );
        return projected.distance <= distanceThreshold;
    });
}

function applyRuntimeReviewCaptureViewport() {
    if (!RUNTIME_REVIEW_CAPTURE_MODE) return;
    const roomId = TEMP_TEST_START.room;
    const roomBounds = ROOM_IDS[roomId];
    if (!roomBounds) return;
    const polygonBounds = getRoomPolygonBounds(roomId);
    const chamberWidth = Math.max(64, Number(polygonBounds.right || roomBounds.width) - Number(polygonBounds.left || 0));
    const chamberHeight = Math.max(64, Number(polygonBounds.bottom || CONFIG.WORLD_HEIGHT) - Number(polygonBounds.top || 0));
    CONFIG.W = Math.max(800, Math.round(chamberWidth));
    CONFIG.H = Math.max(400, Math.round(chamberHeight));
}

/** FIT letterboxes when #game-container aspect ≠ game; lock container to CONFIG so canvas fills (embed + headless). */
function applyRuntimeReviewCaptureContainerAspect() {
    if (!RUNTIME_REVIEW_CAPTURE_MODE) return;
    const el = document.getElementById('game-container');
    if (!el || !CONFIG.W || !CONFIG.H) return;
    const w = CONFIG.W;
    const h = CONFIG.H;
    el.style.display = 'flex';
    el.style.alignItems = 'center';
    el.style.justifyContent = 'center';
    el.style.boxSizing = 'border-box';
    el.style.aspectRatio = `${w} / ${h}`;
    el.style.width = `min(100vw, calc(100vh * ${w} / ${h}))`;
    el.style.height = `min(100vh, calc(100vw * ${h} / ${w}))`;
    el.style.maxWidth = '100vw';
    el.style.maxHeight = '100vh';
    document.documentElement.style.height = '100%';
    document.body.style.margin = '0';
    document.body.style.minHeight = '100vh';
    document.body.style.display = 'flex';
    document.body.style.alignItems = 'center';
    document.body.style.justifyContent = 'center';
    document.body.style.background = '#000';
}

function getEntrySideFromNormal(normal) {
    if (Math.abs(normal.x) >= Math.abs(normal.y)) {
        return normal.x >= 0 ? 'right' : 'left';
    }
    return normal.y >= 0 ? 'bottom' : 'top';
}

function getLayoutGlobalEdge(roomId, edgeIndex) {
    const room = getLayoutRoom(roomId);
    const edge = getLayoutRoomEdge(roomId, edgeIndex);
    if (!room || !edge) return null;
    return {
        start: {
            x: room.global.x + ((edge.start.x - (room.size.width / 2)) * GLOBAL_ROOM_PREVIEW_SCALE),
            y: room.global.y + ((edge.start.y - (room.size.height / 2)) * GLOBAL_ROOM_PREVIEW_SCALE)
        },
        end: {
            x: room.global.x + ((edge.end.x - (room.size.width / 2)) * GLOBAL_ROOM_PREVIEW_SCALE),
            y: room.global.y + ((edge.end.y - (room.size.height / 2)) * GLOBAL_ROOM_PREVIEW_SCALE)
        }
    };
}

function isLayoutEdgeLinkReversed(roomId, edgeIndex, targetRoomId, targetEdgeIndex) {
    const sourceEdge = getLayoutGlobalEdge(roomId, edgeIndex);
    const targetEdge = getLayoutGlobalEdge(targetRoomId, targetEdgeIndex);
    if (!sourceEdge || !targetEdge) return false;
    const same = Math.max(
        Math.hypot(sourceEdge.start.x - targetEdge.start.x, sourceEdge.start.y - targetEdge.start.y),
        Math.hypot(sourceEdge.end.x - targetEdge.end.x, sourceEdge.end.y - targetEdge.end.y)
    );
    const reversed = Math.max(
        Math.hypot(sourceEdge.start.x - targetEdge.end.x, sourceEdge.start.y - targetEdge.end.y),
        Math.hypot(sourceEdge.end.x - targetEdge.start.x, sourceEdge.end.y - targetEdge.start.y)
    );
    return reversed < same;
}

function getLayoutDoor(roomId, doorId) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.doors)) return null;
    return room.doors.find((door) => door.id === doorId) || null;
}

function getLayoutPlatform(roomId, platformId) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.platforms)) return null;
    return room.platforms.find((platform) => platform.id === platformId) || null;
}

function getLayoutKeys(roomId) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.keys)) return [];
    return room.keys;
}

function getLayoutMovingPlatforms(roomId) {
    const room = getLayoutRoom(roomId);
    if (!room || !Array.isArray(room.movingPlatforms)) return [];
    return room.movingPlatforms;
}

function getLayoutDoorWorldPosition(roomId, doorId, fallbackX, fallbackY) {
    const door = getLayoutDoor(roomId, doorId);
    if (!door || !ROOM_IDS[roomId]) return { x: fallbackX, y: fallbackY, source: null };
    return {
        x: ROOM_IDS[roomId].start + door.x,
        y: door.y,
        source: door
    };
}

function getDoorTargetPosition(roomId, doorId, fallbackX, fallbackY, offsetX = 0, offsetY = 0) {
    const pos = getLayoutDoorWorldPosition(roomId, doorId, fallbackX, fallbackY);
    return {
        x: pos.x + offsetX,
        y: pos.y + offsetY
    };
}

function getDoorStandPosition(roomId, doorId, fallbackX, fallbackY) {
    const room = getLayoutRoom(roomId);
    const fallback = { x: fallbackX, y: fallbackY, entrySide: 'left' };
    if (!room) return fallback;

    const door = getLayoutDoor(roomId, doorId);
    if (!door) return fallback;

    const leftGap = door.x;
    const rightGap = getRoomWidth(roomId) - door.x;
    const topGap = door.y;
    const bottomGap = CONFIG.WORLD_HEIGHT - door.y;
    const minGap = Math.min(leftGap, rightGap, topGap, bottomGap);

    if (minGap === leftGap) {
        return { x: ROOM_IDS[roomId].start + door.x + 96, y: door.y, entrySide: 'left' };
    }
    if (minGap === rightGap) {
        return { x: ROOM_IDS[roomId].start + door.x - 96, y: door.y, entrySide: 'right' };
    }
    if (minGap === topGap) {
        return { x: ROOM_IDS[roomId].start + door.x, y: door.y + 96, entrySide: 'top' };
    }
    return { x: ROOM_IDS[roomId].start + door.x, y: door.y - 96, entrySide: 'bottom' };
}

function getRoomSpawnPoint(roomId, fallbackX, fallbackY) {
    const room = getLayoutRoom(roomId);
    const roomStart = ROOM_IDS[roomId].start;
    if (room && room.playerStart && Number.isFinite(Number(room.playerStart.x)) && Number.isFinite(Number(room.playerStart.y))) {
        return {
            x: roomStart + Number(room.playerStart.x),
            y: Number(room.playerStart.y)
        };
    }

    if (!room || !Array.isArray(room.platforms) || room.platforms.length === 0) {
        return { x: fallbackX, y: fallbackY };
    }

    const preferredPlatform = room.platforms.find((platform) => platform.id === `${roomId}-P1`) || room.platforms[0];
    const platformWidth = preferredPlatform.len * 32;
    const centeredX = roomStart + preferredPlatform.x + Math.min(96, Math.max(32, Math.floor(platformWidth / 2)));
    const spawnY = preferredPlatform.y - 36;

    return {
        x: centeredX,
        y: spawnY
    };
}

function applyPreviewStartFromHash(embedMeta) {
    PREVIEW_START_APPLIED = false;
    try {
        let roomId = null;
        if (embedMeta) {
            const s = embedMeta.startRoom;
            if (s != null && String(s).trim()) {
                roomId = String(s).trim();
            }
        }
        if (!roomId) {
            const hash = window.location.hash || '';
            const startMatch = hash.match(/[&?]start=([^&]+)/);
            if (startMatch) roomId = decodeURIComponent(startMatch[1]).trim();
        }
        if (!roomId) return;
        if (!ROOM_IDS[roomId]) return;
        const room = getLayoutRoom(roomId);
        if (!room) return;
        const roomStart = ROOM_IDS[roomId].start;
        const rw = Number(room?.size?.width) || CONFIG.ROOM_WIDTH;
        const fallbackX = roomStart + Math.floor(rw * 0.5);
        const fallbackY = CONFIG.WORLD_HEIGHT - 120;
        const spawn = getRoomSpawnPoint(roomId, fallbackX, fallbackY);
        TEMP_TEST_START.room = roomId;
        TEMP_TEST_START.x = spawn.x;
        TEMP_TEST_START.y = spawn.y;
        delete TEMP_TEST_START.doorId;
        PREVIEW_START_APPLIED = true;
    } catch (_) {
        /* ignore malformed preview hash */
    }
}

function applyRuntimeReviewCapturePresentation(scene) {
    if (!RUNTIME_REVIEW_CAPTURE_MODE || !scene?.children?.list) return;
    if (bootDebugEl) bootDebugEl.style.display = 'none';
    scene.children.list.forEach((child) => {
        if (!child || typeof child.setVisible !== 'function') return;
        const fixedOverlay = child.scrollFactorX === 0 && child.scrollFactorY === 0;
        const textLike = child.type === 'Text' || child.type === 'BitmapText';
        if (fixedOverlay || textLike) {
            child.setVisible(false);
        }
    });
}

function applyRuntimeReviewCaptureCamera(scene, roomId) {
    if (!RUNTIME_REVIEW_CAPTURE_MODE || !scene?.cameras?.main || !roomId || !ROOM_IDS[roomId]) return;
    const camRect = getRoomCameraChamberBoundsWorld(roomId);
    const camera = scene.cameras.main;
    const padX = 96;
    const padY = 72;
    const zoom = Math.min(
        1,
        CONFIG.W / Math.max(1, camRect.width + (padX * 2)),
        CONFIG.H / Math.max(1, camRect.height + (padY * 2))
    );
    camera.stopFollow();
    camera.setFollowOffset(0, 0);
    camera.setZoom(zoom);
    const viewHalfW = CONFIG.W / (2 * zoom);
    const viewHalfH = CONFIG.H / (2 * zoom);
    let cx = camRect.x + (camRect.width / 2);
    let cy = camRect.y + (camRect.height / 2);
    const minCX = camRect.x + viewHalfW;
    const maxCX = camRect.x + camRect.width - viewHalfW;
    const minCY = camRect.y + viewHalfH;
    const maxCY = camRect.y + camRect.height - viewHalfH;
    if (minCX <= maxCX) {
        cx = Phaser.Math.Clamp(cx, minCX, maxCX);
    }
    if (minCY <= maxCY) {
        cy = Phaser.Math.Clamp(cy, minCY, maxCY);
    }
    camera.centerOn(cx, cy);
    if (scene.player) scene.player.setVisible(false);
    if (scene.trail) {
        scene.trail.clear();
        scene.trail.setVisible(false);
    }
}

                g.lineStyle(1, rgbToHexInt(style.glow), style.ritual ? 0.35 : 0.16);
                g.strokeCircle(26, 16, 6);
            } else {
                g.fillStyle(rgbToHexInt(style.crack), 0.35).fillRect(20, 8, 8, 18);
            }
            g.generateTexture(roomPropTextureKey(roomId, 'altar'), 52, 32);

            g.clear().fillStyle(rgbToHexInt(mixRgb(style.floorBase, style.moss, 0.4)), 0.9).fillRect(10, 8, 16, 56);
            g.fillStyle(rgbToHexInt(style.moss), 0.9).fillRect(0, 42, 34, 22);
            g.fillStyle(rgbToHexInt(style.moss), 0.55).fillRect(4, 28, 8, 12);
            g.generateTexture(roomPropTextureKey(roomId, 'roots'), 34, 64);

            g.clear().fillStyle(rgbToHexInt(mixRgb(style.floorAlt, style.edge, 0.35))).fillRect(10, 8, 20, 56);
