            g.fillStyle(rgbToHexInt(style.crack), 0.45).fillRect(14, 18, 12, 20);
            if (style.ritual) g.fillStyle(rgbToHexInt(style.glow), 0.22).fillRect(17, 10, 6, 8);
            g.generateTexture(roomPropTextureKey(roomId, 'statue'), 40, 64);

            g.clear().fillStyle(rgbToHexInt(style.crack), 0.95).fillRect(7, 0, 4, 80);
            g.fillStyle(rgbToHexInt(style.edge), 0.72).fillRect(15, 0, 4, 64);
            g.generateTexture(roomPropTextureKey(roomId, 'chains'), 24, 80);

            g.clear().fillStyle(rgbToHexInt(mixRgb(style.floorBase, { r: 88, g: 28, b: 24 }, 0.45))).fillRect(0, 0, 22, 64);
            g.fillStyle(rgbToHexInt(style.accent), 0.65).fillRect(0, 0, 22, 10);
            if (style.ritual) g.fillStyle(rgbToHexInt(style.glow), 0.22).fillRect(8, 18, 6, 30);
            g.generateTexture(roomPropTextureKey(roomId, 'banner'), 22, 64);
        });
        g.destroy();
    }

    preloadWorkbenchHero() {
        Object.entries(WORKBENCH_HERO_EXPORT.clips).forEach(([clipName, clip]) => {
            const frameNames = Array.isArray(clip.frames) && clip.frames.length
                ? clip.frames
                : Array.from({ length: clip.frameCount }, (_, frameIndex) => `${clipName}_${String(frameIndex).padStart(2, '0')}.png`);
            frameNames.forEach((frameName) => {
                const textureKey = `wb-${String(frameName).replace(/\.png$/i, '')}`;
                this.load.image(textureKey, `${WORKBENCH_HERO_EXPORT.basePath}/${frameName}`);
            });
        });
    }

    handleHeroLoadError(fileObj) {
        if (!fileObj?.key || !String(fileObj.key).startsWith('wb-')) return;
        this.heroLoadFailures.push({
            key: fileObj.key,
            src: fileObj.src || fileObj.url || 'unknown-src'
        });
    }

    handleHeroFileComplete(key) {
        if (!key || !String(key).startsWith('wb-')) return;
        this.heroLoadSuccesses.push(key);
    }

    createWorkbenchHeroAnimations() {
        Object.entries(WORKBENCH_HERO_EXPORT.clips).forEach(([clipName, clip]) => {
            const animKey = `hero-${clipName}`;
            const frameTextureKeys = (Array.isArray(clip.frames) && clip.frames.length
                ? clip.frames
                : Array.from({ length: clip.frameCount }, (_, frameIndex) => `${clipName}_${String(frameIndex).padStart(2, '0')}.png`)
            ).map((frameName) => `wb-${String(frameName).replace(/\.png$/i, '')}`);
            if (!frameTextureKeys.every((textureKey) => this.textures.exists(textureKey)) || this.anims.exists(animKey)) return;
            this.anims.create({
                key: animKey,
                frames: frameTextureKeys.map((textureKey) => ({ key: textureKey })),
                frameRate: clip.fps,
                repeat: clip.loop ? -1 : 0
            });
        });
    }

    configureWorkbenchPlayerSprite() {
        this.player.setScale(WORKBENCH_HERO_EXPORT.scale);
        this.player.setOrigin(
            WORKBENCH_HERO_EXPORT.pivot.x / WORKBENCH_HERO_EXPORT.frameWidth,
            WORKBENCH_HERO_EXPORT.pivot.y / WORKBENCH_HERO_EXPORT.frameHeight
        );
        this.player.body.setSize(
            WORKBENCH_HERO_EXPORT.body.width,
            WORKBENCH_HERO_EXPORT.body.height
        );
        this.player.body.setOffset(
            WORKBENCH_HERO_EXPORT.body.offsetX,
            WORKBENCH_HERO_EXPORT.body.offsetY
        );
    }

    showBootFailure(error) {
        const message = error && error.message ? error.message : String(error || 'Unknown playtest error');
        console.error('Ashen Hollow playtest boot failure:', error);
        if (this.cameras?.main) {
            this.cameras.main.setBackgroundColor('#12060a');
        }
        const panel = this.add.rectangle(CONFIG.W / 2, CONFIG.H / 2, Math.min(CONFIG.W - 48, 720), 220, 0x14080a, 0.92)
            .setScrollFactor(0)
            .setDepth(5000);
        panel.setStrokeStyle(2, 0xf85149, 0.8);
        this.add.text(CONFIG.W / 2, (CONFIG.H / 2) - 66, 'PLAYTEST ERROR', {
            fontSize: '24px',
            fontStyle: 'bold',
            color: '#fca5a5',
            stroke: '#000000',
            strokeThickness: 3,
            align: 'center'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(5001);
        this.add.text(CONFIG.W / 2, (CONFIG.H / 2) - 6, message, {
            fontSize: '14px',
            color: '#ffe5e5',
            stroke: '#000000',
            strokeThickness: 2,
            wordWrap: { width: 640 },
            align: 'center'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(5001);
        this.add.text(CONFIG.W / 2, (CONFIG.H / 2) + 74, 'Hard refresh, then reopen the playtest. If this stays visible, share the exact message.', {
            fontSize: '12px',
            color: '#ffd9a8',
            stroke: '#000000',
            strokeThickness: 2,
            align: 'center'
        }).setOrigin(0.5).setScrollFactor(0).setDepth(5001);
        this.bootFailureMessage = message;
        window.__ASHEN_HOLLOW_LAST_BOOT_ERROR = message;
    }

    updateBootDebug(message) {
        this.bootDebugMessage = message;
        window.__ASHEN_HOLLOW_BOOT_STATE = message;
        if (this.bootDebugText) {
            this.bootDebugText.setText(message);
        }
    }

    create() {
        try {
            this.resetInternalState();
            this.physics.world.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
            this.cameras.main.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
            this.cameras.main.setBackgroundColor('#050510');
            this.createWorkbenchHeroAnimations();
            this.bootDebugText = this.add.text(CONFIG.W - 12, 10, 'BOOT: start', {
                fontSize: '11px',
                fill: '#bde3ff',
                stroke: '#000000',
                strokeThickness: 2,
                align: 'right',
                backgroundColor: 'rgba(4,6,10,0.5)',
                padding: { x: 6, y: 4 }
            }).setOrigin(1, 0).setScrollFactor(0).setDepth(5002);
            this.updateBootDebug('BOOT: init');

            this.starField = this.add.tileSprite(CONFIG.W / 2, CONFIG.H / 2, CONFIG.W, CONFIG.H, 'stars')
                .setScrollFactor(0).setDepth(-1);
            this.roomBackgroundSprites = {};
            this.roomMidgroundSprites = {};
            this.roomBackgroundFeatherSprites = {};
            this.environmentDecor = [];
            this.roomEnvironmentFootprintMasks = {};
            this.createRoomEnvironmentBackgrounds();
            this.trail = this.add.graphics();
            this.updateBootDebug(`BOOT: backgrounds bg=${Object.keys(this.roomBackgroundSprites).length} mid=${Object.keys(this.roomMidgroundSprites).length}`);

            this.platforms = this.physics.add.staticGroup();
            this.dynamicPlatforms = this.physics.add.group({ allowGravity: false, immovable: true });
            const initialSpawn = TEMP_TEST_START.doorId
                ? getDoorStandPosition(TEMP_TEST_START.room, TEMP_TEST_START.doorId, ROOM_IDS[TEMP_TEST_START.room].start + TEMP_TEST_START.x, TEMP_TEST_START.y)
                : PREVIEW_START_APPLIED
                ? { x: TEMP_TEST_START.x, y: TEMP_TEST_START.y }
                : getRoomSpawnPoint(TEMP_TEST_START.room, TEMP_TEST_START.x, TEMP_TEST_START.y);
            const heroTextureKey = this.textures.exists('wb-idle_00') ? 'wb-idle_00' : 'heroFallback';
            this.player = this.physics.add.sprite(initialSpawn.x, initialSpawn.y, heroTextureKey, 0);
            this.heroAssetMode = heroTextureKey === 'wb-idle_00' ? 'workbench' : 'fallback';
            if (heroTextureKey === 'wb-idle_00') {
                this.configureWorkbenchPlayerSprite();
                this.player.play('hero-idle');
                this.currentPlayerClip = 'idle';
            }
            this.player.setDepth(0.3);
            this.player.setCollideWorldBounds(true);
            this.physics.add.collider(this.player, this.platforms);
            this.physics.add.collider(this.player, this.dynamicPlatforms);

            this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
            this.cameras.main.setFollowOffset(0, 60);

            this.buildWorldGeometry();
            this.updateBootDebug(`BOOT: geometry static=${this.platforms.getChildren().length} movers=${this.dynamicPlatforms.getChildren().length}`);
            this.buildEnvironmentSetDressing();
            this.updateBootDebug(`BOOT: decor count=${(this.environmentDecor || []).length}`);
            this.buildWorldInteractables();
            this.createHUD();
            this.createMapOverlay();
            this.setupControls();
            this.createTransitionOverlay();
            applyRuntimeReviewCapturePresentation(this);

            this.setCurrentRoom(TEMP_TEST_START.room);
            applyRuntimeReviewCaptureCamera(this, TEMP_TEST_START.room);
            this.updateBootDebug(`BOOT: room=${TEMP_TEST_START.room} bg=${this.roomBackgroundSprites?.[TEMP_TEST_START.room] ? 'yes' : 'no'} mid=${this.roomMidgroundSprites?.[TEMP_TEST_START.room] ? 'yes' : 'no'}`);
            this.recomputeProgressionCounts();
            this.runSequenceChecks();
            this.refreshBranchBoard();
            this.refreshObjectiveText();
            const heroStatus = this.heroAssetMode === 'workbench'
                ? 'Workbench hero loaded. Activity 6: dungeon branches live in R3-R8. Use INTERACT in R2 doors.'
                : `Fallback hero active. Loaded ${this.heroLoadSuccesses.length}/6 sheets.${this.heroLoadFailures.length ? ` Failed: ${this.heroLoadFailures.map((item) => `${item.key}`).join(', ')}` : ''}`;
            this.setStatusMessage(heroStatus, 300);
            this.updateBootDebug(`${this.bootDebugMessage} | live`);
        } catch (error) {
            this.showBootFailure(error);
        }
    }

    createRoomEnvironmentBackgrounds() {
        ROOM_SEQUENCE.forEach((roomId) => {
            const room = ROOM_IDS[roomId];
            const polygonBounds = getRoomPolygonBounds(roomId);
            const chamberLeft = Number(polygonBounds.left || 0);
            const chamberRight = Number(polygonBounds.right || room?.width || 0);
            const chamberTop = Number(polygonBounds.top || 0);
            const chamberBottom = Number(polygonBounds.bottom || getRoomVisualWorldBottom());
            const chamberWidth = Math.max(64, chamberRight - chamberLeft);
            const chamberHeight = Math.max(64, chamberBottom - chamberTop);
            const composition = getRoomEnvironmentRuntimeComposition(roomId);
            const suppressBespokeFeathers = DISABLE_UNIFIED_SHELL_RUNTIME_OVERLAYS
                && (composition.hasBespokeBackground || roomHasBespokeUnifiedShellForeground(roomId));
            const minimalBespokeStack = MINIMAL_BESPOKE_COMPOSITOR
                && (composition.hasBespokeBackground || roomHasBespokeUnifiedShellForeground(roomId));
            const ceilingCapH = getRoomBespokeCeilingCapHeightForRuntime(this, roomId);
            const vaultHeight = ceilingCapH > 0 ? Math.max(64, chamberHeight - ceilingCapH) : chamberHeight;
            const textureKey = roomBackgroundAssetKey(roomId);
            if (room && this.textures.exists(textureKey)) {
                const bespokeBackgroundPlacement = composition.hasBespokeBackground
                    ? getRoomEnvironmentBespokeBackgroundPlacement(roomId)
                    : null;
                const bgDisplayWidth = bespokeBackgroundPlacement?.displayWidth || chamberWidth;
                const bgDisplayHeight = bespokeBackgroundPlacement?.displayHeight || vaultHeight;
                const bgOriginX = bespokeBackgroundPlacement?.originX ?? 0.5;
                const bgOriginY = bespokeBackgroundPlacement?.originY ?? 1;
                const bgLocalX = bespokeBackgroundPlacement?.localX ?? (chamberLeft + (chamberWidth / 2));
                const bgLocalY = bespokeBackgroundPlacement?.localY ?? chamberBottom;
                const sprite = this.add.image(room.start + bgLocalX, bgLocalY, textureKey)
                    .setDisplaySize(bgDisplayWidth, bgDisplayHeight)
                    .setOrigin(bgOriginX, bgOriginY)
                    .setDepth(-2)
                    .setVisible(false)
                    .setAlpha(RUNTIME_REVIEW_CAPTURE_MODE ? (composition.hasBespokeBackground ? 0.72 : 0.58) : (composition.hasBespokeBackground ? 0.4 : 0.5));
                applyRoomInteriorFootprintMask(this, sprite, roomId, ROOM_IDS[roomId]);
                this.roomBackgroundSprites[roomId] = sprite;
                if (minimalBespokeStack) {
                    this.roomBackgroundFeatherSprites[roomId] = [];
                } else {
                    const feathers = [];
                    const leftFade = this.add.image(room.start + chamberLeft + 96, chamberTop + (chamberHeight / 2), 'fade-edge-left')
                        .setDisplaySize(Math.min(192, chamberWidth * 0.28), chamberHeight)
                        .setDepth(-1.92)
                        .setVisible(false)
                        .setAlpha(suppressBespokeFeathers ? 0 : (RUNTIME_REVIEW_CAPTURE_MODE ? 0.28 : 0.92));
                    feathers.push(leftFade);
                    const rightFade = this.add.image(room.start + chamberRight - 95, chamberTop + (chamberHeight / 2), 'fade-edge-right')
                        .setDisplaySize(Math.min(192, chamberWidth * 0.28), chamberHeight)
                        .setDepth(-1.92)
                        .setVisible(false)
                        .setAlpha(suppressBespokeFeathers ? 0 : (RUNTIME_REVIEW_CAPTURE_MODE ? 0.28 : 0.92));
                    feathers.push(rightFade);
                    /* Top feather fights bespoke ceiling slab (double band + seam); skip when a loaded ceiling owns the cap. */
                    if (!ceilingCapH) {
                        const topFade = this.add.image(room.start + chamberLeft + (chamberWidth / 2), chamberTop + 80, 'fade-edge-top')
                            .setDisplaySize(chamberWidth, Math.min(160, chamberHeight * 0.3))
                            .setDepth(-1.91)
                            .setVisible(false)
                            .setAlpha(suppressBespokeFeathers ? 0 : (RUNTIME_REVIEW_CAPTURE_MODE ? 0.24 : 0.88));
                        feathers.push(topFade);
                    }
                    const bottomFade = this.add.image(room.start + chamberLeft + (chamberWidth / 2), chamberBottom - 96, 'fade-edge-bottom')
                        .setDisplaySize(chamberWidth, Math.min(192, chamberHeight * 0.32))
                        .setDepth(-1.91)
                        .setVisible(false)
                        .setAlpha(suppressBespokeFeathers ? 0 : (RUNTIME_REVIEW_CAPTURE_MODE ? 0.3 : 0.94));
                    feathers.push(bottomFade);
                    feathers.forEach((feather) => applyRoomInteriorFootprintMask(this, feather, roomId, ROOM_IDS[roomId]));
                    this.roomBackgroundFeatherSprites[roomId] = feathers;
                }
            }
            const midgroundKey = resolveRoomMidgroundTexture(this, roomId);
            if (room && midgroundKey) {
                if (composition.hasBespokeMidground && composition.midgroundZone) {
                    const sourceWidth = Number(composition.midgroundAsset?.final_dimensions?.width || composition.midgroundPlan?.target_dimensions?.width || chamberWidth || 1600);
                    const sourceHeight = Number(composition.midgroundAsset?.final_dimensions?.height || composition.midgroundPlan?.target_dimensions?.height || chamberHeight || 1200);
                    const safeLeft = Phaser.Math.Clamp(Number(composition.midgroundZone.x || 0), 0, sourceWidth);
                    const safeRight = Phaser.Math.Clamp(safeLeft + Number(composition.midgroundZone.width || 0), safeLeft, sourceWidth);
                    const slices = [
                        { cropX: 0, cropWidth: safeLeft },
                        { cropX: safeRight, cropWidth: sourceWidth - safeRight }
                    ].filter((slice) => slice.cropWidth >= 64);
                    const cropTop = ceilingCapH > 0
                        ? Math.min(sourceHeight - 32, Math.round((ceilingCapH / chamberHeight) * sourceHeight))
                        : 0;
                    const cropH = Math.max(32, sourceHeight - cropTop);
                    const sprites = slices.map((slice) => this.add.image(room.start + chamberLeft + (slice.cropX / sourceWidth) * chamberWidth, chamberBottom, midgroundKey)
                        .setDisplaySize((slice.cropWidth / sourceWidth) * chamberWidth, vaultHeight)
                        .setCrop(slice.cropX, cropTop, slice.cropWidth, cropH)
                        .setOrigin(0, 1)
                        .setDepth(-0.18)
                        .setVisible(false)
                        .setAlpha(RUNTIME_REVIEW_CAPTURE_MODE ? 0.62 : 0.52));
                    sprites.forEach((midSprite) => applyRoomInteriorFootprintMask(this, midSprite, roomId, ROOM_IDS[roomId]));
                    this.roomMidgroundSprites[roomId] = sprites;
                } else {
                    let mgSrcW = chamberWidth;
                    let mgSrcH = chamberHeight;
                    try {
                        const tex = this.textures.get(midgroundKey);
                        const fr = tex.get();
                        if (fr.width > 0) mgSrcW = fr.width;
                        if (fr.height > 0) mgSrcH = fr.height;
                    } catch (_) { /* use fallbacks */ }
                    const cropTop = ceilingCapH > 0
                        ? Math.min(mgSrcH - 32, Math.round((ceilingCapH / chamberHeight) * mgSrcH))
                        : 0;
                    const cropH = Math.max(32, mgSrcH - cropTop);
                    const sprite = this.add.image(room.start + chamberLeft + (chamberWidth / 2), chamberBottom, midgroundKey)
                        .setDisplaySize(chamberWidth, vaultHeight)
                        .setCrop(0, cropTop, mgSrcW, cropH)
                        .setOrigin(0.5, 1)
                        .setDepth(composition.hasBespokeMidground ? -0.22 : -0.35)
                        .setVisible(false)
                        .setAlpha(RUNTIME_REVIEW_CAPTURE_MODE ? (composition.hasBespokeMidground ? 0.5 : 0.46) : (composition.hasBespokeMidground ? 0.24 : 0.34));
                    applyRoomInteriorFootprintMask(this, sprite, roomId, ROOM_IDS[roomId]);
                    this.roomMidgroundSprites[roomId] = sprite;
                }
            }
        });
    }

    createRoomSurfaceTile(x, y, roomId, textureKey, role = 'wall') {
        const sprite = this.platforms.create(x, y, textureKey);
        const composition = getRoomEnvironmentRuntimeComposition(roomId);
        const contrastQa = isContrastQaEnvironment(roomId);
        if (isResolvedRoomSurfaceAsset(roomId, textureKey)) {
            sprite.setDisplaySize(32, 32);
        }
        let alpha = role === 'floor' ? 0.18 : 0.12;
        if (contrastQa) {
            alpha = role === 'floor' ? 0.52 : 0.26;
        } else if (composition.emphasizeWalls) {
            /* Procedural tiles use env-surface-* keys; isResolvedRoomSurfaceAsset only matched legacy env-*-asset-* (never generated). */
            alpha = role === 'floor' ? 0.46 : 0.52;
            if (isResolvedRoomSurfaceAsset(roomId, textureKey)) {
                alpha = role === 'floor' ? 0.52 : 0.58;
            }
        }
        sprite.setAlpha(alpha);
        sprite.refreshBody();
        return sprite;
    }

    createRoomPlatformTile(x, y, roomId, textureKey) {
        const sprite = this.platforms.create(x, y, textureKey);
        const composition = getRoomEnvironmentRuntimeComposition(roomId);
        const contrastQa = isContrastQaEnvironment(roomId);
        if (isResolvedRoomPlatformAsset(roomId, textureKey)) {
            sprite.setDisplaySize(32, 14);
        }
        let alpha = 0.16;
        if (contrastQa) {
            alpha = 0.42;
        } else if (composition.emphasizeWalls) {
            alpha = isResolvedRoomPlatformAsset(roomId, textureKey) ? 0.34 : 0.3;
        }
        sprite.setAlpha(alpha);
        sprite.refreshBody();
        return sprite;
    }

    addRoomWallBodyDecor(roomId, x, y, width, height) {
        const textureKey = resolveRoomWallBodyTexture(this, roomId);
        if (!textureKey || width < 24 || height < 24) return null;
        const sprite = this.add.tileSprite(x + (width / 2), y + (height / 2), width, height, textureKey)
            .setDepth(-0.18)
            .setAlpha(0.92);
        applyWallStripTileScaleFromTexture(this, sprite, width, height, textureKey);
        this.environmentDecor.push(sprite);
        return sprite;
    }

    addRoomWallMassDecor(roomId, x, y, width, height, alpha = 0.96, depth = -0.08) {
        const textureKey = resolveRoomWallBodyTexture(this, roomId);
        if (!textureKey || width < 24 || height < 24) return null;
        const sprite = this.add.tileSprite(x + (width / 2), y + (height / 2), width, height, textureKey)
            .setDepth(depth)
            .setAlpha(alpha);
        applyWallStripTileScaleFromTexture(this, sprite, width, height, textureKey);
        this.environmentDecor.push(sprite);
        return sprite;
    }

    addRoomStandardWallAccentDecor(roomId, x, y, width, height, side = 'left') {
        if (width < 24 || height < 96) return null;
        const style = deriveRoomEnvironmentRuntimeStyle(roomId);
        const g = this.add.graphics();
        const body = rgbToHexInt(mixRgb(style.crack, style.floorBase, 0.18));
        const seam = rgbToHexInt(mixRgb(style.crack, style.edge, 0.2));
        const face = rgbToHexInt(mixRgb(style.crack, style.floorBase, 0.14));
        const relief = rgbToHexInt(mixRgb(style.edge, style.floorBase, 0.28));
        const baseBond = rgbToHexInt(mixRgb(style.crack, style.floorBase, 0.12));
        const highlight = rgbToHexInt(style.edge);
        const outerPierWidth = Math.max(12, Math.round(width * 0.18));
        const innerPilasterWidth = Math.max(10, Math.round(width * 0.1));
        const courseHeight = Math.max(40, Math.round(height * 0.1));
        const corniceHeight = Math.max(18, Math.round(height * 0.035));
        const plinthHeight = Math.max(24, Math.round(height * 0.055));
        const fieldX = side === 'left' ? x + outerPierWidth : x;
        const fieldWidth = Math.max(20, width - outerPierWidth);
        const fieldRight = fieldX + fieldWidth;
        const innerPilasterX = side === 'left' ? fieldRight - innerPilasterWidth : fieldX;
        const faceLeft = side === 'left' ? fieldX + 8 : fieldX + innerPilasterWidth + 8;
        const faceWidth = Math.max(16, fieldWidth - innerPilasterWidth - 16);
        const faceTop = y + corniceHeight + 12;
        const faceBottom = y + height - plinthHeight - 12;
        const blockRows = Math.max(3, Math.floor((faceBottom - faceTop) / 84));
        const blockCols = Math.max(2, Math.floor(faceWidth / 46));

        g.setDepth(RUNTIME_REVIEW_CAPTURE_MODE ? -0.04 : -0.08);
        g.fillStyle(body, 1);
        g.fillRect(x, y, width, height);
        g.fillStyle(seam, 1);
        g.fillRect(side === 'left' ? x : x + width - outerPierWidth, y, outerPierWidth, height);
        g.fillStyle(seam, 1);
        g.fillRect(innerPilasterX, y + corniceHeight, innerPilasterWidth, Math.max(32, height - corniceHeight - plinthHeight));
        for (let lineY = y + corniceHeight + 12; lineY < y + height - plinthHeight - 16; lineY += courseHeight) {
            g.fillStyle(highlight, 0.16);
            g.fillRect(x + 4, lineY, Math.max(12, width - 8), 3);
        }
        g.fillStyle(seam, 1);
        g.fillRect(x, y, width, corniceHeight);
        g.fillStyle(highlight, 0.22);
        g.fillRect(x + 4, y + 6, Math.max(12, width - 8), 4);
        g.fillStyle(seam, 1);
        g.fillRect(x, y + height - plinthHeight, width, plinthHeight);
        g.fillStyle(baseBond, 1);
        g.fillRect(x, y + height - plinthHeight, width, Math.max(plinthHeight + 20, Math.round(plinthHeight * 1.45)));
        g.fillStyle(face, 1);
        g.fillRect(faceLeft, faceTop, faceWidth, Math.max(48, faceBottom - faceTop));
        g.lineStyle(3, highlight, 0.18);
        g.strokeRect(faceLeft, faceTop, faceWidth, Math.max(48, faceBottom - faceTop));
        for (let row = 0; row < blockRows; row += 1) {
            const rowY = faceTop + Math.round((row * (faceBottom - faceTop)) / blockRows);
            const rowBottom = faceTop + Math.round(((row + 1) * (faceBottom - faceTop)) / blockRows);
            const rowHeight = Math.max(14, rowBottom - rowY);
            const offset = row % 2 === 0 ? 0 : Math.round((faceWidth / blockCols) * 0.5);
            const blockWidth = Math.max(24, Math.round(faceWidth / blockCols));
            for (let cursor = faceLeft - offset; cursor < faceLeft + faceWidth; cursor += blockWidth) {
                const blockLeft = Math.max(faceLeft, cursor);
                const blockRight = Math.min(faceLeft + faceWidth, cursor + blockWidth);
                if (blockRight - blockLeft < 12) continue;
                g.fillStyle(relief, 0.34 + ((row % 2) * 0.05));
                g.fillRect(blockLeft + 1, rowY + 1, Math.max(10, blockRight - blockLeft - 2), Math.max(10, rowHeight - 2));
                g.lineStyle(1, highlight, 0.12);
                g.strokeRect(blockLeft + 1, rowY + 1, Math.max(10, blockRight - blockLeft - 2), Math.max(10, rowHeight - 2));
            }
        }
        g.fillStyle(baseBond, 1);
        g.fillTriangle(
            side === 'left' ? x : x + width,
            y + height - plinthHeight,
            side === 'left' ? x + Math.max(18, outerPierWidth + 10) : x + width - Math.max(18, outerPierWidth + 10),
            y + height - plinthHeight,
            side === 'left' ? x : x + width,
            y + height + Math.max(26, Math.round(plinthHeight * 0.9))
        );
        this.environmentDecor.push(g);
        return g;
    }

    addPlacedBespokeAsset(roomId, asset, depth, alpha = 0.98) {
        if (!asset?.slot_id || !asset?.url || !this.textures.exists(`env-bespoke-${asset.slot_id}`)) return null;
        const placement = asset.placement || {};
        const roomStart = ROOM_IDS[roomId]?.start || 0;
        const displayWidth = Math.max(1, Number(placement.display_width || asset.final_dimensions?.width || 1));
        const displayHeight = Math.max(1, Number(placement.display_height || asset.final_dimensions?.height || 1));
        const originX = Phaser.Math.Clamp(Number(placement.origin_x ?? 0.5), 0, 1);
        const originY = Phaser.Math.Clamp(Number(placement.origin_y ?? 0.5), 0, 1);
        const localX = Number(placement.x || 0);
        const localY = Number(placement.y || 0);
        const sprite = this.add.image(roomStart + localX, localY, `env-bespoke-${asset.slot_id}`)
            .setOrigin(originX, originY)
            .setDisplaySize(displayWidth, displayHeight)
            .setDepth(depth)
            .setAlpha(alpha);
        this.environmentDecor.push(sprite);
        return sprite;
    }

    addRoomBespokeUnifiedShellForegroundDecor(roomId, support = null) {
        if (!support?.roomBounds || !support?.chamberBounds) return false;
        const asset = getRoomEnvironmentBespokeAsset(roomId, 'room_shell_foreground');
        if (!asset?.url || !this.textures.exists(`env-bespoke-${asset.slot_id}`)) return false;
        const roomBounds = support.roomBounds;
        const baseTexKey = `env-bespoke-${asset.slot_id}`;
        const useShellPremask = UNIFIED_SHELL_FOOTPRINT_PREMASK && !MINIMAL_BESPOKE_COMPOSITOR && this.textures.exists(baseTexKey);
        const { dw, dh, ox, oy, localX, localY } = computeUnifiedShellWorldPlacement(roomId, asset, support, {
            scene: this,
            usePremask: useShellPremask
        });
        /* Trust PNG alpha by default so the full authored ring stays visible; premask only on explicit opt-in (see UNIFIED_SHELL_FOOTPRINT_PREMASK). */
        const textureKey = useShellPremask
            ? getOrCreatePremaskedShellTexture(this, asset.slot_id, roomId)
            : baseTexKey;
        /* Above floor cap / ledge (0.08–0.11), below bespoke doors (0.18) and gate (0.22). */
        const depth = 0.16;
        const sprite = this.add.image(roomBounds.start + localX, localY, textureKey)
            .setOrigin(ox, oy)
            .setDisplaySize(dw, dh)
            .setDepth(depth)
            .setAlpha(RUNTIME_REVIEW_CAPTURE_MODE ? 1 : 0.98);
        if (typeof sprite.setRoundPixels === 'function') sprite.setRoundPixels(true);
        this.environmentDecor.push(sprite);
        return true;
    }

    /**
     * Unified shell PNGs often paint masonry a few dozen pixels past the chamber opening (mask bleed).
     * Polygon wall tiles only fill *outside* the footprint, so the player can walk into the stone art.
     * Add vertical collider strips just *inside* the chamber left/right bounds. Strip width scales with
     * `room_shell_foreground` display width and the v2 atlas side-border ratio (not a fixed 32/64px lip).
     */
    addRoomBespokeShellInteriorSideColliders(roomId, support, tile, layoutFloorTileCenterY) {
        if (!support?.roomBounds || !support?.chamberBounds || !Number.isFinite(layoutFloorTileCenterY)) return;
        const poly = support.chamberBounds;
        const roomStart = support.roomBounds.start;
        const roomWidth = Math.max(1, Number(support.roomBounds.width) || 0);
        const chamberLeft = Phaser.Math.Clamp(Number(poly.left || 0), 0, roomWidth);
        const chamberRight = Phaser.Math.Clamp(Number(poly.right || roomWidth), chamberLeft, roomWidth);
        const chamberW = Math.max(0, chamberRight - chamberLeft);
        const asset = getRoomEnvironmentBespokeAsset(roomId, 'room_shell_foreground');
        const pl = asset?.placement || {};
        const dw = Math.max(1, Number(pl.display_width || asset?.final_dimensions?.width || chamberW));
        let lipPx = Math.round(
            (SHELL_UNIFIED_SIDE_COLLIDER_SIDE_PX / SHELL_UNIFIED_SIDE_COLLIDER_ATLAS_W) * dw * SHELL_UNIFIED_SIDE_COLLIDER_BAND_USE
        );
        lipPx = Phaser.Math.Clamp(lipPx, SHELL_UNIFIED_SIDE_COLLIDER_MIN_PX, SHELL_UNIFIED_SIDE_COLLIDER_MAX_PX);
        const maxLipPerSide = Math.floor((chamberW - tile) / 2);
        if (maxLipPerSide < SHELL_UNIFIED_SIDE_COLLIDER_MIN_PX) return;
        lipPx = Math.min(lipPx, maxLipPerSide);
        const topY = Number(poly.top || support.roomTop || 0);
        const lastWallCenterY = layoutFloorTileCenterY - tile;
        if (lastWallCenterY < topY + tile) return;
        const bodyH = lastWallCenterY + 16 - topY;
        if (bodyH < tile) return;
        const centerY = topY + bodyH * 0.5;
        const wallTextureKey = resolveRoomSurfaceTexture(this, roomId, 'wall');
        const addSideStrip = (worldCenterX) => {
            const sprite = this.platforms.create(worldCenterX, centerY, wallTextureKey);
            sprite.setDisplaySize(lipPx, bodyH);
            sprite.setAlpha(0);
            sprite.refreshBody();
        };
        addSideStrip(roomStart + chamberLeft + lipPx * 0.5);
        addSideStrip(roomStart + chamberRight - lipPx * 0.5);
    }

    addRoomBespokeWallShellDecor(roomId, support = null) {
        const wallAssets = getRoomEnvironmentBespokeWallShellAssets(roomId);
        const trimAssets = getRoomEnvironmentBespokeAssetsByType(roomId, ['wall_base_trim_left', 'wall_base_trim_right']);
        if (!wallAssets.length && !trimAssets.length) return false;
        /* Depth above floor cap (0.08) / ledge (0.11) so masonry is not painted under the walk strip. */
        const wallShellDepth = RUNTIME_REVIEW_CAPTURE_MODE ? 0.14 : 0.17;
        const roomWidth = support?.roomBounds ? Math.max(1, Number(support.roomBounds.end || 0) - Number(support.roomBounds.start || 0)) : 0;
        const chamberBounds = support?.chamberBounds || null;
        const chamberWidth = chamberBounds ? Math.max(1, Number(chamberBounds.right || 0) - Number(chamberBounds.left || 0)) : roomWidth;
        let flankingMassPlaced = 0;
        /* When wall_module_* art exists, flanking TileSprites repeat across huge polygon margins and
         * visually dominate (full-height “pillar”); bespoke sprites carry the read — skip flanking.
         * Outer buildWorldGeometry still adds mass fallback if bespoke placement fails. */
        if (!wallAssets.length && support?.roomBounds && chamberBounds) {
            const upperMassY = Number(chamberBounds.top || support.roomTop || 0);
            const floorPlaneTop = Number(
                support.floorTileCenterY != null
                    ? support.floorTileCenterY
                    : (chamberBounds.bottom || support.floorWorldY || 0)
            );
            const upperMassHeight = Math.max(128, floorPlaneTop - upperMassY);
            const leftWidth = Math.max(0, Number(chamberBounds.left || 0));
            const rightWidth = Math.max(0, roomWidth - Number(chamberBounds.right || roomWidth));
            if (leftWidth >= 24) {
                if (this.addRoomWallMassDecor(roomId, support.roomBounds.start, upperMassY, leftWidth, upperMassHeight, RUNTIME_REVIEW_CAPTURE_MODE ? 0.92 : 0.72, wallShellDepth)) {
                    flankingMassPlaced += 1;
                }
            }
            if (rightWidth >= 24) {
                if (this.addRoomWallMassDecor(roomId, support.roomBounds.start + Number(chamberBounds.right || roomWidth), upperMassY, rightWidth, upperMassHeight, RUNTIME_REVIEW_CAPTURE_MODE ? 0.92 : 0.72, wallShellDepth)) {
                    flankingMassPlaced += 1;
                }
            }
        }
        let bespokeWallSpritesPlaced = 0;
        wallAssets.forEach((asset) => {
            let sprite = null;
            if (!support?.roomBounds || !roomWidth) {
                const pl = asset.placement || {};
                const frameNat0 = getEnvBespokeTextureFrameSize(this, asset.slot_id);
                const rawW = Number(pl.display_width || asset.final_dimensions?.width || frameNat0.w);
                const rawH = Number(pl.display_height || asset.final_dimensions?.height || frameNat0.h);
                const w0 = Math.min(272, Math.max(64, Math.round(rawW)), Math.ceil(frameNat0.w));
                const h0 = Math.min(800, Math.max(200, Math.round(rawH)), Math.ceil(frameNat0.h * 1.25));
                sprite = this.addPlacedBespokeAsset(roomId, {
                    ...asset,
                    placement: { ...pl, display_width: w0, display_height: h0 }
                }, wallShellDepth, RUNTIME_REVIEW_CAPTURE_MODE ? 1 : 0.98);
            } else {
                const placement = asset.placement || {};
                const componentType = String(asset.component_type || '');
                const planEntry =
                    (componentType && getRoomEnvironmentBespokePlanEntry(roomId, componentType))
                    || getRoomEnvironmentBespokePlanEntry(roomId, 'wall_module_left')
                    || getRoomEnvironmentBespokePlanEntry(roomId, 'wall_module_right');
                const planW = Number(planEntry?.target_dimensions?.width || 0);
                const planH = Number(planEntry?.target_dimensions?.height || 0);
                const authoredW = Math.max(
                    0,
                    Number(placement.display_width || asset.final_dimensions?.width || planW || 0)
                );
                const authoredH = Math.max(
                    0,
                    Number(placement.display_height || asset.final_dimensions?.height || planH || 0)
                );
                const maxHalf = Math.max(1, Math.round(chamberWidth * 0.5));
                /* Side accents should stay narrow vs viewport (~800px); 26% chamber was still hundreds of px wide. */
                const capW = Math.min(maxHalf, Math.round(chamberWidth * 0.14), 272);
                const floorW = Math.max(96, Math.round(chamberWidth * 0.12));
                /* Match horizontal scale to generated art (same contract as floor/ceiling strips), not viewport-wide bands. */
                const baseW = authoredW > 0 ? authoredW : Math.max(200, planW || floorW);
                const accentWidth = authoredW > 0
                    ? Math.min(Math.max(Math.round(authoredW), 64), capW)
                    : Phaser.Math.Clamp(Math.round(baseW), 96, capW);
                const chamberTop = Number(chamberBounds?.top || support.roomTop || 0);
                /* Wall foot sits on walk-plane top (tile top), not polygon bottom — those can differ by tens of px. */
                const wallFootY = Number(
                    support?.walkPlaneTopY != null
                        ? support.walkPlaneTopY
                        : getRoomWalkPlaneTopY(roomId, Number(support?.floorWorldY ?? getRoomVisualWorldBottom() - 16))
                );
                const chamberH = Math.max(1, wallFootY - chamberTop);
                /* Never force full-chamber height — that vertically stretches brick scale to a few giant courses. */
                const baseH = authoredH > 0 ? authoredH : Math.max(320, Math.round(planH || chamberH * 0.72));
                let accentHeight = Phaser.Math.Clamp(Math.round(baseH), 200, chamberH);
                let accentW = accentWidth;
                const frameNat = getEnvBespokeTextureFrameSize(this, asset.slot_id);
                const WALL_ART_MAX_SCALE_W = 1;
                const WALL_ART_MAX_SCALE_H = 1.25;
                accentW = Math.min(accentW, Math.max(64, Math.ceil(frameNat.w * WALL_ART_MAX_SCALE_W)));
                accentHeight = Math.min(accentHeight, Math.max(200, Math.ceil(frameNat.h * WALL_ART_MAX_SCALE_H)));
                accentW = Math.min(accentW, capW);
                accentHeight = Math.min(accentHeight, chamberH);
                const isLeft = String(asset.component_type || '').includes('left');
                /* Polygon inset (room edge → chamber): flanking mass is skipped when bespoke walls exist (#145).
                 * If accent width is capped below that inset, a black strip shows at the room edge — widen shell
                 * to cover margin (still capped by maxHalf). */
                const marginLeft = Math.max(0, Number(chamberBounds?.left || 0));
                const marginRight = Math.max(0, roomWidth - Number(chamberBounds?.right || roomWidth));
                if (isLeft) {
                    accentW = Math.min(maxHalf, Math.max(accentW, marginLeft));
                } else {
                    accentW = Math.min(maxHalf, Math.max(accentW, marginRight));
                }
                /* Room-local X only — addPlacedBespokeAsset adds ROOM_IDS[roomId].start (world offset). */
                const localWallX = isLeft
                    ? Number(chamberBounds?.left || 0)
                    : Number(chamberBounds?.right || roomWidth);
                sprite = this.addPlacedBespokeAsset(roomId, {
                    ...asset,
                    placement: {
                        ...placement,
                        x: localWallX,
                        y: wallFootY,
                        display_width: accentW,
                        display_height: accentHeight,
                        /* Keep side shells flush with room boundaries:
                         * left shell right-edge at left boundary, right shell left-edge at right boundary. */
                        origin_x: isLeft ? 1 : 0,
                        origin_y: 1
                    }
                }, wallShellDepth, RUNTIME_REVIEW_CAPTURE_MODE ? 1 : 0.98);
            }
            if (sprite) bespokeWallSpritesPlaced += 1;
        });
        // Keep wall assembly simple: one main wall asset should carry the read.
        // Wall-base trims may still exist in generated output, but we intentionally
        // do not place them in runtime review composition because they complicate
        // the wall silhouette without adding useful structure.
        if (!wallAssets.length) return true;
        return bespokeWallSpritesPlaced > 0 || flankingMassPlaced > 0;
    }

    addRoomBespokePrimaryFloorFaceDecor(roomId, band = null) {
        const asset = getRoomEnvironmentBespokeAsset(roomId, 'main_floor_face');
        if (!asset?.url) return false;
        const placement = asset.placement || {};
        const assetWithPlacement = band ? {
            ...asset,
            placement: {
                ...placement,
                x: band.x,
                y: band.y,
                display_width: band.width,
                display_height: Math.min(band.height, Math.max(Number(placement.display_height || 0), Math.round(band.height * 0.42))),
                origin_x: 0,
                origin_y: 0
            }
        } : asset;
        this.addPlacedBespokeAsset(roomId, assetWithPlacement, RUNTIME_REVIEW_CAPTURE_MODE ? 0.03 : -0.03, RUNTIME_REVIEW_CAPTURE_MODE ? 1 : 0.98);
        return true;
    }

    addRoomBespokeHeroPlatformFaceDecor(roomId, platform) {
        const asset = platform ? getRoomEnvironmentBespokeHeroPlatformFaceAsset(roomId, platform) : null;
        if (!asset?.url) return false;
        this.addPlacedBespokeAsset(roomId, asset, 0.05, 0.98);
        return true;
    }

    addRoomBespokeDoorDecor(roomId) {
        const doorAssets = getRoomEnvironmentBespokeAssetsByType(roomId, ['door_frame']);
        if (!doorAssets.length) return false;
        doorAssets.forEach((asset) => this.addPlacedBespokeAsset(roomId, asset, 0.18, RUNTIME_REVIEW_CAPTURE_MODE ? 1 : 0.98));
        return true;
    }

    /**
     * Full-width ceiling band from bespoke manifest (v2/v3). Without this, the top of the chamber stays empty
     * (black) in playtest and runtime review even when the asset exists and loads.
     * Planner placement uses y=0 as “top of plan canvas”; Phaser expects the same Y space as polygon/backgrounds
     * (chamber top from footprint). Raw y=0 draws at world row 0, far above an inset chamber → empty band in camera.
     */
    addRoomBespokeCeilingDecor(roomId) {
        const ceilingAssets = getRoomEnvironmentBespokeAssetsByType(roomId, ['ceiling_band', 'ceiling_piece']);
        if (!ceilingAssets.length) return false;
        const roomW = getRoomWidth(roomId);
        const poly = getRoomPolygonBounds(roomId);
        const chamberLeft = Number(poly.left || 0);
        const chamberRight = Number(poly.right || roomW);
        const chamberTop = Number(poly.top || 0);
        const chamberWidth = Math.max(64, chamberRight - chamberLeft);
        /* Between parallax background (-2) and midground side frames (~-0.18) so masonry reads above the far plate. */
        const depth = -1.15;
        const alpha = 0.96;
        let placed = 0;
        ceilingAssets.forEach((asset) => {
            const pl = asset.placement || {};
            const manifestW = Math.max(1, Number(pl.display_width || asset.final_dimensions?.width || chamberWidth));
            const manifestH = Math.max(1, Number(pl.display_height || asset.final_dimensions?.height || 224));
            const spanW = Math.max(chamberWidth, manifestW);
            const rawOriginY = pl.origin_y;
            const originY = rawOriginY == null || rawOriginY === ''
                ? 0
                : Phaser.Math.Clamp(Number(rawOriginY), 0, 1);
            const assetWithPlacement = {
                ...asset,
                placement: {
                    ...pl,
                    x: chamberLeft + Math.round(chamberWidth / 2),
                    y: Math.round(chamberTop),
                    display_width: Math.round(spanW),
                    display_height: Math.round(manifestH),
                    origin_x: 0.5,
                    origin_y: originY
                }
            };
            if (this.addPlacedBespokeAsset(roomId, assetWithPlacement, depth, alpha)) placed += 1;
        });
        return placed > 0;
    }

    addRoomFloorCapDecor(roomId, x, y, width, height = 24, mergeFaceSpan = 0) {
        /* `y` is floor physics tile center (same as createRoomSurfaceTile). Top of walk surface = y − 16. */
        const walkTop = y - 16;
        const bespoke = getRoomEnvironmentBespokePrimaryFloorAsset(roomId);
        if (bespoke?.url && this.textures.exists(`env-bespoke-${bespoke.slot_id}`)) {
            const baseH = Math.max(height, Number(bespoke.final_dimensions?.height || 96) * 0.45);
            const extra = Math.max(0, mergeFaceSpan);
            const totalH = baseH + extra;
            const sprite = this.add.image(x + (width / 2), walkTop, `env-bespoke-${bespoke.slot_id}`)
                .setOrigin(0.5, 0)
                .setDisplaySize(width, totalH)
                .setDepth(0.08)
                .setAlpha(0.98);
            this.environmentDecor.push(sprite);
            return sprite;
        }
        const textureKey = resolveRoomFloorCapTexture(this, roomId);
        if (!textureKey || width < 24) return null;
        const sprite = this.add.tileSprite(x + (width / 2), walkTop, width, height, textureKey)
            .setOrigin(0.5, 0)
            .setDepth(0.08)
            .setAlpha(0.96);
        applyEnvironmentStripTileScale(sprite, width, height, 512, 96);
        this.environmentDecor.push(sprite);
        return sprite;
    }

    addRoomFloorBandDecor(roomId, x, y, width, height, alpha = 0.9) {
        const textureKey = resolveRoomFloorTexture(this, roomId);
        if (!textureKey || width < 24 || height < 24) return null;
        const sprite = this.add.tileSprite(x + (width / 2), y + (height / 2), width, height, textureKey)
            .setDepth(-0.04)
            .setAlpha(alpha);
        applyEnvironmentStripTileScale(sprite, width, height, 32, 32);
        this.environmentDecor.push(sprite);
        return sprite;
    }

    addRoomPlatformLedgeDecor(roomId, x, y, width, height = 22) {
        const room = getLayoutRoom(roomId);
        const platform = (room?.platforms || []).find((item) => Number(item.x || 0) === Number(x - ROOM_IDS[roomId].start) && Number(item.y || 0) === Number(y) && (Math.max(1, Number(item.len || 1)) * 32) === Number(width));
        const bespoke = platform ? getRoomEnvironmentBespokeHeroPlatformAsset(roomId, platform) : null;
        if (bespoke?.url && this.textures.exists(`env-bespoke-${bespoke.slot_id}`)) {
            const sprite = this.add.image(x + (width / 2), y, `env-bespoke-${bespoke.slot_id}`)
                .setOrigin(0.5, 0.68)
                .setDisplaySize(width, Math.max(height, Number(bespoke.final_dimensions?.height || 72) * 0.4))
                .setDepth(0.11)
                .setAlpha(0.98);
            this.environmentDecor.push(sprite);
            return sprite;
        }
        const textureKey = resolveRoomPlatformLedgeTexture(this, roomId);
        if (!textureKey || width < 24) return null;
        const sprite = this.add.tileSprite(x + (width / 2), y, width, height, textureKey)
            .setOrigin(0.5, 0.5)
            .setDepth(0.11)
            .setAlpha(0.98);
        applyEnvironmentStripTileScale(sprite, width, height, 512, 72);
        this.environmentDecor.push(sprite);
        return sprite;
    }

    buildEnvironmentSetDressing() {
        this.environmentDecor = this.environmentDecor || [];
        ROOM_SEQUENCE.forEach((roomId) => {
            const room = getLayoutRoom(roomId);
            const roomBounds = ROOM_IDS[roomId];
            if (!room || !roomBounds) return;
            const polygonBounds = getRoomPolygonBounds(roomId);
            const chamberLeft = Number(polygonBounds.left || 0);
            const chamberRight = Number(polygonBounds.right || roomBounds.width);
            const chamberTop = Number(polygonBounds.top || 0);
            const chamberBottom = Number(polygonBounds.bottom || CONFIG.WORLD_HEIGHT);
            const chamberWidth = Math.max(64, chamberRight - chamberLeft);
            const chamberHeight = Math.max(64, chamberBottom - chamberTop);
            const chamberStartX = roomBounds.start + chamberLeft;
            if (isContrastQaEnvironment(roomId)) return;
            this.addRoomBespokeDoorDecor(roomId);
            if (!roomHasBespokeUnifiedShellForeground(roomId)) {
                this.addRoomBespokeCeilingDecor(roomId);
            }
            const schema = getRoomEnvironmentSceneSchema(roomId);
            const platforms = Array.isArray(room.platforms) ? room.platforms : [];
            const doorXs = (room.doors || []).map((door) => Number(door.x || 0));
            const spawnX = Number(room.playerStart?.x || (roomBounds.width * 0.5));
            const targetXForZone = (zone) => resolveZoneTargetX(roomId, zone);
            const isBlockedX = (localX, avoidList = []) => {
                if (avoidList.includes('door') && doorXs.some((doorX) => Math.abs(doorX - localX) < 88)) return true;
                if (avoidList.includes('main_path') && Math.abs(localX - spawnX) < 120) return true;
                return localX < 48 || localX > roomBounds.width - 48;
            };
            const choosePlatform = (zone, avoidList = []) => {
                if (!platforms.length) return null;
                const targetX = targetXForZone(zone);
                const ranked = platforms
                    .map((platform) => {
                        const centerX = Number(platform.x || 0) + (Math.max(1, Number(platform.len || 1)) * 16);
                        let score = Math.abs(centerX - targetX);
                        if (isBlockedX(centerX, avoidList)) score += 900;
                        if (Number(platform.len || 0) < 3) score += 120;
                        return { platform, centerX, score };
                    })
                    .sort((a, b) => a.score - b.score);
                return ranked[0]?.platform || null;
            };
            const chooseFloorX = (zone, avoidList = [], variantIndex = 0) => {
                const target = targetXForZone(zone);
                const variants = [target, target - 132, target + 132, target - 220, target + 220];
                return variants.find((candidate) => !isBlockedX(candidate, avoidList)) || target;
            };
            const addProp = (textureKey, localX, y, options = {}) => {
                const sprite = this.add.image(roomBounds.start + localX, y, textureKey)
                    .setDepth(options.depth != null ? options.depth : -0.1)
                    .setAlpha(options.alpha != null ? options.alpha : 0.92);
                if (options.scale) sprite.setScale(options.scale);
                this.environmentDecor.push(sprite);
            };
            const addGraphicsLayer = (drawer, depth = -0.7) => {
                const g = this.add.graphics();
                g.setDepth(depth);
                drawer(g);
                this.environmentDecor.push(g);
            };
            const addShellOverlays = () => {
                if (DISABLE_UNIFIED_SHELL_RUNTIME_OVERLAYS && roomHasBespokeUnifiedShellForeground(roomId)) return;
                const style = deriveRoomEnvironmentRuntimeStyle(roomId);
                if (style.wallFamily !== 'broken_gothic_stone' && !style.fracturedStone) return;
                addGraphicsLayer((g) => {
                    const dark = rgbToHexInt(mixRgb(style.floorBase, style.crack, 0.45));
                    const edge = rgbToHexInt(style.edge);
                    const glow = rgbToHexInt(style.glow);
                    const wallRects = (DUNGEON_WALL_RECTS.find((entry) => entry.room === roomId)?.rects || []);

                    wallRects
                        .filter((rect) => rect.hTiles >= 6 && rect.wTiles <= 4)
                        .forEach((rect, index) => {
                            const x = roomBounds.start + rect.x;
                            const y = rect.y;
                            const w = rect.wTiles * 32;
                            const h = rect.hTiles * 32;
                            g.fillStyle(dark, 0.22);
                            g.fillRect(x + 6, y, Math.max(18, w - 12), h);
                            g.fillStyle(edge, 0.12);
                            g.fillRect(x + 10, y + 16, Math.max(10, w - 20), Math.max(0, h - 32));
                            g.lineStyle(2, edge, 0.16);
                            g.strokeRect(x + 6, y + 8, Math.max(18, w - 12), Math.max(24, h - 16));
                            if (index % 2 === 0) {
                                g.fillStyle(edge, 0.12);
                                g.fillRoundedRect(x - 12, y + 24, w + 24, 64, 24);
                            }
                        });

                    const floorY = CONFIG.WORLD_HEIGHT - 64;
                    g.lineStyle(2, edge, 0.18);
                    for (let x = roomBounds.start + 48; x < roomBounds.start + roomBounds.width - 48; x += 160) {
                        g.strokeLineShape(new Phaser.Geom.Line(x, floorY + 4, x + 24, floorY - 18));
                        g.strokeLineShape(new Phaser.Geom.Line(x + 24, floorY - 18, x + 96, floorY - 10));
                    }
                    g.lineStyle(1, glow, 0.08);
                    for (let x = roomBounds.start + 88; x < roomBounds.start + roomBounds.width - 88; x += 220) {
                        g.strokeLineShape(new Phaser.Geom.Line(x, floorY - 12, x + 52, floorY - 22));
                    }

                    platforms.forEach((platform, index) => {
                        const px = roomBounds.start + Number(platform.x || 0);
                        const py = Number(platform.y || 0);
                        const width = Math.max(1, Number(platform.len || 1)) * 32;
                        g.fillStyle(dark, 0.26);
                        g.fillRect(px + 10, py + 10, Math.max(16, width - 20), 6);
                        g.lineStyle(1, edge, 0.24);
                        for (let offset = 24; offset < width - 24; offset += 96) {
                            g.strokeLineShape(new Phaser.Geom.Line(px + offset, py + 14, px + offset + 12, py + 28));
                            if ((index + offset) % 2 === 0) {
                                g.strokeLineShape(new Phaser.Geom.Line(px + offset + 18, py + 14, px + offset + 6, py + 28));
                            }
                        }
                        g.lineStyle(2, edge, 0.18);
                        g.strokeLineShape(new Phaser.Geom.Line(px + 8, py + 2, px + width - 10, py + 2));
                    });

                    if (style.doorFamily === 'arch_door') {
                        (room.doors || []).forEach((door) => {
                            const dx = roomBounds.start + Number(door.x || 0) - 30;
                            const dy = Number(door.y || 0) - 84;
                            g.fillStyle(edge, 0.12);
                            g.fillRoundedRect(dx, dy, 60, 92, 18);
                            g.lineStyle(2, edge, 0.18);
                            g.strokeRoundedRect(dx + 4, dy + 4, 52, 84, 16);
                        });
                    }
                }, 0.08);
            };
            const addBackdropOverlay = () => {
                if (getRoomEnvironmentRuntimeComposition(roomId).suppressBackdropOverlay) return;
                const style = deriveRoomEnvironmentRuntimeStyle(roomId);
                const family = String(style.backdropFamily || 'ruined_arch_hall');
                if (family === 'industrial_depth') {
                    addGraphicsLayer((g) => {
                        g.fillStyle(rgbToHexInt(style.edge), 0.18);
                        for (let y = 220; y < 980; y += 120) {
                            g.fillRect(roomBounds.start, y, roomBounds.width, 28);
                        }
                        g.lineStyle(3, rgbToHexInt(style.crack), 0.3);
                        for (let x = roomBounds.start + 90; x < roomBounds.start + roomBounds.width; x += 180) {
                            g.strokeCircle(x, 320, 30);
                            g.strokeCircle(x, 620, 30);
                        }
                    }, -1.45);
                    return;
                }
                addGraphicsLayer((g) => {
                    const archColor = rgbToHexInt(style.edge);
                    g.fillStyle(archColor, 0.12);
                    const count = family === 'flooded_arch_hall' ? 4 : 3;
                    for (let i = 0; i < count; i += 1) {
                        const width = chamberWidth / (count + 1);
                        const x = chamberStartX + (i + 0.7) * width;
                        g.fillRect(x - 20, 220, 40, 720);
                        g.fillRoundedRect(x - 84, 160, 168, 120, 56);
                    }
                    if (family === 'flooded_arch_hall') {
                        g.fillStyle(rgbToHexInt(style.water), 0.14);
                        g.fillRect(chamberStartX, Math.max(chamberTop, chamberBottom - 208), chamberWidth, 160);
                    }
                }, -1.38);
            };

            addBackdropOverlay();
            addShellOverlays();

            (schema.background_layers || []).forEach((layer, index) => {
                if (layer.kind === 'fog_band') {
                    const fog = this.add.rectangle(
                        chamberStartX + (chamberWidth / 2),
                        Math.max(chamberTop + 96, chamberBottom - 116 - (index * 48)),
                        chamberWidth,
                        160,
                        rgbToHexInt(deriveRoomEnvironmentRuntimeStyle(roomId).glow),
                        0.08
                    ).setDepth(-0.5);
                    this.environmentDecor.push(fog);
                    return;
                }
                if (layer.kind === 'architecture' && layer.motif === 'gothic_arches' && !this.textures.exists(roomBackgroundAssetKey(roomId))) {
                    addGraphicsLayer((g) => {
                        const color = rgbToHexInt(deriveRoomEnvironmentRuntimeStyle(roomId).edge);
                        g.fillStyle(color, 0.16);
                        const count = layer.density === 'high' ? 5 : 3;
                        for (let i = 0; i < count; i += 1) {
                            const width = chamberWidth / (count + 1);
                            const x = chamberStartX + (i + 0.5) * width;
                            g.fillRect(x - 18, 280, 36, 560);
                            g.fillRoundedRect(x - 64, 220, 128, 96, 48);
                        }
                    }, -0.8);
                    return;
                }
                if (layer.kind === 'architecture' && layer.motif === 'columns' && !this.textures.exists(roomBackgroundAssetKey(roomId))) {
                    addGraphicsLayer((g) => {
                        const style = deriveRoomEnvironmentRuntimeStyle(roomId);
                        g.fillStyle(rgbToHexInt(style.floorAlt), 0.12);
                        const count = layer.density === 'high' ? 8 : 5;
                        for (let i = 0; i < count; i += 1) {
                            const x = chamberStartX + ((i + 1) * chamberWidth / (count + 1));
                            g.fillRect(x - 12, 180, 24, 720);
                        }
                    }, -0.72);
                }
            });

            (schema.set_dressing || []).forEach((item) => {
                const composition = getRoomEnvironmentRuntimeComposition(roomId);
                if (composition.suppressFocalSetDressing && (item.type === 'brazier' || item.type === 'altar')) return;
                if (composition.suppressFocalSetDressing && (item.zone === 'center' || item.zone === 'focal') && item.priority === 'high') return;
                const count = Math.max(1, Number(item.count || 1));
                for (let i = 0; i < count; i += 1) {
                    const zone = i === 0 ? (item.zone || 'center') : (item.zone === 'left' ? 'center' : item.zone === 'right' ? 'center' : 'left');
                    const anchor = item.anchor || 'floor';
                    const avoidList = Array.isArray(item.avoid) ? item.avoid : [];
                    let localX = chooseFloorX(zone, avoidList, i);
                    let y = CONFIG.WORLD_HEIGHT - 56;
                    if (anchor === 'platform') {
                        const platform = choosePlatform(zone, avoidList);
                        if (platform) {
                            localX = Number(platform.x || 0) + (Math.max(1, Number(platform.len || 1)) * 16);
                            y = Number(platform.y || 0) - 18;
                        }
                    } else if (anchor === 'ceiling') {
                        y = 78;
                    } else if (anchor === 'wall') {
                        localX = zone === 'left' ? 52 : roomBounds.width - 52;
                        y = CONFIG.WORLD_HEIGHT - 156;
                    }
                    if (isBlockedX(localX, avoidList)) continue;
                    if (item.type === 'brazier') addProp(roomPropTextureKey(roomId, 'brazier'), localX, y, { depth: -0.02 });
                    if (item.type === 'altar') addProp(roomPropTextureKey(roomId, 'altar'), localX, y, { depth: -0.04 });
                    if (item.type === 'roots') addProp(roomPropTextureKey(roomId, 'roots'), localX, y, { depth: -0.08 });
                    if (item.type === 'statue') addProp(roomPropTextureKey(roomId, 'statue'), localX, y, { depth: -0.06 });
                    if (item.type === 'chains') addProp(roomPropTextureKey(roomId, 'chains'), localX, y, { depth: -0.12, alpha: 0.82 });
                    if (item.type === 'banner') addProp(roomPropTextureKey(roomId, 'banner'), localX, y, { depth: -0.09 });
                }
            });
        });
    }

    getBranchIdForRoom(roomId) {
        if (roomId === 'R3' || roomId === 'R4') return 'A';
        if (roomId === 'R5' || roomId === 'R6') return 'B';
        if (roomId === 'R7' || roomId === 'R8') return 'C';
        return null;
    }

    getBranchIdForRewardRoom(roomId) {
        if (roomId === 'R4') return 'A';
        if (roomId === 'R6') return 'B';
        if (roomId === 'R8') return 'C';
        return null;
    }

    beginBranchRun(branchId) {
        if (!branchId) return;
        this.activeBranchId = branchId;
        this.activeBranchStartMs = this.time.now;
        if (this.sequenceAttemptLog[this.sequenceAttemptLog.length - 1] !== branchId) {
            this.sequenceAttemptLog.push(branchId);
        }
        this.refreshBranchBoard();
    }

    completeBranchRun(branchId) {
        if (!branchId) return false;

        const keyFlag = { A: this.keyItemA, B: this.keyItemB, C: this.keyItemC }[branchId];
        const abilityFlag = { A: this.abilityA, B: this.abilityB, C: this.abilityC }[branchId];
        if (!keyFlag || !abilityFlag) {
            this.logWrongTurn(`branch_${branchId}_return_before_rewards`);
            this.setStatusMessage(`Branch ${branchId} incomplete: secure key + ability first.`);
            return false;
        }

        const completeKey = { A: 'branchCompleteA', B: 'branchCompleteB', C: 'branchCompleteC' }[branchId];
        if (!this[completeKey]) {
            this[completeKey] = true;
            this.sequenceResolvedLog.push(branchId);
        }

        if (this.activeBranchId === branchId && this.activeBranchStartMs > 0) {
            const durationSec = Number(((this.time.now - this.activeBranchStartMs) / 1000).toFixed(1));
            this.branchDurationsSec[branchId] = durationSec;
            this.activeBranchId = null;
            this.activeBranchStartMs = 0;
        }

        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.refreshBranchBoard();
        return true;
    }

    getBranchDurationStatus(branchId) {
        const sec = this.branchDurationsSec[branchId];
        if (sec === null) return '--';
        const target = BRANCH_DURATION_TARGET_SEC[branchId];
        if (sec < target.min) return `${sec}s LOW`;
        if (sec > target.max) return `${sec}s HIGH`;
        return `${sec}s OK`;
    }

    runSequenceChecks() {
        const orders = [
            ['A', 'B', 'C'],
            ['B', 'C', 'A'],
            ['C', 'A', 'B']
        ];
        this.sequenceChecks = orders.map((attempt) => this.simulateSequenceAttempt(attempt));
    }

    simulateSequenceAttempt(order) {
        const ability = { A: false, B: false, C: false };
        const completed = [];
        const pending = [...order];
        let guard = 0;

        while (pending.length > 0 && guard < 12) {
            const branch = pending.shift();
            if (completed.includes(branch)) {
                guard++;
                continue;
            }
            if (branch === 'B' && !ability.A) {
                pending.push(branch);
                guard++;
                continue;
            }
            ability[branch] = true;
            completed.push(branch);
            guard++;
        }

        return {
            attempt: order.join('-'),
            resolved: completed.join('-'),
            passed: completed.length === 3
        };
    }

    refreshBranchBoard() {
        if (!this.branchBoardText) return;
        const lineA = `A ${this.branchCompleteA ? 'DONE' : 'OPEN'} | ${this.getBranchDurationStatus('A')}`;
        const lineB = `B ${this.branchCompleteB ? 'DONE' : (this.abilityA ? 'OPEN' : 'LOCKED')} | ${this.getBranchDurationStatus('B')}`;
        const lineC = `C ${this.branchCompleteC ? 'DONE' : 'OPEN'} | ${this.getBranchDurationStatus('C')}`;
        const seq = this.sequenceChecks.map((r) => `${r.attempt}->${r.resolved}:${r.passed ? 'OK' : 'FAIL'}`).join(' ');
        const runLog = this.sequenceAttemptLog.length ? this.sequenceAttemptLog.join('-') : '--';
        this.branchBoardText.setText(
            `R2 HUB\\n${lineA}\\n${lineB}\\n${lineC}\\nSeq ${seq}\\nRun ${runLog}`
        );
    }

    buildWorldGeometry() {
        const tile = 32;
        const shouldPlaceBoundaryTile = (roomId, point) => {
            const room = getLayoutRoom(roomId);
            if (!room || !Array.isArray(room.removedEdges) || !room.removedEdges.length) return true;
            return !room.removedEdges.some((edgeIndex) => {
                return isPointInRemovedEdgeTunnel(point, room.polygon, edgeIndex, {
                    endpointPad: tile,
                    inwardPad: tile * 0.5
                });
            });
        };

        ROOM_SEQUENCE.forEach((roomId) => {
            const roomBounds = ROOM_IDS[roomId];
            const room = getLayoutRoom(roomId);
            const hasUnifiedShell = roomHasBespokeUnifiedShellForeground(roomId);
            const roomWidth = roomBounds?.width || getRoomWidth(roomId);
            const polygonBounds = getRoomPolygonBounds(roomId);
            const { top: roomTop } = getRoomVerticalBounds(roomId);
            const visualBottom = getRoomVisualWorldBottom();
            const floorWorldY = visualBottom - 16;
            const primaryFloorPlatform = getPrimaryFloorPlatform(roomId);
            const layoutFloorTileCenterY = getLayoutFloorTileCenterY(roomId, floorWorldY);
            const walkPlaneTopY = getRoomWalkPlaneTopY(roomId, floorWorldY);
            let shellFloorTileCenterY = layoutFloorTileCenterY;
            if (!roomBounds || roomWidth <= 0) return;
            const floorTextureKey = resolveRoomSurfaceTexture(this, roomId, 'floor');
            if (!primaryFloorPlatform && !hasUnifiedShell) {
                const floorRowCenterY = layoutFloorTileCenterY;
                for (let localX = 0; localX < roomWidth; localX += tile) {
                    const centerX = localX + 16;
                    if (shouldPlaceBoundaryTile(roomId, { x: centerX, y: floorRowCenterY })) {
                        this.createRoomSurfaceTile(roomBounds.start + centerX, floorRowCenterY, roomId, floorTextureKey, 'floor');
                    }
                }
                this.addRoomFloorCapDecor(roomId, roomBounds.start, floorRowCenterY, roomWidth, 22);
            }
            const platforms = Array.isArray(room?.platforms) ? room.platforms : [];
            if (primaryFloorPlatform && !hasUnifiedShell) {
                const chamberLeft = Number(polygonBounds.left || 0);
                const chamberRight = Number(polygonBounds.right || roomBounds.width);
                const surfaceBleed = Number(CONFIG.CAMERA_CHAMBER_SIDE_BLEED_PX) || Number(CONFIG.CAMERA_CHAMBER_SURFACE_BLEED_PX) || 32;
                const spanFromPoly = getRoomPolygonPrimaryFloorSpans(roomId);
                const floorSpans = spanFromPoly && spanFromPoly.length
                    ? spanFromPoly.map((s) => ({
                        localLeft: Math.max(0, s.localLeft - surfaceBleed),
                        localRight: Math.min(roomWidth, s.localRight + surfaceBleed),
                        tileCenterY: s.tileCenterY
                    }))
                    : [{
                        localLeft: Math.max(0, chamberLeft - surfaceBleed),
                        localRight: Math.min(roomWidth, chamberRight + surfaceBleed),
                        tileCenterY: layoutFloorTileCenterY
                    }];
                shellFloorTileCenterY = Math.max(...floorSpans.map((s) => Number(s.tileCenterY) || 0));
                const bespokePrimaryCap = getRoomEnvironmentBespokePrimaryFloorAsset(roomId);
                const mergeBespokeFloor = Boolean(
                    !roomHasBespokeUnifiedShellForeground(roomId)
                    && bespokePrimaryCap?.url
                    && this.textures.exists(`env-bespoke-${bespokePrimaryCap.slot_id}`)
                );
                floorSpans.forEach((span) => {
                    const primaryFloorWidth = Math.max(1, span.localRight - span.localLeft);
                    const primaryFloorX = roomBounds.start + span.localLeft;
                    const primaryFloorY = span.tileCenterY;
                    const walkPlaneTopSpan = primaryFloorY - 16;
                    const lowerFloorTop = Math.min(walkPlaneTopSpan - 56, primaryFloorY + 20);
                    const lowerFloorHeight = Math.max(48, visualBottom - lowerFloorTop - 12);
                    const supportWidth = primaryFloorWidth;
                    if (!mergeBespokeFloor) {
                        if (!this.addRoomBespokePrimaryFloorFaceDecor(roomId, {
                            x: span.localLeft,
                            y: lowerFloorTop,
                            width: supportWidth,
                            height: lowerFloorHeight
                        })) {
                            this.addRoomFloorBandDecor(roomId, primaryFloorX, lowerFloorTop, supportWidth, lowerFloorHeight);
                        } else {
                            this.addRoomFloorBandDecor(roomId, primaryFloorX, lowerFloorTop, supportWidth, lowerFloorHeight, RUNTIME_REVIEW_CAPTURE_MODE ? 0.72 : 0.6);
                        }
                    }
                    const faceMergeSpan = mergeBespokeFloor ? Math.max(0, primaryFloorY - lowerFloorTop) : 0;
                    this.addRoomFloorCapDecor(
                        roomId,
                        primaryFloorX,
                        primaryFloorY,
                        primaryFloorWidth,
                        24,
                        faceMergeSpan
                    );
                });
            } else if (primaryFloorPlatform) {
                shellFloorTileCenterY = layoutFloorTileCenterY;
            }
            // Do not add a second "underfloor" band + cap when !primaryFloorPlatform: the world floor row + cap
            // already fills the bottom; the old else branch stacked a second cap ~50px higher and caused a dark seam.
            // Always run bespoke wall shell when manifest has wall slots; polygon rects are a separate thin grid.
            // (Old gate skipped bespoke whenever rects.length > 0 — hid wall_module art on typical R1 polygons.)
            const upperMassY = Number(polygonBounds.top || roomTop);
            const floorPlaneTop = primaryFloorPlatform ? shellFloorTileCenterY : Number(polygonBounds.bottom || floorWorldY);
            const upperMassHeight = Math.max(128, floorPlaneTop - upperMassY);
            const leftMassWidth = Math.max(0, Number(polygonBounds.left || 0));
            const rightMassWidth = Math.max(0, roomBounds.width - Number(polygonBounds.right || roomBounds.width));
            const shellSupport = {
                roomBounds,
                roomTop,
                floorWorldY,
                walkPlaneTopY,
                floorTileCenterY: primaryFloorPlatform ? shellFloorTileCenterY : null,
                chamberBounds: polygonBounds
            };
            if (hasUnifiedShell && this.addRoomBespokeUnifiedShellForegroundDecor(roomId, shellSupport)) {
                /* Unified shell carries wall + ceiling + primary floor read; skip modular wall modules and trims. */
            } else if (!this.addRoomBespokeWallShellDecor(roomId, shellSupport)) {
                if (!roomHasPolygonWallTileRects(roomId)) {
                    if (leftMassWidth >= 24) {
                        this.addRoomWallMassDecor(roomId, roomBounds.start, upperMassY, leftMassWidth, upperMassHeight, 0.98);
                    }
                    if (rightMassWidth >= 24) {
                        this.addRoomWallMassDecor(roomId, roomBounds.start + Number(polygonBounds.right || roomBounds.width), upperMassY, rightMassWidth, upperMassHeight, 0.98);
                    }
                }
            }
        });

        const firstRoomId = ROOM_SEQUENCE[0];
        const lastRoomId = ROOM_SEQUENCE[ROOM_SEQUENCE.length - 1];
        const firstRoom = ROOM_IDS[firstRoomId];
        const lastRoom = ROOM_IDS[lastRoomId];
        if (firstRoom && firstRoom.start === 0) {
            const wallTextureKey = resolveRoomSurfaceTexture(this, firstRoomId, 'wall');
            for (let localY = tile; localY < CONFIG.WORLD_HEIGHT - 32; localY += tile) {
                const centerY = localY + 16;
                if (shouldPlaceBoundaryTile(firstRoomId, { x: 16, y: centerY })) {
                    this.createRoomSurfaceTile(16, centerY, firstRoomId, wallTextureKey, 'wall');
                }
            }
            this.addRoomWallBodyDecor(firstRoomId, 0, 32, 32, CONFIG.WORLD_HEIGHT - 64);
        }
        if (lastRoom && lastRoom.end >= CONFIG.WORLD_WIDTH - 1) {
            const localX = lastRoom.width - 16;
            const wallTextureKey = resolveRoomSurfaceTexture(this, lastRoomId, 'wall');
            for (let localY = tile; localY < CONFIG.WORLD_HEIGHT - 32; localY += tile) {
                const centerY = localY + 16;
                if (shouldPlaceBoundaryTile(lastRoomId, { x: localX, y: centerY })) {
                    this.createRoomSurfaceTile(CONFIG.WORLD_WIDTH - 16, centerY, lastRoomId, wallTextureKey, 'wall');
                }
            }
            this.addRoomWallBodyDecor(lastRoomId, CONFIG.WORLD_WIDTH - 32, 32, 32, CONFIG.WORLD_HEIGHT - 64);
        }

        Object.entries(ROOM_PLATFORM_LAYOUTS).forEach(([roomId, ledges]) => {
            const primaryFloorPlatform = getPrimaryFloorPlatform(roomId);
            const roomBounds = ROOM_IDS[roomId];
            const polygonBounds = getRoomPolygonBounds(roomId);
            const chamberLeft = Number(polygonBounds.left || 0);
            const chamberRight = Number(polygonBounds.right || roomBounds.width);
            const floorWorldYLoop = getRoomVisualWorldBottom() - 16;
            const floorTileCenterY = getLayoutFloorTileCenterY(roomId, floorWorldYLoop);
            ledges.forEach(({ x, y, len, tint }) => {
                const isPrimaryFloor =
                    primaryFloorPlatform &&
                    Number(primaryFloorPlatform.x || 0) + roomBounds.start === x &&
                    Math.max(1, Number(primaryFloorPlatform.len || 1)) === len;
                const platformTextureKey = isPrimaryFloor
                    ? resolveRoomSurfaceTexture(this, roomId, 'floor')
                    : resolveRoomPlatformTexture(this, roomId, tint || 0);
                if (isPrimaryFloor) {
                    const surfaceBleed = Number(CONFIG.CAMERA_CHAMBER_SIDE_BLEED_PX) || Number(CONFIG.CAMERA_CHAMBER_SURFACE_BLEED_PX) || 32;
                    const spanFromPoly = getRoomPolygonPrimaryFloorSpans(roomId);
                    const collisionSpans = spanFromPoly && spanFromPoly.length
                        ? spanFromPoly.map((s) => ({
                            localLeft: Math.max(0, s.localLeft - surfaceBleed),
                            localRight: Math.min(roomBounds.width, s.localRight + surfaceBleed),
                            tileCenterY: s.tileCenterY
                        }))
                        : [{
                            localLeft: Math.max(0, chamberLeft - surfaceBleed),
                            localRight: Math.min(roomBounds.width, chamberRight + surfaceBleed),
                            tileCenterY: floorTileCenterY
                        }];
                    collisionSpans.forEach((span) => {
                        const collisionWidth = Math.max(1, span.localRight - span.localLeft);
                        const collisionLeft = roomBounds.start + span.localLeft;
                        const n = Math.ceil(collisionWidth / tile);
                        for (let i = 0; i < n; i += 1) {
                            const px = collisionLeft + (i * tile) + 16;
                            if (px > roomBounds.start + span.localRight - 16) {
                                break;
                            }
                            this.createRoomSurfaceTile(px, span.tileCenterY, roomId, platformTextureKey, 'floor');
                        }
                    });
                } else {
                    for (let i = 0; i < len; i++) {
                        const px = x + (i * tile) + 16;
                        this.createRoomPlatformTile(px, y, roomId, platformTextureKey);
                    }
                }
                if (!isPrimaryFloor) {
                    const localPlatform = { x: x - roomBounds.start, y, len };
                    this.addRoomBespokeHeroPlatformFaceDecor(roomId, localPlatform);
                    this.addRoomPlatformLedgeDecor(roomId, x, y, len * tile, 22);
                }
            });
        });

        DUNGEON_WALL_RECTS.forEach(({ room, rects }) => {
            const roomStart = ROOM_IDS[room].start;
            const wallTextureKey = resolveRoomSurfaceTexture(this, room, 'wall');
            const roomWidth = ROOM_IDS[room]?.width || getRoomWidth(room);
            rects.forEach(({ x, y, wTiles, hTiles }) => {
                for (let xi = 0; xi < wTiles; xi++) {
                    for (let yi = 0; yi < hTiles; yi++) {
                        const localX = x + (xi * tile) + 16;
                        const localY = y + (yi * tile);
                        this.createRoomSurfaceTile(roomStart + localX, localY, room, wallTextureKey, 'wall');
                    }
                }
                const rectWidth = wTiles * tile;
                const rectHeight = hTiles * tile;
                const touchesLeftBoundary = x <= tile;
                const touchesRightBoundary = (x + rectWidth) >= (roomWidth - tile);
                const isBoundaryMass = touchesLeftBoundary || touchesRightBoundary;
                const isTallVerticalMass = rectHeight >= Math.max(128, rectWidth * 1.1);
                const isNarrowSideMass = rectWidth <= 160;
                if (isBoundaryMass && (isTallVerticalMass || isNarrowSideMass)) {
                    this.addRoomWallBodyDecor(room, roomStart + x, y - 16, rectWidth, rectHeight);
