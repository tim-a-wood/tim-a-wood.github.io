<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050510">
    <title>Ashen Hollow - Fixed Controls</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; touch-action: none; font-family: monospace; }
        #game-container { display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
const CONFIG = {
    W: 800,
    H: 400,
    WORLD_WIDTH: 1600,
    GRAVITY: 1400,
    PLAYER_SPEED: 280,
    JUMP_FORCE: -600,
    FRICTION: 0.8,
    COYOTE_TIME: 100, // ms grace period after falling
    JUMP_BUFFER: 100, // ms to remember a jump press before landing
    COLORS: [0x2a3a5a, 0x3a2a5a, 0x2a4a3a, 0x4a3a2a, 0x2a4050]
};

class AshenHollow extends Phaser.Scene {
    constructor() {
        super('AshenHollow');
    }

    resetInternalState() {
        this.lives = 3;
        this.isGameOver = false;
        this.trailPts = [];
        this.inputState = { left: false, right: false, jump: false };
        
        // Control variables
        this.jumpsRemaining = 2;
        this.jumpWasDownLastFrame = false;
        this.lastTimeOnGround = 0;
        this.jumpBufferTime = 0;
    }

    preload() {
        this.generateAssetTextures();
    }

    generateAssetTextures() {
        const g = this.make.graphics({ x: 0, y: 0, add: false });
        g.fillStyle(0x334466).fillRect(0, 0, 32, 32);
        g.fillStyle(0xffffff, 0.15).fillRect(0, 0, 32, 2);
        g.generateTexture('floor', 32, 32);

        CONFIG.COLORS.forEach((color, i) => {
            g.clear().fillStyle(color).fillRect(0, 0, 32, 14);
            g.fillStyle(0xffffff, 0.15).fillRect(0, 0, 32, 2);
            g.generateTexture(`p${i}`, 32, 14);
        });

        g.clear().fillStyle(0x00ddff).fillRect(4, 8, 20, 24);
        g.fillStyle(0xff00bb).fillRect(8, 10, 12, 8);
        g.fillStyle(0x007799).fillRect(4, 32, 8, 8);
        g.fillStyle(0x007799).fillRect(16, 32, 8, 8);
        g.generateTexture('hero', 28, 40);
        
        g.clear().fillStyle(0xffffff, 0.13).fillCircle(40, 40, 40);
        g.generateTexture('btn', 80, 80);

        g.clear();
        for (let i = 0; i < 100; i++) {
            g.fillStyle(0xffffff, 0.4 + Math.random() * 0.6);
            g.fillRect(Math.random() * 512, Math.random() * 512, 2, 2);
        }
        g.generateTexture('stars', 512, 512);
        g.destroy();
    }

    create() {
        this.resetInternalState();
        this.physics.world.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.H);
        this.cameras.main.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.H);
        this.cameras.main.setBackgroundColor('#050510');
        
        this.starField = this.add.tileSprite(CONFIG.W/2, CONFIG.H/2, CONFIG.W, CONFIG.H, 'stars').setScrollFactor(0).setDepth(-1);
        this.trail = this.add.graphics();

        this.platforms = this.physics.add.staticGroup();
        this.player = this.physics.add.sprite(100, 250, 'hero');
        this.player.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, this.platforms);

        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

        this.buildLevel();
        this.createHUD();
        this.setupControls();
    }

    buildLevel() {
        const TILE = 32;
        for (let tx = 0; tx < CONFIG.WORLD_WIDTH; tx += TILE) {
            this.platforms.create(tx + 16, CONFIG.H - 16, 'floor').refreshBody();
        }
        const ledges = [
            { x: 320, y: 280, len: 2, tint: 0 },
            { x: 520, y: 200, len: 3, tint: 1 },
            { x: 850, y: 240, len: 2, tint: 2 },
            { x: 1100, y: 160, len: 4, tint: 3 }
        ];
        ledges.forEach(({ x, y, len, tint }) => {
            for (let i = 0; i < len; i++) {
                this.platforms.create(x + (i * TILE) + 16, y, `p${tint}`).refreshBody();
            }
        });
    }

    createHUD() {
        this.distText = this.add.text(CONFIG.W/2, 12, 'DIST 0 m', { fontSize: '14px', fill: '#00ffff' }).setScrollFactor(0).setOrigin(0.5, 0);
        this.lifeIcons = this.add.group();
        this.updateLifeDisplay();
    }

    setupControls() {
        this.cursors = this.input.keyboard.createCursorKeys();
        this.input.addPointer(3); 

        const spawnBtn = (x, y, label, action) => {
            const btn = this.add.image(x, y, 'btn').setScrollFactor(0).setInteractive().setAlpha(0.4);
            this.add.text(x, y, label, { fontSize: '24px' }).setOrigin(0.5).setScrollFactor(0);
            btn.on('pointerdown', () => this.inputState[action] = true);
            btn.on('pointerup', () => this.inputState[action] = false);
            btn.on('pointerout', () => this.inputState[action] = false);
        };

        spawnBtn(60, 340, '<', 'left');
        spawnBtn(160, 340, '>', 'right');
        spawnBtn(740, 340, '^', 'jump');
    }

    update(time) {
        if (this.isGameOver) return;
        this.handleMovement(time);
        this.drawMotionTrail();
        this.starField.tilePositionX = this.player.x * 0.15;
        this.distText.setText(`DIST ${Math.floor(this.player.x / 10)} m`);
        if (this.player.y > CONFIG.H + 50) this.handlePlayerDeath();
    }

    handleMovement(time) {
        const onGround = this.player.body.blocked.down || this.player.body.touching.down;
        
        // Input detection
        const left = this.inputState.left || this.cursors.left.isDown;
        const right = this.inputState.right || this.cursors.right.isDown;
        const jumpIsDown = this.inputState.jump || this.cursors.up.isDown || this.cursors.space.isDown;
        const jumpJustPressed = jumpIsDown && !this.jumpWasDownLastFrame;

        // 1. Coyote Time & Jump Reset
        if (onGround) {
            this.lastTimeOnGround = time;
            this.jumpsRemaining = 2;
        }

        // 2. Jump Buffering
        if (jumpJustPressed) {
            this.jumpBufferTime = time + CONFIG.JUMP_BUFFER;
        }

        // 3. Execute Jump logic
        const canCoyoteJump = (time - this.lastTimeOnGround) < CONFIG.COYOTE_TIME && this.jumpsRemaining === 2;
        const wantsToJump = jumpJustPressed || (this.jumpBufferTime > time);

        if (wantsToJump) {
            if (onGround || canCoyoteJump) {
                // Ground Jump
                this.executeJump();
                this.jumpsRemaining = 1; // Used the ground jump
                this.jumpBufferTime = 0;
            } else if (this.jumpsRemaining > 0 && jumpJustPressed) {
                // Air Jump (requires a fresh press, not buffered)
                this.executeJump(true);
                this.jumpsRemaining = 0;
                this.jumpBufferTime = 0;
            }
        }

        // 4. Horizontal Movement
        if (left) {
            this.player.setVelocityX(-CONFIG.PLAYER_SPEED).setFlipX(true);
        } else if (right) {
            this.player.setVelocityX(CONFIG.PLAYER_SPEED).setFlipX(false);
        } else {
            this.player.setVelocityX(this.player.body.velocity.x * CONFIG.FRICTION);
        }

        this.jumpWasDownLastFrame = jumpIsDown;
    }

    executeJump(isDouble = false) {
        this.player.setVelocityY(CONFIG.JUMP_FORCE);
        if (isDouble) {
            this.player.setTint(0x00ffff);
            this.time.delayedCall(150, () => this.player.clearTint());
        }
    }

    handlePlayerDeath() {
        this.lives--;
        this.updateLifeDisplay();
        if (this.lives <= 0) {
            this.isGameOver = true;
            this.add.text(CONFIG.W/2, CONFIG.H/2, 'GAME OVER\nRefreshing...', { fontSize: '32px', align: 'center' }).setOrigin(0.5).setScrollFactor(0);
            setTimeout(() => location.reload(), 2000);
        } else {
            this.player.setPosition(100, 250).setVelocity(0, 0);
        }
    }

    updateLifeDisplay() {
        this.lifeIcons.clear(true, true);
        for(let i = 0; i < this.lives; i++) {
            this.lifeIcons.create(CONFIG.W - 30 - (i * 25), 25, 'hero').setScale(0.5).setScrollFactor(0);
        }
    }

    drawMotionTrail() {
        if (Math.abs(this.player.body.velocity.x) > 100) {
            this.trailPts.push({ x: this.player.x, y: this.player.y + 4, life: 10 });
        }
        this.trail.clear();
        this.trailPts = this.trailPts.filter(p => (p.life--) > 0);
        this.trailPts.forEach(p => {
            this.trail.fillStyle(0x00eeff, (p.life / 10) * 0.4).fillRect(p.x - 4, p.y - 4, 8, 8);
        });
    }
}

new Phaser.Game({
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: CONFIG.W, height: CONFIG.H },
    parent: 'game-container',
    pixelArt: true,
    physics: { default: 'arcade', arcade: { gravity: { y: CONFIG.GRAVITY } } },
    scene: AshenHollow
});
</script>
</body>
</html>
