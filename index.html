<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050510">
    <title>Ashen Hollow</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; touch-action: none; font-family: monospace; }
        #game-container { display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
const CONFIG = {
    W: 800,
    H: 400,
    WORLD_WIDTH: 1600,
    GRAVITY: 1600,
    PLAYER_SPEED: 300,
    JUMP_FORCE: -680,
    FRICTION: 0.8,
    COLORS: [0x2a3a5a, 0x3a2a5a, 0x2a4a3a, 0x4a3a2a, 0x2a4050]
};

class AshenHollow extends Phaser.Scene {
    constructor() {
        super('AshenHollow');
    }

    init() {
        this.lives = 3;
        this.isGameOver = false;
        this.trailPts = [];
        this.inputState = { left: false, right: false };
        this.jumpsRemaining = 2;
    }

    preload() {
        this.generateAssetTextures();
    }

    generateAssetTextures() {
        const g = this.make.graphics({ x: 0, y: 0, add: false });
        g.fillStyle(0x334466).fillRect(0, 0, 32, 32);
        g.fillStyle(0xffffff, 0.15).fillRect(0, 0, 32, 2);
        g.generateTexture('floor', 32, 32);

        CONFIG.COLORS.forEach((color, i) => {
            g.clear().fillStyle(color).fillRect(0, 0, 32, 14);
            g.fillStyle(0xffffff, 0.15).fillRect(0, 0, 32, 2);
            g.generateTexture(`p${i}`, 32, 14);
        });

        g.clear().fillStyle(0x00ddff).fillRect(4, 8, 20, 24);
        g.fillStyle(0xff00bb).fillRect(8, 10, 12, 8);
        g.fillStyle(0x007799).fillRect(4, 32, 8, 8);
        g.fillStyle(0x007799).fillRect(16, 32, 8, 8);
        g.generateTexture('hero', 28, 40);
        
        g.clear().fillStyle(0x00ffff, 0.8).fillRect(0, 0, 4, 4);
        g.generateTexture('part', 4, 4);

        g.clear().fillStyle(0xffffff, 0.13).fillCircle(40, 40, 40);
        g.generateTexture('btn', 80, 80);

        g.clear();
        for (let i = 0; i < 100; i++) {
            g.fillStyle(0xffffff, 0.4 + Math.random() * 0.6);
            g.fillRect(Math.random() * 512, Math.random() * 512, 2, 2);
        }
        g.generateTexture('stars', 512, 512);
        g.destroy();
    }

    create() {
        this.physics.world.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.H);
        this.cameras.main.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.H);
        
        this.starField = this.add.tileSprite(CONFIG.W/2, CONFIG.H/2, CONFIG.W, CONFIG.H, 'stars')
            .setScrollFactor(0).setDepth(-1);
        this.trail = this.add.graphics();

        this.platforms = this.physics.add.staticGroup();
        this.player = this.physics.add.sprite(100, 250, 'hero');
        this.player.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, this.platforms);

        this.jumpParticles = this.add.particles(0, 0, 'part', {
            speed: { min: 50, max: 150 },
            angle: { min: 0, max: 360 },
            scale: { start: 1, end: 0 },
            lifespan: 300,
            emitting: false
        });

        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.buildFirstZone();
        this.createHUD();
        this.setupControls();
    }

    buildFirstZone() {
        const TILE = 32;
        for (let tx = 0; tx < CONFIG.WORLD_WIDTH; tx += TILE) {
            this.platforms.create(tx + 16, CONFIG.H - 16, 'floor').refreshBody();
        }
        const ledges = [
            { x: 320, y: 280, len: 2, tint: 0 },
            { x: 520, y: 220, len: 3, tint: 1 },
            { x: 800, y: 260, len: 2, tint: 2 },
            { x: 1050, y: 180, len: 4, tint: 3 },
            { x: 1320, y: 240, len: 2, tint: 4 }
        ];
        ledges.forEach(({ x, y, len, tint }) => {
            for (let i = 0; i < len; i++) {
                this.platforms.create(x + (i * TILE) + 16, y, `p${tint}`).refreshBody();
            }
        });
    }

    createHUD() {
        this.distText = this.add.text(CONFIG.W / 2, 12, 'DIST 0 m', {
            fontSize: '14px', fill: '#00ffff', stroke: '#000', strokeThickness: 3
        }).setScrollFactor(0).setOrigin(0.5, 0);

        this.lifeIcons = this.add.group();
        this.updateLifeDisplay();

        this.add.text(10, 10, '[ RESTART ]', { fontSize: '12px', fill: '#ff3355' })
            .setScrollFactor(0).setInteractive()
            .on('pointerdown', () => this.scene.restart());
    }

    setupControls() {
        this.cursors = this.input.keyboard.createCursorKeys();
        
        // Keyboard Jump
        this.input.keyboard.on('keydown-UP', () => this.executeJump());
        this.input.keyboard.on('keydown-SPACE', () => this.executeJump());

        // Left/Right Button Logic
        const makeBtn = (x, y, label, action) => {
            const btn = this.add.image(x, y, 'btn').setScrollFactor(0).setInteractive().setAlpha(0.6);
            this.add.text(x, y, label, { fontSize: '32px' }).setOrigin(0.5).setScrollFactor(0);
            btn.on('pointerdown', () => { this.inputState[action] = true; btn.setAlpha(0.9); });
            btn.on('pointerup', () => { this.inputState[action] = false; btn.setAlpha(0.6); });
            btn.on('pointerout', () => { this.inputState[action] = false; btn.setAlpha(0.6); });
        };

        // Separate Jump Button with distinct "Down" event
        const jumpBtn = this.add.image(740, 340, 'btn').setScrollFactor(0).setInteractive().setAlpha(0.6);
        this.add.text(740, 340, '^', { fontSize: '40px' }).setOrigin(0.5).setScrollFactor(0);
        jumpBtn.on('pointerdown', () => {
            this.executeJump();
            jumpBtn.setAlpha(0.9);
        });
        jumpBtn.on('pointerup', () => jumpBtn.setAlpha(0.6));

        makeBtn(60, 340, '<', 'left');
        makeBtn(180, 340, '>', 'right');
    }

    executeJump() {
        if (this.isGameOver) return;

        const onGround = this.player.body.blocked.down;
        
        // Reset jump count if on ground before jumping
        if (onGround) this.jumpsRemaining = 2;

        if (this.jumpsRemaining > 0) {
            // Spend a jump
            this.jumpsRemaining--;
            
            // Apply force
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            
            // Visuals
            this.jumpParticles.emitParticleAt(this.player.x, this.player.y + 15, 10);
            this.player.setTint(0x00ffff);
            this.time.delayedCall(100, () => this.player.clearTint());
        }
    }

    update() {
        if (this.isGameOver) return;
        
        // Grounded check for reset (catches walking off ledges)
        if (this.player.body.blocked.down && this.player.body.velocity.y >= 0) {
            this.jumpsRemaining = 2;
        }

        // Horizontal Movement
        const left = this.inputState.left || this.cursors.left.isDown;
        const right = this.inputState.right || this.cursors.right.isDown;

        if (left) {
            this.player.setVelocityX(-CONFIG.PLAYER_SPEED).setFlipX(true);
        } else if (right) {
            this.player.setVelocityX(CONFIG.PLAYER_SPEED).setFlipX(false);
        } else {
            this.player.setVelocityX(this.player.body.velocity.x * CONFIG.FRICTION);
        }

        this.drawMotionTrail();
        this.starField.tilePositionX = this.player.x * 0.15;
        this.distText.setText(`DIST ${Math.floor(this.player.x / 10)} m`);
        if (this.player.y > CONFIG.H + 50) this.handlePlayerDeath();
    }

    handlePlayerDeath() {
        this.lives--;
        this.updateLifeDisplay();
        if (this.lives <= 0) {
            this.isGameOver = true;
            this.physics.pause();
            this.player.setTint(0xff0000);
            this.add.text(CONFIG.W/2, CONFIG.H/2, 'GAME OVER\nTap Restart', {
                fontSize: '32px', fill: '#ff0066', align: 'center'
            }).setOrigin(0.5).setScrollFactor(0);
        } else {
            this.player.setPosition(100, 250).setVelocity(0, 0);
            this.jumpsRemaining = 2;
        }
    }

    updateLifeDisplay() {
        this.lifeIcons.clear(true, true);
        for(let i = 0; i < this.lives; i++) {
            this.lifeIcons.create(CONFIG.W - 30 - (i * 25), 25, 'hero').setScale(0.5).setScrollFactor(0);
        }
    }

    drawMotionTrail() {
        if (Math.abs(this.player.body.velocity.x) > 100) {
            this.trailPts.push({ x: this.player.x, y: this.player.y + 4, life: 10 });
        }
        this.trail.clear();
        this.trailPts = this.trailPts.filter(p => p.life > 0);
        this.trailPts.forEach(p => {
            p.life--;
            this.trail.fillStyle(0x00eeff, (p.life / 10) * 0.4);
            this.trail.fillRect(p.x - 4, p.y - 4, 8, 8);
        });
    }
}

new Phaser.Game({
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: CONFIG.W, height: CONFIG.H },
    parent: 'game-container',
    pixelArt: true,
    physics: { default: 'arcade', arcade: { gravity: { y: CONFIG.GRAVITY }, debug: false } },
    scene: AshenHollow
});
</script>
</body>
</html>
