<body>
<!-- CACHE_BUST: activity6dungeon1 -->
<div id="game-container"></div>
<script>
const CONFIG = {
    W: 800,
    H: 400,
    ROOM_WIDTH: 1600,
    WORLD_HEIGHT: 1200,
    GRAVITY: 1400,
    PLAYER_SPEED: 280,
    JUMP_FORCE: -690,
    FRICTION: 0.75,
    COLORS: [0x2a3a5a, 0x3a2a5a, 0x2a4a3a, 0x4a3a2a, 0x2a4050]
};

const ROOM_SEQUENCE = ['R1', 'R2', 'R3', 'R4', 'R5', 'R6', 'R7', 'R8', 'R9', 'R10'];
const ROOM_IDS = ROOM_SEQUENCE.reduce((acc, roomId, idx) => {
    const start = idx * CONFIG.ROOM_WIDTH;
    acc[roomId] = { start, end: start + CONFIG.ROOM_WIDTH - 1 };
    return acc;
}, {});

CONFIG.WORLD_WIDTH = CONFIG.ROOM_WIDTH * ROOM_SEQUENCE.length;

const ENABLE_DEBUG_UNLOCK = true;

const ROOM_PLATFORM_LAYOUTS = {

        { x: 120, y: 1048, len: 12, tint: 0 },

        { x: ROOM_IDS.R7.start + 60, y: 1060, len: 10, tint: 0 },
        { x: ROOM_IDS.R7.start + 360, y: 980, len: 10, tint: 3 },

    R9: [
        { x: ROOM_IDS.R9.start + 140, y: 1048, len: 14, tint: 0 },
        { x: ROOM_IDS.R9.start + 520, y: 920, len: 9, tint: 1 },
        { x: ROOM_IDS.R9.start + 880, y: 820, len: 8, tint: 2 },
        { x: ROOM_IDS.R9.start + 1210, y: 980, len: 8, tint: 3 }
    ],
    R10: [
        { x: ROOM_IDS.R10.start + 220, y: 1048, len: 16, tint: 0 },
        { x: ROOM_IDS.R10.start + 720, y: 940, len: 8, tint: 4 },
        { x: ROOM_IDS.R10.start + 1040, y: 860, len: 8, tint: 2 }
    ]
};

const DUNGEON_WALL_RECTS = [
    { room: 'R3', rects: [{ x: 520, y: 920, wTiles: 1, hTiles: 5 }, { x: 1080, y: 920, wTiles: 1, hTiles: 5 }] },
    { room: 'R4', rects: [{ x: 560, y: 920, wTiles: 1, hTiles: 5 }, { x: 1120, y: 920, wTiles: 1, hTiles: 5 }] },
    { room: 'R5', rects: [{ x: 520, y: 920, wTiles: 1, hTiles: 5 }, { x: 1080, y: 920, wTiles: 1, hTiles: 5 }] },
    { room: 'R6', rects: [{ x: 560, y: 920, wTiles: 1, hTiles: 5 }, { x: 1120, y: 920, wTiles: 1, hTiles: 5 }] },
    { room: 'R7', rects: [{ x: 520, y: 920, wTiles: 1, hTiles: 5 }, { x: 1080, y: 920, wTiles: 1, hTiles: 5 }] },
    { room: 'R8', rects: [{ x: 560, y: 920, wTiles: 1, hTiles: 5 }, { x: 1120, y: 920, wTiles: 1, hTiles: 5 }] }
];

class AshenHollow extends Phaser.Scene {
    constructor() {
        super('AshenHollow');
        this.resetInternalState();
    }

    resetInternalState() {
        this.lives = 3;
        this.isGameOver = false;
        this.trailPts = [];
        this.inputState = { left: false, right: false, jump: false };
        this.jumpsRemaining = 1;
        this.jumpWasDownLastFrame = false;
        this.jumpBuffer = 0;
        this.interactQueued = false;
        this.inRoomTransition = false;
        this.transitionCooldownUntil = 0;
        this.currentRoomId = 'R1';

        this.keyItemA = false;
        this.keyItemB = false;
        this.keyItemC = false;
        this.abilityA = false;
        this.abilityB = false;
        this.abilityC = false;
        this.keyItemsCollected = 0;
        this.abilitiesUnlocked = 0;
        this.finalGateState = 'LOCKED_KEY_ITEMS';

        this.r9ShellComplete = false;
        this.preFinalCheckpointUnlocked = false;
        this.statusMessageFrames = 0;
    }

    preload() {
        this.generateAssetTextures();
    }

    generateAssetTextures() {
        const g = this.make.graphics({ x: 0, y: 0, add: false });

        g.fillStyle(0x334466).fillRect(0, 0, 32, 32);
        g.fillStyle(0xffffff, 0.15).fillRect(0, 0, 32, 2);
        g.generateTexture('floor', 32, 32);

        CONFIG.COLORS.forEach((color, i) => {
            g.clear().fillStyle(color).fillRect(0, 0, 32, 14);
            g.fillStyle(0xffffff, 0.15).fillRect(0, 0, 32, 2);
            g.generateTexture(`p${i}`, 32, 14);
        });

        g.clear().fillStyle(0x6a4326).fillRect(0, 0, 56, 88);
        g.fillStyle(0x43230e).fillRect(10, 0, 36, 88);
        g.fillStyle(0xaa2211).fillRect(24, 8, 8, 72);
        g.generateTexture('finalGateLocked', 56, 88);

        g.clear().fillStyle(0x234a34).fillRect(0, 0, 56, 88);
        g.fillStyle(0x00ffaa, 0.8).fillRect(16, 0, 24, 88);
        g.fillStyle(0xffffff, 0.25).fillRect(24, 8, 8, 72);
        g.generateTexture('finalGateOpen', 56, 88);

        g.clear().fillStyle(0x995c2d).fillRect(0, 0, 48, 72);
        g.fillStyle(0x57351a).fillRect(10, 0, 28, 72);
        g.generateTexture('doorFrame', 48, 72);

        g.clear().fillStyle(0xff4444).fillRect(0, 0, 44, 44);
        g.fillStyle(0x220000).fillRect(8, 8, 28, 28);
        g.fillStyle(0xffbb44).fillRect(18, 6, 8, 32);
        g.generateTexture('finalCore', 44, 44);

        g.clear().fillStyle(0xffd54a);
        g.fillRect(0, 0, 28, 20);
        g.fillStyle(0x6b4b14).fillRect(20, 6, 8, 8);
        g.generateTexture('keyItem', 28, 20);

        g.clear().fillStyle(0x00ddff).fillCircle(14, 14, 13);
        g.fillStyle(0xffffff, 0.55).fillCircle(10, 10, 4);
        g.generateTexture('abilityNode', 28, 28);

        g.clear().fillStyle(0x3a5a4a).fillRect(0, 0, 40, 40);
        g.fillStyle(0x00ff88, 0.75).fillRect(10, 6, 20, 28);
        g.generateTexture('exit', 40, 40);

        g.clear().fillStyle(0x45526e).fillRect(0, 0, 188, 56);
        g.fillStyle(0x121822).fillRect(3, 3, 182, 50);
        g.generateTexture('signBoard', 188, 56);

        g.clear().fillStyle(0x00ddff).fillRect(4, 8, 20, 24);
        g.fillStyle(0xff00bb).fillRect(8, 10, 12, 8);
        g.fillStyle(0x007799).fillRect(4, 32, 8, 8);
        g.fillStyle(0x007799).fillRect(16, 32, 8, 8);
        g.generateTexture('hero', 28, 40);

        g.clear().fillStyle(0xffffff, 0.13).fillCircle(40, 40, 40);
        g.generateTexture('btn', 80, 80);

        g.clear();
        for (let i = 0; i < 100; i++) {
            g.fillStyle(0xffffff, 0.4 + Math.random() * 0.6);
            g.fillRect(Math.random() * 512, Math.random() * 512, 2, 2);
        }
        g.generateTexture('stars', 512, 512);
        g.destroy();
    }

    create() {
        this.resetInternalState();
        this.physics.world.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
        this.cameras.main.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
        this.cameras.main.setBackgroundColor('#050510');

        this.starField = this.add.tileSprite(CONFIG.W / 2, CONFIG.H / 2, CONFIG.W, CONFIG.H, 'stars')
            .setScrollFactor(0).setDepth(-1);
        this.trail = this.add.graphics();

        this.platforms = this.physics.add.staticGroup();
        this.player = this.physics.add.sprite(220, 1020, 'hero');
        this.player.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, this.platforms);

        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

        this.buildWorldGeometry();
        this.buildWorldInteractables();
        this.createHUD();
        this.setupControls();
        this.createTransitionOverlay();

        this.setCurrentRoom('R1');
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.setStatusMessage('Activity 6: dungeon branches live in R3-R8. Use INTERACT in R2 doors.', 240);
    }

    buildWorldGeometry() {
        const tile = 32;
        for (let tx = 0; tx < CONFIG.WORLD_WIDTH; tx += tile) {
            this.platforms.create(tx + 16, CONFIG.WORLD_HEIGHT - 16, 'floor').refreshBody();
            this.platforms.create(tx + 16, 16, 'floor').refreshBody();
        }
        for (let ty = tile; ty < CONFIG.WORLD_HEIGHT - 32; ty += tile) {
            this.platforms.create(16, ty + 16, 'floor').refreshBody();
            this.platforms.create(CONFIG.WORLD_WIDTH - 16, ty + 16, 'floor').refreshBody();
        }

        Object.values(ROOM_PLATFORM_LAYOUTS).forEach((ledges) => {
            ledges.forEach(({ x, y, len, tint }) => {
                for (let i = 0; i < len; i++) {
                    this.platforms.create(x + (i * tile) + 16, y, `p${tint}`).refreshBody();
                }
            });
        });

        DUNGEON_WALL_RECTS.forEach(({ room, rects }) => {
            const roomStart = ROOM_IDS[room].start;
            rects.forEach(({ x, y, wTiles, hTiles }) => {
                for (let xi = 0; xi < wTiles; xi++) {
                    for (let yi = 0; yi < hTiles; yi++) {
                        this.platforms.create(roomStart + x + (xi * tile) + 16, y + (yi * tile), 'floor').refreshBody();
                    }
                }
            });
        });
    }

    buildWorldInteractables() {
        this.finalGate = this.physics.add.staticImage(500, 1000, 'finalGateLocked').refreshBody();
        this.add.text(500, 930, 'R1 FINAL GATE', { fontSize: '12px', fill: '#ffb47a', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5);

        this.branchDoors = [
            { id: 'A', room: 'R2', x: ROOM_IDS.R2.start + 520, y: 980, target: 'R3', requires: null, label: 'A: Crimson Depths' },
            { id: 'B', room: 'R2', x: ROOM_IDS.R2.start + 900, y: 900, target: 'R5', requires: 'A', label: 'B: Umber Catacombs' },
            { id: 'C', room: 'R2', x: ROOM_IDS.R2.start + 1260, y: 980, target: 'R7', requires: null, label: 'C: Azure Warrens' }
        ];

        this.branchDoors.forEach((door) => {
            door.sprite = this.physics.add.staticImage(door.x, door.y, 'doorFrame').refreshBody();
            this.add.text(door.x, door.y - 52, door.label, { fontSize: '10px', fill: '#c9dcff', stroke: '#000', strokeThickness: 2 }).setOrigin(0.5);
        });

        this.r9Objective = this.physics.add.staticImage(ROOM_IDS.R9.start + 810, 776, 'finalCore').refreshBody();
        this.r10Exit = this.physics.add.staticImage(ROOM_IDS.R10.start + 1240, 826, 'exit').refreshBody();
        this.physics.add.overlap(this.player, this.r9Objective, this.completeFinalShell, null, this);
        this.physics.add.overlap(this.player, this.r10Exit, this.tryExitRun, null, this);

        this.keyPickupGroup = this.physics.add.staticGroup();
        this.abilityNodeGroup = this.physics.add.staticGroup();

        this.createBranchReward('A', ROOM_IDS.R4.start + 980, 780, ROOM_IDS.R4.start + 1320, 940);
        this.createBranchReward('B', ROOM_IDS.R6.start + 980, 780, ROOM_IDS.R6.start + 1320, 940);
        this.createBranchReward('C', ROOM_IDS.R8.start + 980, 780, ROOM_IDS.R8.start + 1320, 940);

        this.physics.add.overlap(this.player, this.keyPickupGroup, (_, item) => this.collectKeyItem(item));
        this.physics.add.overlap(this.player, this.abilityNodeGroup, (_, node) => this.collectAbility(node));

        this.add.image(250, 860, 'signBoard');
        this.add.text(250, 860, 'R1\nFinal gate requires\n3 Keys + 3 Abilities', { fontSize: '11px', fill: '#d7ebff', align: 'center' }).setOrigin(0.5);

        this.add.image(ROOM_IDS.R2.start + 260, 860, 'signBoard');
        this.add.text(ROOM_IDS.R2.start + 260, 860, 'R2 HUB\nChoose branches A/B/C\nAny order (B requires A)', { fontSize: '11px', fill: '#d7ebff', align: 'center' }).setOrigin(0.5);
    }

    createBranchReward(branchId, keyX, keyY, abilityX, abilityY) {
        const key = this.keyPickupGroup.create(keyX, keyY, 'keyItem').refreshBody();
        key.setData('branch', branchId);
        const node = this.abilityNodeGroup.create(abilityX, abilityY, 'abilityNode').refreshBody();
        node.setData('branch', branchId);
    }

    createHUD() {
        this.distText = this.add.text(CONFIG.W / 2, 12, 'DIST 0 m', {
            fontSize: '14px', fill: '#00ffff', stroke: '#000', strokeThickness: 3
        }).setScrollFactor(0).setOrigin(0.5, 0);

        this.roomText = this.add.text(CONFIG.W / 2, 30, '', {
            fontSize: '12px', fill: '#a6ffb5', stroke: '#000', strokeThickness: 3
        }).setScrollFactor(0).setOrigin(0.5, 0);

        this.objectiveText = this.add.text(CONFIG.W / 2, 48, '', {
            fontSize: '12px', fill: '#ffe082', stroke: '#000', strokeThickness: 3
        }).setScrollFactor(0).setOrigin(0.5, 0);

        this.gateStateText = this.add.text(10, 10, '', {
            fontSize: '12px', fill: '#ffb47a', stroke: '#000', strokeThickness: 3
        }).setScrollFactor(0).setOrigin(0, 0);

        this.statusText = this.add.text(CONFIG.W / 2, CONFIG.H - 24, '', {
            fontSize: '12px', fill: '#ffffff', stroke: '#000', strokeThickness: 3
        }).setScrollFactor(0).setOrigin(0.5, 0.5);

        this.lifeIcons = this.add.group();
        this.updateLifeDisplay();

        this.add.text(10, 44, '[ RESTART ]', { fontSize: '12px', fill: '#ff3355' })
            .setScrollFactor(0).setInteractive().on('pointerdown', () => this.scene.restart());
    }

    setupControls() {
        this.cursors = this.input.keyboard.createCursorKeys();
        this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.interactKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
        this.debugBypassKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.B);
        this.debugUnlockKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.U);
        this.input.addPointer(2);

        const spawnBtn = (x, y, label, action) => {
            const btn = this.add.image(x, y, 'btn').setScrollFactor(0).setInteractive().setAlpha(0.6);
            this.add.text(x, y, label, { fontSize: '24px' }).setOrigin(0.5).setScrollFactor(0);
            btn.on('pointerdown', () => this.inputState[action] = true);
            btn.on('pointerup', () => this.inputState[action] = false);
            btn.on('pointerout', () => this.inputState[action] = false);
        };

        spawnBtn(60, 340, '<', 'left');
        spawnBtn(160, 340, '>', 'right');
        spawnBtn(740, 340, '^', 'jump');

        this.add.text(640, 300, '[ INTERACT ]', { fontSize: '12px', fill: '#ffe082', backgroundColor: '#112233' })
            .setPadding(6, 4, 6, 4).setScrollFactor(0).setInteractive().on('pointerdown', () => { this.interactQueued = true; });

        this.add.text(640, 332, '[ BYPASS ]', { fontSize: '12px', fill: '#9ae6ff', backgroundColor: '#112233' })
            .setPadding(6, 4, 6, 4).setScrollFactor(0).setInteractive().on('pointerdown', () => this.runDebugBypass());

        if (ENABLE_DEBUG_UNLOCK) {
            this.add.text(640, 364, '[ UNLOCK ]', { fontSize: '12px', fill: '#baffc9', backgroundColor: '#112233' })
                .setPadding(6, 4, 6, 4).setScrollFactor(0).setInteractive().on('pointerdown', () => this.runDebugUnlock());
        }
    }

    createTransitionOverlay() {
        this.transitionOverlay = this.add.rectangle(0, 0, CONFIG.W, CONFIG.H, 0x000000, 0)
            .setScrollFactor(0).setOrigin(0, 0).setDepth(1000);
    }

    setCurrentRoom(roomId) {
        this.currentRoomId = roomId;
        const room = ROOM_IDS[roomId];
        this.cameras.main.setBounds(room.start, 0, CONFIG.ROOM_WIDTH, CONFIG.WORLD_HEIGHT);
    }

    transitionToRoom(targetRoomId, targetX, targetY, statusLabel) {
        if (this.inRoomTransition) return;
        this.inRoomTransition = true;
        this.transitionCooldownUntil = this.time.now + 550;

        this.tweens.add({
            targets: this.transitionOverlay,
            alpha: 1,
            duration: 140,
            onComplete: () => {
                this.setCurrentRoom(targetRoomId);
                this.player.setPosition(targetX, targetY).setVelocity(0, 0);
                this.tweens.add({
                    targets: this.transitionOverlay,
                    alpha: 0,
                    duration: 180,
                    onComplete: () => {
                        this.inRoomTransition = false;
                        this.setStatusMessage(statusLabel);
                    }
                });
            }
        });
    }

    recomputeProgressionCounts() {
        this.keyItemsCollected = Number(this.keyItemA) + Number(this.keyItemB) + Number(this.keyItemC);
        this.abilitiesUnlocked = Number(this.abilityA) + Number(this.abilityB) + Number(this.abilityC);
        if (this.keyItemsCollected < 3) this.finalGateState = 'LOCKED_KEY_ITEMS';
        else if (this.abilitiesUnlocked < 3) this.finalGateState = 'LOCKED_ABILITIES';
        else this.finalGateState = 'UNLOCKED';

        if (this.finalGate) this.finalGate.setTexture(this.finalGateState === 'UNLOCKED' ? 'finalGateOpen' : 'finalGateLocked');
        if (this.gateStateText) {
            this.gateStateText.setText(`Gate: ${this.finalGateState}\nKeys ${this.keyItemsCollected}/3 | Abilities ${this.abilitiesUnlocked}/3`);
        }
    }

    refreshObjectiveText() {
        if (this.finalGateState !== 'UNLOCKED') {
            this.objectiveText.setText('OBJECTIVE: Crawl branches R3-R8, collect 3 keys + unlock 3 abilities.');
            return;
        }
        if (!this.r9ShellComplete) {
            this.objectiveText.setText('OBJECTIVE: Enter final gate and clear R9 shell.');
            return;
        }
        this.objectiveText.setText('OBJECTIVE: Reach R10 exit, then use right-edge return link to R1.');
    }

    collectKeyItem(item) {
        if (!item.active) return;
        const branch = item.getData('branch');
        const map = { A: 'keyItemA', B: 'keyItemB', C: 'keyItemC' };
        if (this[map[branch]]) return;

        this[map[branch]] = true;
        item.disableBody(true, true);
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.setStatusMessage(`Key Item ${branch} secured (${this.keyItemsCollected}/3).`);
    }

    collectAbility(node) {
        if (!node.active) return;
        const branch = node.getData('branch');
        const keyMap = { A: 'keyItemA', B: 'keyItemB', C: 'keyItemC' };
        const abilityMap = { A: 'abilityA', B: 'abilityB', C: 'abilityC' };

        if (!this[keyMap[branch]]) {
            this.setStatusMessage(`Branch ${branch}: claim Key Item first.`);
            return;
        }
        if (this[abilityMap[branch]]) return;

        this[abilityMap[branch]] = true;
        node.disableBody(true, true);
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.setStatusMessage(`Ability Unlock ${branch} awakened (${this.abilitiesUnlocked}/3).`);
    }

    update() {
        if (this.isGameOver || this.inRoomTransition) return;

        this.handleMovement();
        this.handleInteractionsAndTransitions();
        this.drawMotionTrail();

        this.starField.tilePositionX = this.player.x * 0.15;
        this.distText.setText(`DIST ${Math.floor(this.player.x / 10)} m`);
        this.roomText.setText(`ROOM: ${this.currentRoomId}`);

        if (this.player.y > CONFIG.WORLD_HEIGHT + 50) this.handlePlayerDeath();

        if (this.statusMessageFrames > 0) {
            this.statusMessageFrames--;
            if (this.statusMessageFrames === 0) this.statusText.setText('');
        }
    }

    handleInteractionsAndTransitions() {
        const now = this.time.now;
        const interactPressed = (this.cursors.up && this.cursors.up.justDown) ||
            (this.interactKey && Phaser.Input.Keyboard.JustDown(this.interactKey)) ||
            this.interactQueued;
        this.interactQueued = false;

        if (this.debugBypassKey && Phaser.Input.Keyboard.JustDown(this.debugBypassKey)) this.runDebugBypass();
        if (this.debugUnlockKey && Phaser.Input.Keyboard.JustDown(this.debugUnlockKey) && ENABLE_DEBUG_UNLOCK) this.runDebugUnlock();

        if (now < this.transitionCooldownUntil) return;

        if (this.currentRoomId === 'R2' && interactPressed) {
            const nearbyDoor = this.branchDoors.find((door) => Phaser.Math.Distance.Between(this.player.x, this.player.y, door.x, door.y) < 140);
            if (nearbyDoor) {
                this.tryEnterBranchDoor(nearbyDoor);
                return;
            }
        }

        const room = this.currentRoomId;

        if (room === 'R1' && this.player.x > ROOM_IDS.R1.end - 90 && this.player.y > 950) {
            this.transitionToRoom('R2', ROOM_IDS.R2.start + 120, 1020, 'Transition: R1 -> R2');
            return;
        }
        if (room === 'R2' && this.player.x < ROOM_IDS.R2.start + 80 && this.player.y > 950) {
            this.transitionToRoom('R1', ROOM_IDS.R1.end - 140, 1020, 'Transition: R2 -> R1');
            return;
        }

        if (room === 'R3' && this.player.x > ROOM_IDS.R3.end - 90 && this.player.y > 860) {
            this.transitionToRoom('R4', ROOM_IDS.R4.start + 120, 1020, 'Transition: R3 -> R4');
            return;
        }
        if (room === 'R4' && this.player.x > ROOM_IDS.R4.end - 90 && this.player.y > 860) {
            this.transitionToRoom('R2', ROOM_IDS.R2.start + 620, 1020, 'Branch A complete: return to R2');
            return;
        }

        if (room === 'R5' && this.player.x > ROOM_IDS.R5.end - 90 && this.player.y > 860) {
            this.transitionToRoom('R6', ROOM_IDS.R6.start + 120, 1020, 'Transition: R5 -> R6');
            return;
        }
        if (room === 'R6' && this.player.x > ROOM_IDS.R6.end - 90 && this.player.y > 860) {
            this.transitionToRoom('R2', ROOM_IDS.R2.start + 980, 1020, 'Branch B complete: return to R2');
            return;
        }

        if (room === 'R7' && this.player.x > ROOM_IDS.R7.end - 90 && this.player.y > 860) {
            this.transitionToRoom('R8', ROOM_IDS.R8.start + 120, 1020, 'Transition: R7 -> R8');
            return;
        }
        if (room === 'R8' && this.player.x > ROOM_IDS.R8.end - 90 && this.player.y > 860) {
            this.transitionToRoom('R2', ROOM_IDS.R2.start + 1320, 1020, 'Branch C complete: return to R2');
            return;
        }

        if (room === 'R9' && !this.r9ShellComplete && this.player.x > ROOM_IDS.R9.end - 90 && this.player.y > 950) {
            this.setStatusMessage('R9 objective incomplete: touch the core first.', 90);
            this.transitionCooldownUntil = now + 250;
            return;
        }
        if (room === 'R9' && this.r9ShellComplete && this.player.x > ROOM_IDS.R9.end - 90 && this.player.y > 950) {
            this.transitionToRoom('R10', ROOM_IDS.R10.start + 120, 1020, 'Transition: R9 -> R10');
            return;
        }
        if (room === 'R10' && this.player.x < ROOM_IDS.R10.start + 80 && this.player.y > 950) {
            this.transitionToRoom('R9', ROOM_IDS.R9.end - 140, 1020, 'Transition: R10 -> R9');
            return;
        }
        if (room === 'R10' && this.player.x > ROOM_IDS.R10.end - 60 && this.player.y > 950) {
            this.transitionToRoom('R1', 620, 1020, 'Transition: R10 -> R1 (gate return link)');
            return;
        }

        const nearGate = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.finalGate.x, this.finalGate.y) < 130;
        if (room === 'R1' && nearGate && interactPressed) {
            if (this.finalGateState === 'UNLOCKED') {
                this.preFinalCheckpointUnlocked = true;
                this.transitionToRoom('R9', ROOM_IDS.R9.start + 140, 1020, 'Gate opened. Entering R9 final area.');
            } else if (this.finalGateState === 'LOCKED_KEY_ITEMS') {
                this.setStatusMessage('Gate sealed: recover 3 Key Items.');
            } else {
                this.setStatusMessage('Gate sealed: awaken 3 Abilities.');
            }
        }
    }

    tryEnterBranchDoor(door) {
        if (door.requires === 'A' && !this.abilityA) {
            this.setStatusMessage('Branch B sealed: requires Ability Unlock A (Abyss Dash).');
            return;
        }
        const spawnX = ROOM_IDS[door.target].start + 120;
        this.transitionToRoom(door.target, spawnX, 1020, `Entering Branch ${door.id}`);
    }

    completeFinalShell(_player, core) {
        if (this.r9ShellComplete) return;
        this.r9ShellComplete = true;
        core.disableBody(true, true);
        this.refreshObjectiveText();
        this.setStatusMessage('R9 shell complete. Proceed to R10 exit.');
    }

    tryExitRun() {
        if (!this.r9ShellComplete) return;
        this.setStatusMessage('MVP loop complete. Return to R1 via R10 right-edge link.', 360);
    }

    runDebugBypass() {
        this.preFinalCheckpointUnlocked = true;
        this.transitionToRoom('R9', ROOM_IDS.R9.start + 140, 1020, 'DEBUG BYPASS: jumped to R9.');
    }

    runDebugUnlock() {
        this.keyItemA = this.keyItemB = this.keyItemC = true;
        this.abilityA = this.abilityB = this.abilityC = true;
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.setStatusMessage('DEBUG: Gate requirements set to 3/3 + 3/3.');
    }

    setStatusMessage(message, frames = 180) {
        this.statusText.setText(message);
        this.statusMessageFrames = frames;
    }

    handleMovement() {
        const onGround = this.player.body.blocked.down;
        const velocityY = this.player.body.velocity.y;
        const inAir = !onGround || velocityY < 0;
        const left = this.inputState.left || this.cursors.left.isDown;
        const right = this.inputState.right || this.cursors.right.isDown;
        const jump = this.inputState.jump || this.cursors.up.isDown || this.spaceKey.isDown;
        const jumpJustPressed = (this.cursors.up && this.cursors.up.justDown) ||
            (this.spaceKey && this.spaceKey.justDown) ||
            (this.inputState.jump && !this.jumpWasDownLastFrame);

        if (jumpJustPressed) this.jumpBuffer = 5;
        if (this.jumpBuffer > 0) this.jumpBuffer--;
        if (onGround && velocityY >= 0) this.jumpsRemaining = 1;

        if (left) this.player.setVelocityX(-CONFIG.PLAYER_SPEED).setFlipX(true);
        else if (right) this.player.setVelocityX(CONFIG.PLAYER_SPEED).setFlipX(false);
        else this.player.setVelocityX(this.player.body.velocity.x * CONFIG.FRICTION);

        if (jump && onGround && this.jumpsRemaining > 0) {
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            this.jumpsRemaining--;
            this.jumpBuffer = 0;
        } else if ((jumpJustPressed || this.jumpBuffer > 0) && inAir && this.jumpsRemaining > 0) {
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            this.jumpsRemaining--;
            this.jumpBuffer = 0;
        }

        this.jumpWasDownLastFrame = jump;
    }

    handlePlayerDeath() {
        this.lives--;
        this.updateLifeDisplay();

        if (this.lives <= 0) {
            this.isGameOver = true;
            this.physics.pause();
            this.player.setTint(0xff0000);
            this.add.text(CONFIG.W / 2, CONFIG.H / 2, 'GAME OVER\nTap Restart', {
                fontSize: '32px', fill: '#ff0066', align: 'center'
            }).setOrigin(0.5).setScrollFactor(0);
            return;
        }

        const respawnRoom = this.preFinalCheckpointUnlocked ? 'R9' : 'R1';
        const respawnX = ROOM_IDS[respawnRoom].start + 140;
        this.setCurrentRoom(respawnRoom);
        this.player.setPosition(respawnX, CONFIG.WORLD_HEIGHT - 80).setVelocity(0, 0);
        this.tweens.add({ targets: this.player, alpha: 0.2, duration: 100, yoyo: true, repeat: 5 });
    }

    updateLifeDisplay() {
        this.lifeIcons.clear(true, true);
        for (let i = 0; i < this.lives; i++) {
            this.lifeIcons.create(CONFIG.W - 30 - (i * 25), 25, 'hero').setScale(0.5).setScrollFactor(0);
        }
    }

    drawMotionTrail() {
        if (Math.abs(this.player.body.velocity.x) > 100) {
            this.trailPts.push({ x: this.player.x, y: this.player.y + 4, life: 10 });
        }
        this.trail.clear();
        this.trailPts = this.trailPts.filter((p) => p.life > 0);
        this.trailPts.forEach((p) => {
            p.life--;
            this.trail.fillStyle(0x00eeff, (p.life / 10) * 0.4);
            this.trail.fillRect(p.x - 4, p.y - 4, 8, 8);
        });
    }
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
        } catch (_) {}

        if ('caches' in window) {
            try {
                const cacheKeys = await caches.keys();
                await Promise.all(cacheKeys.map((key) => caches.delete(key)));
            } catch (_) {}
        }
    });
}

new Phaser.Game({
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: CONFIG.W,
        height: CONFIG.H
    },
    parent: 'game-container',
    pixelArt: true,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: CONFIG.GRAVITY }, debug: false }
    },
    scene: AshenHollow
});
</script>
