<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Neon Drifter V3</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; touch-action: none; }
        #game-container { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 800,
                height: 400
            },
            parent: 'game-container',
            pixelArt: true,
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 1400 }, debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, platforms, inputState = { left: false, right: false };

        function preload() {
            // Generate Textures
            this.textures.addCanvas('hero', createRect(32, 48, '#00ffff'));
            this.textures.addCanvas('floor', createRect(32, 32, '#444466'));
            this.textures.addCanvas('button', createCircle(40, 'rgba(255, 255, 255, 0.2)'));
        }

        function createRect(w, h, color) {
            let c = document.createElement('canvas'); c.width = w; c.height = h;
            let ctx = c.getContext('2d'); ctx.fillStyle = color; ctx.fillRect(0,0,w,h); return c;
        }

        function createCircle(r, color) {
            let c = document.createElement('canvas'); c.width = r*2; c.height = r*2;
            let ctx = c.getContext('2d'); ctx.fillStyle = color; ctx.beginPath(); ctx.arc(r,r,r,0,Math.PI*2); ctx.fill(); return c;
        }

        function create() {
            const worldWidth = 2400; // Large world for exploration
            const worldHeight = 400;

            // 1. WORLD & CAMERA BOUNDS (The Fix for getting stuck)
            this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
            this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
            this.cameras.main.setBackgroundColor('#050510');

            // 2. LEVEL GEOMETRY
            platforms = this.physics.add.staticGroup();
            for(let i = 0; i < 75; i++) { platforms.create(i * 32, 384, 'floor'); } // Long Floor
            
            // Metroidvania Platforms
            platforms.create(400, 280, 'floor'); platforms.create(432, 280, 'floor');
            platforms.create(700, 200, 'floor'); platforms.create(732, 200, 'floor');
            platforms.create(1000, 300, 'floor');

            // 3. PLAYER
            player = this.physics.add.sprite(100, 300, 'hero');
            player.setCollideWorldBounds(true); // Prevents falling off the map
            this.physics.add.collider(player, platforms);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            // 4. TOUCH CONTROLS (OVERLAY)
            this.input.addPointer(3);
            
            // Left Button
            createTouchBtn(this, 60, 340, '<', () => inputState.left = true, () => inputState.left = false);
            // Right Button
            createTouchBtn(this, 160, 340, '>', () => inputState.right = true, () => inputState.right = false);
            // Jump Button
            createTouchBtn(this, 740, 340, 'UP', () => {
                if (player.body.touching.down) player.setVelocityY(-650);
            }, () => {});
            // Restart Button (Top Right)
            let resetBtn = this.add.text(720, 20, 'RESTART', { fill: '#f00' }).setInteractive().setScrollFactor(0);
            resetBtn.on('pointerdown', () => this.scene.restart());
        }

        function createTouchBtn(scene, x, y, label, onDown, onUp) {
            let btn = scene.add.image(x, y, 'button').setInteractive().setScrollFactor(0);
            scene.add.text(x-10, y-10, label, { fontSize: '20px', fill: '#fff' }).setScrollFactor(0);
            
            btn.on('pointerdown', onDown);
            btn.on('pointerup', onUp);
            btn.on('pointerout', onUp); // Critical fix for sticky movement
        }

        function update() {
            if (inputState.left) {
                player.setVelocityX(-250);
                player.flipX = true;
            } else if (inputState.right) {
                player.setVelocityX(250);
                player.flipX = false;
            } else {
                player.setVelocityX(0);
            }
        }
    </script>
</body>
</html>
