<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050510">
<link rel="manifest" href="manifest.json">
<title>Ashen Hollow</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

<style>
body{
margin:0;
padding:0;
background:#000;
overflow:hidden;
touch-action:none;
}

#game-container{
position:relative;
display:flex;
justify-content:center;
align-items:center;
height:100dvh;
}
</style>
</head>

<body>
<div id="game-container"></div>

<script>

const CONFIG = {
W:800,
H:400,
WORLD_WIDTH:1600,
GRAVITY:1500,
PLAYER_SPEED:280,
JUMP_FORCE:-550,
TOUCH_JUMP_COOLDOWN_MS:180
};

class AshenHollow extends Phaser.Scene {

constructor(){
super("AshenHollow");
}

preload(){

const g=this.make.graphics({x:0,y:0,add:false});

g.fillStyle(0x334466)
.fillRect(0,0,32,32)
.generateTexture("floor",32,32);

g.clear()
.fillStyle(0x00ddff)
.fillRect(4,8,20,24)
.generateTexture("hero",28,40);

g.clear()
.fillStyle(0xffffff,0.2)
.fillCircle(40,40,40)
.generateTexture("btn",80,80);

}

create(){

this.jumpCount=0;
this.lastTouchJumpAt=-Infinity;

this.physics.world.setBounds(0,0,CONFIG.WORLD_WIDTH,CONFIG.H);

this.platforms=this.physics.add.staticGroup();

for(let x=0;x<CONFIG.WORLD_WIDTH;x+=32){
this.platforms.create(x+16,CONFIG.H-16,"floor");
}

const ledges=[
[400,280],
[600,200],
[900,250]
];

ledges.forEach(l=>{
this.platforms.create(l[0],l[1],"floor")
.setScale(3,0.5)
.refreshBody();
});

this.player=this.physics.add.sprite(100,200,"hero")
.setCollideWorldBounds(true);

this.physics.add.collider(this.player,this.platforms,this.onLand,null,this);

this.cameras.main.startFollow(this.player,true,0.1,0.1);

this.cursors=this.input.keyboard.createCursorKeys();
this.spaceKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

this.setupTouchControls();

}

onLand(){}

setupTouchControls(){

this.inputState={
left:false,
right:false
};

const makeBtn=(x,y,act)=>{

const b=this.add.image(x,y,"btn")
.setScrollFactor(0)
.setInteractive()
.setAlpha(0.5);

if(act==="jump"){
b.on("pointerdown",()=>{
this.requestTouchJump();
});
return;
}

b.on("pointerdown",()=>{
this.inputState[act]=true;
});

b.on("pointerup",()=>{
this.inputState[act]=false;
});

b.on("pointerout",()=>{
this.inputState[act]=false;
});

};

makeBtn(80,320,"left");
makeBtn(200,320,"right");
makeBtn(720,320,"jump");

}

requestTouchJump(){

const now=this.time.now;
if(now-this.lastTouchJumpAt<CONFIG.TOUCH_JUMP_COOLDOWN_MS){
return;
}

this.lastTouchJumpAt=now;
this.tryJump();

}

tryJump(){

if(this.jumpCount<2){

this.player.setVelocityY(CONFIG.JUMP_FORCE);

if(this.jumpCount === 1){

this.player.setTint(0xff00ff);

this.time.delayedCall(200,()=>{
this.player.clearTint();
});

}

this.jumpCount++;

}

}

update(){

const onGround=(this.player.body.blocked.down||this.player.body.touching.down)&&this.player.body.velocity.y>=0;
if(onGround){
this.jumpCount=0;
}

if(Phaser.Input.Keyboard.JustDown(this.cursors.up)||Phaser.Input.Keyboard.JustDown(this.spaceKey)){
this.tryJump();
}

const speed=CONFIG.PLAYER_SPEED;

if(this.cursors.left.isDown || this.inputState.left){
this.player.setVelocityX(-speed);
}
else if(this.cursors.right.isDown || this.inputState.right){
this.player.setVelocityX(speed);
}
else{
this.player.setVelocityX(this.player.body.velocity.x*0.8);
}

if(this.player.y>CONFIG.H){
this.player.setPosition(100,100);
this.jumpCount=0;
}

}

}

new Phaser.Game({
type:Phaser.AUTO,
parent:"game-container",
scale:{
mode:Phaser.Scale.FIT,
autoCenter:Phaser.Scale.CENTER_BOTH,
width:CONFIG.W,
height:CONFIG.H
},
physics:{
default:"arcade",
arcade:{
gravity:{y:CONFIG.GRAVITY}
}
},
scene:AshenHollow
});

if("serviceWorker" in navigator){
window.addEventListener("load",()=>{
navigator.serviceWorker.register("sw.js").catch(()=>{});
});
}

</script>
</body>
</html>
