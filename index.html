    create() {
        this.resetInternalState();
        this.physics.world.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
        this.cameras.main.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
        this.cameras.main.setBackgroundColor('#050510');

        this.starField = this.add.tileSprite(CONFIG.W / 2, CONFIG.H / 2, CONFIG.W, CONFIG.H, 'stars')
            .setScrollFactor(0).setDepth(-1);
        this.trail = this.add.graphics();

        this.platforms = this.physics.add.staticGroup();
        this.player = this.physics.add.sprite(220, 1020, 'hero');
        this.player.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, this.platforms);

        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

        this.buildWorldGeometry();
        this.buildWorldInteractables();
        this.createHUD();
        this.setupControls();
        this.createTransitionOverlay();

        this.setCurrentRoom('R1');
        this.recomputeProgressionCounts();
        this.runSequenceChecks();
        this.refreshBranchBoard();
        this.refreshObjectiveText();
        this.setStatusMessage('Activity 6: dungeon branches live in R3-R8. Use INTERACT in R2 doors.', 240);
    }

    getBranchIdForRoom(roomId) {
        if (roomId === 'R3' || roomId === 'R4') return 'A';
        if (roomId === 'R5' || roomId === 'R6') return 'B';
        if (roomId === 'R7' || roomId === 'R8') return 'C';
        return null;
    }

    getBranchIdForRewardRoom(roomId) {
        if (roomId === 'R4') return 'A';
        if (roomId === 'R6') return 'B';
        if (roomId === 'R8') return 'C';
        return null;
    }

    beginBranchRun(branchId) {
        if (!branchId) return;
        this.activeBranchId = branchId;
        this.activeBranchStartMs = this.time.now;
        if (this.sequenceAttemptLog[this.sequenceAttemptLog.length - 1] !== branchId) {
            this.sequenceAttemptLog.push(branchId);
        }
        this.refreshBranchBoard();
    }

    completeBranchRun(branchId) {
        if (!branchId) return false;

        const keyFlag = { A: this.keyItemA, B: this.keyItemB, C: this.keyItemC }[branchId];
        const abilityFlag = { A: this.abilityA, B: this.abilityB, C: this.abilityC }[branchId];
        if (!keyFlag || !abilityFlag) {
            this.logWrongTurn(`branch_${branchId}_return_before_rewards`);
            this.setStatusMessage(`Branch ${branchId} incomplete: secure key + ability first.`);
            return false;
        }

        const completeKey = { A: 'branchCompleteA', B: 'branchCompleteB', C: 'branchCompleteC' }[branchId];
        if (!this[completeKey]) {
            this[completeKey] = true;
            this.sequenceResolvedLog.push(branchId);
        }

        if (this.activeBranchId === branchId && this.activeBranchStartMs > 0) {
            const durationSec = Number(((this.time.now - this.activeBranchStartMs) / 1000).toFixed(1));
            this.branchDurationsSec[branchId] = durationSec;
            this.activeBranchId = null;
            this.activeBranchStartMs = 0;
        }

        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.refreshBranchBoard();
        return true;
    }

    getBranchDurationStatus(branchId) {
        const sec = this.branchDurationsSec[branchId];
        if (sec === null) return '--';
        const target = BRANCH_DURATION_TARGET_SEC[branchId];
        if (sec < target.min) return `${sec}s LOW`;
        if (sec > target.max) return `${sec}s HIGH`;
        return `${sec}s OK`;
    }

    runSequenceChecks() {
        const orders = [
            ['A', 'B', 'C'],
            ['B', 'C', 'A'],
            ['C', 'A', 'B']
        ];
        this.sequenceChecks = orders.map((attempt) => this.simulateSequenceAttempt(attempt));
    }

    simulateSequenceAttempt(order) {
        const ability = { A: false, B: false, C: false };
        const completed = [];
        const pending = [...order];
        let guard = 0;

        while (pending.length > 0 && guard < 12) {
            const branch = pending.shift();
            if (completed.includes(branch)) {
                guard++;
                continue;
            }
            if (branch === 'B' && !ability.A) {
                pending.push(branch);
                guard++;
                continue;
            }
            ability[branch] = true;
            completed.push(branch);
            guard++;
        }

        return {
            attempt: order.join('-'),
            resolved: completed.join('-'),
            passed: completed.length === 3
        };
    }

    refreshBranchBoard() {
        if (!this.branchBoardText) return;
        const lineA = `A ${this.branchCompleteA ? 'DONE' : 'OPEN'} | ${this.getBranchDurationStatus('A')}`;
        const lineB = `B ${this.branchCompleteB ? 'DONE' : (this.abilityA ? 'OPEN' : 'LOCKED')} | ${this.getBranchDurationStatus('B')}`;
        const lineC = `C ${this.branchCompleteC ? 'DONE' : 'OPEN'} | ${this.getBranchDurationStatus('C')}`;
        const seq = this.sequenceChecks.map((r) => `${r.attempt}->${r.resolved}:${r.passed ? 'OK' : 'FAIL'}`).join(' ');
        const runLog = this.sequenceAttemptLog.length ? this.sequenceAttemptLog.join('-') : '--';
        this.branchBoardText.setText(
            `R2 HUB\\n${lineA}\\n${lineB}\\n${lineC}\\nSeq ${seq}\\nRun ${runLog}`
        );
    }

    buildWorldGeometry() {
        const tile = 32;
        for (let tx = 0; tx < CONFIG.WORLD_WIDTH; tx += tile) {
            this.platforms.create(tx + 16, CONFIG.WORLD_HEIGHT - 16, 'floor').refreshBody();
            this.platforms.create(tx + 16, 16, 'floor').refreshBody();
        }
        for (let ty = tile; ty < CONFIG.WORLD_HEIGHT - 32; ty += tile) {
            this.platforms.create(16, ty + 16, 'floor').refreshBody();
            this.platforms.create(CONFIG.WORLD_WIDTH - 16, ty + 16, 'floor').refreshBody();
        }

        Object.values(ROOM_PLATFORM_LAYOUTS).forEach((ledges) => {
            ledges.forEach(({ x, y, len, tint }) => {
                for (let i = 0; i < len; i++) {
                    this.platforms.create(x + (i * tile) + 16, y, `p${tint}`).refreshBody();
                }
            });
        });

        DUNGEON_WALL_RECTS.forEach(({ room, rects }) => {
            const roomStart = ROOM_IDS[room].start;
            rects.forEach(({ x, y, wTiles, hTiles }) => {
                for (let xi = 0; xi < wTiles; xi++) {
                    for (let yi = 0; yi < hTiles; yi++) {
                        this.platforms.create(roomStart + x + (xi * tile) + 16, y + (yi * tile), 'floor').refreshBody();
                    }
                }
            });
        });
    }

    setCurrentRoom(roomId) {
        this.previousRoomId = this.currentRoomId;
        this.currentRoomId = roomId;
        const room = ROOM_IDS[roomId];
        this.cameras.main.setBounds(room.start, 0, CONFIG.ROOM_WIDTH, CONFIG.WORLD_HEIGHT);
        this.roomEnteredAtMs = this.time.now;
        this.roomStallLogged = false;
        this.logNavigationEvent('room_enter', { room: roomId, from: this.previousRoomId || 'NONE' });
    }

    transitionToRoom(targetRoomId, targetX, targetY, statusLabel, options = {}) {
        if (this.inRoomTransition) return;
        this.inRoomTransition = true;
        this.transitionCooldownUntil = this.time.now + 700;

        this.cameras.main.stopFollow();

        const sourceY = this.player.y;
        const room = ROOM_IDS[targetRoomId];
        const roomMid = room.start + (CONFIG.ROOM_WIDTH / 2);
        const entryEdge = options.entrySide || (targetX <= roomMid ? 'left' : 'right');
        const resolvedY = options.preserveY === false ? targetY : sourceY;
        const isVertical = entryEdge === 'top' || entryEdge === 'bottom';
        const entryX = entryEdge === 'left' ? room.start + 56
            : entryEdge === 'right' ? room.end - 56
                : targetX;
        const verticalOffset = 180;
        let entryY;
        if (isVertical) {
            const targetVertical = targetY;
            const requestedDir = options.verticalDirection || 'auto';
            const direction = requestedDir === 'auto'
                ? (entryEdge === 'top' ? 'down' : 'up')
                : requestedDir;

            if (direction === 'up') {
                entryY = Math.min(CONFIG.WORLD_HEIGHT - 40, targetVertical + verticalOffset);
            } else {
                entryY = Math.max(40, targetVertical - verticalOffset);
            }
        } else {
            entryY = resolvedY;
        }
        const facingLeft = entryEdge === 'right';
        const transitionSpeedPxPerSec = CONFIG.PLAYER_SPEED;
        const entryDistancePx = isVertical
            ? Math.abs(targetY - entryY)
            : Math.abs(targetX - entryX);
        const entryDurationMs = Phaser.Math.Clamp(
            Math.round((entryDistancePx / transitionSpeedPxPerSec) * 1000),
            120,
            420
        );

        this.tweens.add({
            targets: this.transitionOverlay,
            alpha: 1,
            duration: 140,
            onComplete: () => {
                this.setCurrentRoom(targetRoomId);
                this.player.body.enable = false;
                this.player.setPosition(entryX, entryY).setFlipX(facingLeft);

                this.cameras.main.centerOn(entryX, entryY);
                this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

                const tweenProps = { targets: this.player, duration: entryDurationMs, ease: 'Linear' };
                if (entryEdge === 'top' || entryEdge === 'bottom') tweenProps.y = targetY;
                else tweenProps.x = targetX;

                this.tweens.add({
                    ...tweenProps,
                    onComplete: () => {
                        this.player.body.enable = true;
                        this.player.body.reset(this.player.x, this.player.y);
                        if (targetRoomId === 'R1') {
                            this.setStatusMessage(`${statusLabel} | ${this.getR1ContextPrompt()}`);
                        } else {
                            this.setStatusMessage(statusLabel);
                        }

                        this.tweens.add({
                            targets: this.transitionOverlay,
                            alpha: 0,
                            duration: 200,
                            ease: 'Linear',
                            onComplete: () => {
                                this.inRoomTransition = false;
                            }
                        });
                    }
                });
            }
        });
    }

    getR1ContextPrompt() {
        if (this.finalGateState === 'LOCKED_KEY_ITEMS') return 'Next: collect remaining key items.';
        if (this.finalGateState === 'LOCKED_ABILITIES') return 'Next: awaken remaining abilities.';
        if (!this.r9ShellComplete) return 'Gate ready: interact to enter final area.';
        return 'Loop complete: proceed to final routing.';
    }

    logNavigationEvent(type, details = {}) {
        this.navigationEvents.push({
            type,
            room: this.currentRoomId,
            atMs: this.time.now,
            ...details
        });
    }

    logWrongTurn(reason) {
        this.logNavigationEvent('wrong_turn', { reason });
    }

    recomputeProgressionCounts() {
        this.keyItemsCollected = Number(this.keyItemA) + Number(this.keyItemB) + Number(this.keyItemC);
        this.abilitiesUnlocked = Number(this.abilityA) + Number(this.abilityB) + Number(this.abilityC);
        if (this.keyItemsCollected < 3) this.finalGateState = 'LOCKED_KEY_ITEMS';
        else if (this.abilitiesUnlocked < 3) this.finalGateState = 'LOCKED_ABILITIES';
        else this.finalGateState = 'UNLOCKED';

        if (this.finalGate) this.finalGate.setTexture(this.finalGateState === 'UNLOCKED' ? 'finalGateOpen' : 'finalGateLocked');
        if (this.gateStateText) {
            this.gateStateText.setText(`Gate: ${this.finalGateState}\nKeys ${this.keyItemsCollected}/3 | Abilities ${this.abilitiesUnlocked}/3`);
        }
        this.refreshBranchBoard();
    }

    refreshObjectiveText() {
        if (this.finalGateState !== 'UNLOCKED') {
            this.objectiveText.setText('OBJECTIVE: Crawl branches R3-R8, collect 3 keys + unlock 3 abilities.');
            return;
        }
        if (!this.r9ShellComplete) {
            this.objectiveText.setText('OBJECTIVE: Enter final gate and clear R9 shell.');
            return;
        }
        this.objectiveText.setText('OBJECTIVE: Reach R10 exit, then use right-edge return link to R1.');
    }

    emitGateReaction(branchId) {
        this.gateReactionFrames = 150;
        if (!this.gateFeedbackText) return;
        this.gateFeedbackText.setText(
            `Gate reacts to Key ${branchId}: ${this.keyItemsCollected}/3 key runes lit`
        );
        this.gateFeedbackText.setVisible(true);
    }

    collectKeyItem(item) {
        if (!item.active) return;
        const branch = item.getData('branch');
        const map = { A: 'keyItemA', B: 'keyItemB', C: 'keyItemC' };
        if (this[map[branch]]) return;

        this[map[branch]] = true;
        item.disableBody(true, true);
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.emitGateReaction(branch);
        this.logNavigationEvent('key_collected', { branch });
        this.setStatusMessage(`Key Item ${branch} secured (${this.keyItemsCollected}/3).`);
    }

    collectAbility(node) {
        if (!node.active) return;
        const branch = node.getData('branch');
        const keyMap = { A: 'keyItemA', B: 'keyItemB', C: 'keyItemC' };
        const abilityMap = { A: 'abilityA', B: 'abilityB', C: 'abilityC' };

        if (!this[keyMap[branch]]) {
            this.setStatusMessage(`Branch ${branch}: claim Key Item first.`);
            return;
        }
        if (this[abilityMap[branch]]) return;

        this[abilityMap[branch]] = true;
        node.disableBody(true, true);
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.logNavigationEvent('ability_unlocked', { branch });
        this.setStatusMessage(`Ability Unlock ${branch} awakened (${this.abilitiesUnlocked}/3).`);
    }

    update() {
        if (this.isGameOver || this.inRoomTransition) return;

        this.handleMovement();
        this.handleInteractionsAndTransitions();
        this.drawMotionTrail();

        this.starField.tilePositionX = this.player.x * 0.15;
        this.distText.setText(`DIST ${Math.floor(this.player.x / 10)} m`);
        this.roomText.setText(`ROOM: ${this.currentRoomId}`);

        if (!this.roomStallLogged && this.roomEnteredAtMs > 0) {
            const dwellMs = this.time.now - this.roomEnteredAtMs;
            const isNavigationRoom = ['R2', 'R3', 'R4', 'R5', 'R6', 'R7', 'R8'].includes(this.currentRoomId);
            if (isNavigationRoom && dwellMs >= 20000) {
                this.roomStallLogged = true;
                this.logNavigationEvent('stall_over_20s', {
                    room: this.currentRoomId,
                    dwellSec: Number((dwellMs / 1000).toFixed(1))
                });
                this.setStatusMessage(`Navigation note: >20s stall logged in ${this.currentRoomId}.`, 120);
            }
        }

        if (this.gateReactionFrames > 0) {
            this.gateReactionFrames--;
            if (this.finalGate) {
                const alpha = 0.35 + 0.65 * Math.abs(Math.sin(this.gateReactionFrames * 0.25));
                const tint = Phaser.Display.Color.GetColor(
                    255,
                    Math.floor(170 + 70 * alpha),
                    Math.floor(70 + 80 * alpha)
                );
                this.finalGate.setTint(tint);
            }
            if (this.gateReactionFrames === 0) {
                if (this.finalGate) this.finalGate.clearTint();
                if (this.gateFeedbackText) this.gateFeedbackText.setVisible(false);
            }
        }

        if (this.player.y > CONFIG.WORLD_HEIGHT + 50) this.handlePlayerDeath();

        if (this.statusMessageFrames > 0) {
            this.statusMessageFrames--;
            if (this.statusMessageFrames === 0) this.statusText.setText('');
        }
    }

    handleInteractionsAndTransitions() {
        const now = this.time.now;
        const room = this.currentRoomId;
        const bounds = ROOM_IDS[room];
        const r3ShaftX = ROOM_IDS.R3.start + 820;
        const r4ShaftX = ROOM_IDS.R4.start + 820;
        const interactPressed = (this.interactKey && Phaser.Input.Keyboard.JustDown(this.interactKey)) ||
            this.interactQueued;
        this.interactQueued = false;

        if (this.debugBypassKey && Phaser.Input.Keyboard.JustDown(this.debugBypassKey)) this.runDebugBypass();
        if (this.debugUnlockKey && Phaser.Input.Keyboard.JustDown(this.debugUnlockKey) && ENABLE_DEBUG_UNLOCK) this.runDebugUnlock();

        if (now < this.transitionCooldownUntil) return;

        if (room === 'R2' && interactPressed) {
            const nearbyDoor = this.branchDoors.find((door) => Phaser.Math.Distance.Between(this.player.x, this.player.y, door.x, door.y) < 140);
            if (nearbyDoor) {
                this.tryEnterBranchDoor(nearbyDoor);
                return;
            }
        }

        if (room === 'R3' && interactPressed) {
            let handled = false;

            if (this.r3ReturnDoor) {
                const nearR3ReturnDoor = Phaser.Math.Distance.Between(
                    this.player.x,
                    this.player.y,
                    this.r3ReturnDoor.x,
                    this.r3ReturnDoor.y
                ) < 130;
                if (nearR3ReturnDoor) {
                    this.completeBranchRun('A');
                    this.transitionToRoom('R2', ROOM_IDS.R2.start + 680, 740, 'Branch A complete: return to R2', {
                        entrySide: 'top',
                        preserveY: false
                    });
                    handled = true;
                }
            }

            if (!handled && this.r3ToR4Door) {
                const nearR3ToR4Door = Phaser.Math.Distance.Between(
                    this.player.x,
                    this.player.y,
                    this.r3ToR4Door.x,
                    this.r3ToR4Door.y
                ) < 130;
                if (nearR3ToR4Door) {
                    this.transitionToRoom('R4', r4ShaftX, 1020, 'Transition: R3 -> R4 (north ascent)', {
                        entrySide: 'bottom',
                        preserveY: false
                    });
                    handled = true;
                }
            }

            if (handled) return;
        }

        this.player.x = Phaser.Math.Clamp(this.player.x, bounds.start + 24, bounds.end - 24);

        if (room === 'R1' && this.player.x > ROOM_IDS.R1.end - 70) {
            this.transitionToRoom('R2', ROOM_IDS.R2.start + 120, 1020, 'Transition: R1 -> R2');
            return;
        }
        if (room === 'R2' && this.player.x < ROOM_IDS.R2.start + 70) {
            this.transitionToRoom('R1', ROOM_IDS.R1.end - 140, 1020, 'Transition: R2 -> R1');
            return;
        }

        if (room === 'R4' && interactPressed && this.r4ToR3Door) {
            const nearR4ReturnDoor = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                this.r4ToR3Door.x,
                this.r4ToR3Door.y
            ) < 130;
            if (nearR4ReturnDoor) {
                this.transitionToRoom('R3', r3ShaftX, 360, 'Transition: R4 -> R3 (south descent)', {
                    entrySide: 'top',
                    preserveY: false
                });
                return;
            }
        }

        if (room === 'R5' && this.player.x > ROOM_IDS.R5.end - 70 && this.player.y > 900) {
            this.transitionToRoom('R6', ROOM_IDS.R6.start + 180, 980, 'Transition: R5 -> R6', {
                preserveY: false
            });
            return;
        }
        if (room === 'R6' && this.player.x > ROOM_IDS.R6.end - 70 && this.player.y < 940) {
            this.transitionToRoom('R5', ROOM_IDS.R5.start + 1360, 860, 'Transition: R6 -> R5 (loop back lane)', {
                entrySide: 'right',
                preserveY: false
            });
            return;
        }
        if (room === 'R5' && this.player.x < ROOM_IDS.R5.start + 70 && this.player.y < 940) {
            if (!this.completeBranchRun('B')) return;
            this.transitionToRoom('R2', ROOM_IDS.R2.start + 1300, 940, 'Branch B complete: return to R2', {
                entrySide: 'right',
                preserveY: false
            });
            return;
        }

        if (room === 'R7' && this.player.x > ROOM_IDS.R7.end - 70 && this.player.y > 980) {
            this.transitionToRoom('R8', ROOM_IDS.R8.start + 760, 360, 'Transition: R7 -> R8', {
                entrySide: 'top',
                preserveY: false
            });
            return;
        }
        if (room === 'R8' && this.player.x > ROOM_IDS.R8.end - 70 && this.player.y > 980) {
            this.transitionToRoom('R7', ROOM_IDS.R7.start + 760, 1020, 'Transition: R8 -> R7 (loop back lane)', {
                entrySide: 'bottom',
                preserveY: false
            });
            return;
        }
        if (room === 'R7' && this.player.x < ROOM_IDS.R7.start + 640 && this.player.y < 420) {
            if (!this.completeBranchRun('C')) return;
            this.transitionToRoom('R2', ROOM_IDS.R2.start + 680, 1060, 'Branch C complete: return to R2', {
                entrySide: 'bottom',
                preserveY: false
            });
            return;
        }

        if (room === 'R9' && !this.r9ShellComplete && this.player.x > ROOM_IDS.R9.end - 70) {
            this.logWrongTurn('r9_exit_attempt_before_objective');
            this.setStatusMessage('R9 objective incomplete: touch the core first.', 90);
            this.transitionCooldownUntil = now + 250;
            return;
        }
        if (room === 'R9' && this.r9ShellComplete && this.player.x > ROOM_IDS.R9.end - 70) {
            this.transitionToRoom('R10', ROOM_IDS.R10.start + 120, 1020, 'Transition: R9 -> R10');
            return;
        }
        if (room === 'R10' && this.player.x < ROOM_IDS.R10.start + 70) {
            this.transitionToRoom('R9', ROOM_IDS.R9.end - 140, 1020, 'Transition: R10 -> R9');
            return;
        }
        if (room === 'R10' && this.player.x > ROOM_IDS.R10.end - 50) {
            this.transitionToRoom('R1', 620, 1020, 'Transition: R10 -> R1 (gate return link)');
            return;
        }

        const nearGate = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.finalGate.x, this.finalGate.y) < 130;
        if (room === 'R1' && nearGate && interactPressed) {
            if (this.finalGateState === 'UNLOCKED') {
                this.preFinalCheckpointUnlocked = true;
                this.transitionToRoom('R9', ROOM_IDS.R9.start + 140, 1020, 'Gate opened. Entering R9 final area.');
            } else if (this.finalGateState === 'LOCKED_KEY_ITEMS') {
                this.logWrongTurn('gate_locked_missing_keys');
                this.setStatusMessage('Gate sealed: recover 3 Key Items.');
            } else {
                this.logWrongTurn('gate_locked_missing_abilities');
                this.setStatusMessage('Gate sealed: awaken 3 Abilities.');
            }
        }
    }

    tryEnterBranchDoor(door) {
        if (door.requires === 'A' && !this.abilityA) {
            this.logWrongTurn('branch_b_attempt_before_ability_a');
            this.setStatusMessage('Branch B sealed: requires Ability Unlock A (Abyss Dash).');
            return;
        }
        this.beginBranchRun(door.id);
        const spawnX = door.spawnX || (ROOM_IDS[door.target].start + 120);
        const spawnY = door.spawnY || 1020;
        const entryFlavor = {
            A: 'Entering Branch A (North): narrow vertical ascent',
            B: 'Entering Branch B (East): wide horizontal crawl',
            C: 'Entering Branch C (South): narrow vertical descent'
        };
        this.transitionToRoom(door.target, spawnX, spawnY, entryFlavor[door.id] || `Entering Branch ${door.id}`, {
            entrySide: door.entrySide,
            verticalDirection: door.verticalDirection,
            preserveY: door.preserveY
        });
    }

    completeFinalShell(_player, core) {
        if (this.r9ShellComplete) return;
        this.r9ShellComplete = true;
        core.disableBody(true, true);
        this.refreshObjectiveText();
        this.setStatusMessage('R9 shell complete. Proceed to R10 exit.');
    }

    tryExitRun() {
        if (!this.r9ShellComplete) return;
        this.setStatusMessage('MVP loop complete. Return to R1 via R10 right-edge link.', 360);
    }

    runDebugBypass() {
        this.preFinalCheckpointUnlocked = true;
        this.transitionToRoom('R9', ROOM_IDS.R9.start + 140, 1020, 'DEBUG BYPASS: jumped to R9.');
    }

    runDebugUnlock() {
        this.keyItemA = this.keyItemB = this.keyItemC = true;
        this.abilityA = this.abilityB = this.abilityC = true;
        this.branchCompleteA = this.branchCompleteB = this.branchCompleteC = true;
        if (this.branchDurationsSec.A === null) this.branchDurationsSec.A = 0;
        if (this.branchDurationsSec.B === null) this.branchDurationsSec.B = 0;
        if (this.branchDurationsSec.C === null) this.branchDurationsSec.C = 0;
        this.recomputeProgressionCounts();
        this.refreshObjectiveText();
        this.setStatusMessage('DEBUG: Gate requirements set to 3/3 + 3/3.');
    }

    setStatusMessage(message, frames = 180) {
        this.statusText.setText(message);
        this.statusMessageFrames = frames;
    }

    handleMovement() {
        const onGround = this.player.body.blocked.down;
        const velocityY = this.player.body.velocity.y;
        const inAir = !onGround || velocityY < 0;
        const left = this.inputState.left || this.cursors.left.isDown;
        const right = this.inputState.right || this.cursors.right.isDown;
        const jump = this.inputState.jump || this.cursors.up.isDown || this.spaceKey.isDown;
        const jumpJustPressed = (this.cursors.up && this.cursors.up.justDown) ||
            (this.spaceKey && this.spaceKey.justDown) ||
            (this.inputState.jump && !this.jumpWasDownLastFrame);

        if (jumpJustPressed) this.jumpBuffer = 5;
        if (this.jumpBuffer > 0) this.jumpBuffer--;
        if (onGround && velocityY >= 0) this.jumpsRemaining = 1;

        if (left) this.player.setVelocityX(-CONFIG.PLAYER_SPEED).setFlipX(true);
        else if (right) this.player.setVelocityX(CONFIG.PLAYER_SPEED).setFlipX(false);
        else this.player.setVelocityX(this.player.body.velocity.x * CONFIG.FRICTION);

        if (jump && onGround && this.jumpsRemaining > 0) {
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            this.jumpsRemaining--;
            this.jumpBuffer = 0;
        } else if ((jumpJustPressed || this.jumpBuffer > 0) && inAir && this.jumpsRemaining > 0) {
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            this.jumpsRemaining--;
            this.jumpBuffer = 0;
        }

        this.jumpWasDownLastFrame = jump;
    }

    handlePlayerDeath() {
        this.lives--;
        this.updateLifeDisplay();

        if (this.lives <= 0) {
            this.isGameOver = true;
            this.physics.pause();
            this.player.setTint(0xff0000);
            this.add.text(CONFIG.W / 2, CONFIG.H / 2, 'GAME OVER\nTap Restart', {
                fontSize: '32px', fill: '#ff0066', align: 'center'
            }).setOrigin(0.5).setScrollFactor(0);
            return;
        }

        const respawnRoom = this.preFinalCheckpointUnlocked ? 'R9' : 'R1';
        const respawnX = ROOM_IDS[respawnRoom].start + 140;
        this.setCurrentRoom(respawnRoom);
        this.player.setPosition(respawnX, CONFIG.WORLD_HEIGHT - 80).setVelocity(0, 0);
        this.tweens.add({ targets: this.player, alpha: 0.2, duration: 100, yoyo: true, repeat: 5 });
    }

    updateLifeDisplay() {
        this.lifeIcons.clear(true, true);
        for (let i = 0; i < this.lives; i++) {
            this.lifeIcons.create(CONFIG.W - 30 - (i * 25), 25, 'hero').setScale(0.5).setScrollFactor(0);
        }
    }

    drawMotionTrail() {
        if (Math.abs(this.player.body.velocity.x) > 100) {
            this.trailPts.push({ x: this.player.x, y: this.player.y + 4, life: 10 });
        }
        this.trail.clear();
        this.trailPts = this.trailPts.filter((p) => p.life > 0);
        this.trailPts.forEach((p) => {
            p.life--;
            this.trail.fillStyle(0x00eeff, (p.life / 10) * 0.4);
            this.trail.fillRect(p.x - 4, p.y - 4, 8, 8);
        });
    }
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
        } catch (_) {}

        if ('caches' in window) {
            try {
                const cacheKeys = await caches.keys();
                await Promise.all(cacheKeys.map((key) => caches.delete(key)));
            } catch (_) {}
        }
    });
}

new Phaser.Game({
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: CONFIG.W,
        height: CONFIG.H
    },
    parent: 'game-container',
    pixelArt: true,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: CONFIG.GRAVITY }, debug: false }
    },
    scene: AshenHollow
});
</script>
